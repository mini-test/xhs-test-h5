{"key":"A","text":"有人替你安排好一切，让你不用担心","score":"ANCHOR"},{"key":"B","text":"等了很久后，终于收到一次热烈回应","score":"DISTANCE"},{"key":"C","text":"对方什么都愿意告诉你，也总来找你帮忙","score":"RESCUER"},{"key":"D","text":"一个很优秀的人明确认可并选择了你","score":"HALO"}],"module":"熟悉感脚本"},{"id":5,"dimension":"初见心动","text":"刚认识一个人时，哪个细节最容易让你心动？","options":[{"key":"A","text":"说话直接，见面时间和计划都安排得很清楚","score":"ANCHOR"},{"key":"B","text":"不太好读懂，却偶尔给你一个特别的眼神","score":"DISTANCE"},{"key":"C","text":"很快向你袒露脆弱，说你是少数懂他的人","score":"RESCUER"},{"key":"D","text":"能力强、有见识，走到哪里都容易被注意","score":"HALO"}],"module":"初见心动"},{"id":6,"dimension":"初见心动","text":"第一次约会后，哪种表现最让你回味？","options":[{"key":"A","text":"“下次我来安排，你只要告诉我哪天有空。”","score":"ANCHOR"},{"key":"B","text":"当面有些疏离，回家后却突然发来暧昧消息","score":"DISTANCE"},{"key":"C","text":"讲起不为人知的过去，让你很想保护他","score":"RESCUER"},{"key":"D","text":"谈吐和经历都很亮眼，让你想靠近他的世界","score":"HALO"}],"module":"初见心动"},{"id":7,"dimension":"初见心动","text":"哪种人最容易制造“命中注定”的感觉？","options":[{"key":"A","text":"遇事冷静，关键时刻能替你稳住局面","score":"ANCHOR"},{"key":"B","text":"态度不完全确定，让你不断想确认答案","score":"DISTANCE"},{"key":"C","text":"带着伤口和故事，似乎只有你能真正理解","score":"RESCUER"},{"key":"D","text":"有明确成就和光芒，是你想成为的那类人","score":"HALO"}],"module":"初见心动"},{"id":8,"dimension":"初见心动","text":"一个情绪稳定、表达明确的人喜欢你，你的第一反应更像？","options":[{"key":"A","text":"很放松，这种清楚本身就很有吸引力","score":"ANCHOR"},{"key":"B","text":"好像少了点刺激，不太确定自己有没有感觉","score":"DISTANCE"},{"key":"C","text":"如果他什么都不需要，我反而不知道能做什么","score":"RESCUER"},{"key":"D","text":"先担心自己够不够好，会不会让他失望","score":"HALO"}],"module":"初见心动"},{"id":9,"dimension":"关系投入","text":"暧昧三周后，你最可能把注意力放在哪里？","options":[{"key":"A","text":"想确认双方目标、节奏和下一步计划","score":"ANCHOR"},{"key":"B","text":"反复看聊天记录，猜他为什么回复变慢","score":"DISTANCE"},{"key":"C","text":"留意他最近有什么难题，想替他分担","score":"RESCUER"},{"key":"D","text":"默默提升自己，希望更配得上这段关系","score":"HALO"}],"module":"关系投入"},{"id":10,"dimension":"关系投入","text":"对方说“最近很忙”，你更真实的反应是？","options":[{"key":"A","text":"问清大致安排，再约一个明确的时间","score":"ANCHOR"},{"key":"B","text":"嘴上说没事，心里开始等待和观察","score":"DISTANCE"},{"key":"C","text":"先问有什么能帮忙，怕他一个人扛着","score":"RESCUER"},{"key":"D","text":"表示理解，同时把自己也安排得更充实","score":"HALO"}],"module":"关系投入"},{"id":11,"dimension":"关系投入","text":"你最容易用什么判断“他是真的爱我”？","options":[{"key":"A","text":"承诺过的事能做到，重要时刻不缺席","score":"ANCHOR"},{"key":"B","text":"平时再冷淡，偶尔也会给你一次浓烈靠近","score":"DISTANCE"},{"key":"C","text":"愿意依赖你，把最难的部分交给你","score":"RESCUER"},{"key":"D","text":"见过很多优秀的人后，仍明确认可你","score":"HALO"}],"module":"关系投入"},{"id":12,"dimension":"关系投入","text":"关系里，你最可能悄悄牺牲什么？","options":[{"key":"A","text":"部分决定权，只要生活足够稳定","score":"ANCHOR"},{"key":"B","text":"大量时间，用来等待一个不清楚的答案","score":"DISTANCE"},{"key":"C","text":"自己的精力，优先处理对方的问题","score":"RESCUER"},{"key":"D","text":"普通和脆弱的一面，维持“值得被爱”的样子","score":"HALO"}],"module":"关系投入"},{"id":13,"dimension":"冲突雷区","text":"关系中，哪一种变化最容易刺痛你？","options":[{"key":"A","text":"答应好的事反复改变，也不给新的安排","score":"ANCHOR"},{"key":"B","text":"前一天很亲近，第二天突然像消失了一样","score":"DISTANCE"},{"key":"C","text":"你付出了很多，对方却说你管得太多","score":"RESCUER"},{"key":"D","text":"被比较、被轻视，像是永远不够优秀","score":"HALO"}],"module":"冲突雷区"},{"id":14,"dimension":"冲突雷区","text":"发生矛盾时，你最接近哪一种状态？","options":[{"key":"A","text":"想马上把规则、责任和解决办法说清楚","score":"ANCHOR"},{"key":"B","text":"怕问得太紧把人推远，先等对方回头","score":"DISTANCE"},{"key":"C","text":"先照顾对方情绪，即使未必是你的错","score":"RESCUER"},{"key":"D","text":"努力讲道理、证明自己，最怕被看低","score":"HALO"}],"module":"冲突雷区"},{"id":15,"dimension":"冲突雷区","text":"你最可能替哪一种红旗找理由？","options":[{"key":"A","text":"对方总替你做决定，说这是因为在乎","score":"ANCHOR"},{"key":"B","text":"忽冷忽热，但每次回来都特别热烈","score":"DISTANCE"},{"key":"C","text":"长期不负责，却总有让人心软的理由","score":"RESCUER"},{"key":"D","text":"很有能力，但习惯否定和贬低别人","score":"HALO"}],"module":"冲突雷区"},{"id":16,"dimension":"冲突雷区","text":"一次严重争执后，什么最容易让你留下？","options":[{"key":"A","text":"对方给出明确修复方案和兑现时间","score":"ANCHOR"},{"key":"B","text":"一句突然的想念，让你忘掉之前的不安","score":"DISTANCE"},{"key":"C","text":"对方说“没有你我真的不知道怎么办”","score":"RESCUER"},{"key":"D","text":"对方重新肯定你，说你对他非常重要","score":"HALO"}],"module":"冲突雷区"},{"id":17,"dimension":"留下离开","text":"明知道不太快乐，你仍可能留下，通常因为？","options":[{"key":"A","text":"生活已经绑得很深，离开会打乱未来计划","score":"ANCHOR"},{"key":"B","text":"总觉得再等等，那个很好的他还会回来","score":"DISTANCE"},{"key":"C","text":"担心自己走后，对方会真的撑不住","score":"RESCUER"},{"key":"D","text":"离开像承认自己失败，也承认没被选中","score":"HALO"}],"module":"留下离开"},{"id":18,"dimension":"留下离开","text":"分手后，你最容易陷入哪一种循环？","options":[{"key":"A","text":"迅速整理生活，但很想重新拿回秩序感","score":"ANCHOR"},{"key":"B","text":"因为没有得到明确结局，忍不住再次联系","score":"DISTANCE"},{"key":"C","text":"比起自己的难过，更担心对方过得不好","score":"RESCUER"},{"key":"D","text":"拼命变好，想证明失去你是他的损失","score":"HALO"}],"module":"留下离开"},{"id":19,"dimension":"留下离开","text":"下一段关系出现相似问题时，你更可能？","options":[{"key":"A","text":"更快做决定，避免局面长期失控","score":"ANCHOR"},{"key":"B","text":"明知不稳定，仍想再确认一次他到底爱不爱","score":"DISTANCE"},{"key":"C","text":"再多付出一点，希望这次真的能救回来","score":"RESCUER"},{"key":"D","text":"表现得更好，试图换来稳定的认可","score":"HALO"}],"module":"留下离开"},{"id":20,"dimension":"留下离开","text":"哪句话最像你替一段关系辩解时会说的？","options":[{"key":"A","text":"“至少跟他在一起，生活是稳的。”","score":"ANCHOR"},{"key":"B","text":"“他也不是一直冷淡，好的时候真的很好。”","score":"DISTANCE"},{"key":"C","text":"“别人不懂他，只有我知道他经历过什么。”","score":"RESCUER"},{"key":"D","text":"“他那么优秀，我也应该再努力一点。”","score":"HALO"}],"module":"留下离开"},{"id":21,"dimension":"真实需要","text":"如果不再需要证明自己，你真正想要的关系是？","options":[{"key":"A","text":"彼此可靠、计划清楚，同时保留各自决定权","score":"ANCHOR"},{"key":"B","text":"不用猜、不用等，喜欢和行动都持续一致","score":"DISTANCE"},{"key":"C","text":"两个人都能照顾好自己，也愿意互相承接","score":"RESCUER"},{"key":"D","text":"看见你的普通和脆弱后，仍然尊重并珍惜你","score":"HALO"}],"module":"真实需要"},{"id":22,"dimension":"真实需要","text":"下一段关系里，你最想练习什么？","options":[{"key":"A","text":"在稳定关系中，也保留自己的判断和节奏","score":"ANCHOR"},{"key":"B","text":"不再把不确定、难得到误认成强烈心动","score":"DISTANCE"},{"key":"C","text":"可以关心对方，但不替他承担整个人生","score":"RESCUER"},{"key":"D","text":"不用靠优秀和懂事来换取爱与认可","score":"HALO"}],"module":"真实需要"},{"id":23,"dimension":"真实需要","text":"你最想为未来关系立下哪条边界？","options":[{"key":"A","text":"重要决定必须协商，不用“为你好”代替尊重","score":"ANCHOR"},{"key":"B","text":"不长期接受暧昧等待，语言和行动必须一致","score":"DISTANCE"},{"key":"C","text":"不无限救场，每个人为自己的选择负责","score":"RESCUER"},{"key":"D","text":"不接受比较和贬低，也允许自己并不完美","score":"HALO"}],"module":"真实需要"},{"id":24,"dimension":"真实需要","text":"你最希望这份测试替你看清什么？","options":[{"key":"A","text":"为什么我总被能替我做主的人吸引","score":"ANCHOR"},{"key":"B","text":"为什么越冷淡、越难确认的人越难放下","score":"DISTANCE"},{"key":"C","text":"为什么遇到有伤口的人，我就想保护他","score":"RESCUER"},{"key":"D","text":"为什么面对优秀的人，我总想证明自己","score":"HALO"}],"module":"真实需要"}],"results":{"ANCHOR":{"typeName":"安全锚点型 · 确定感追随者","subtitle":"你容易被能做决定、能把生活安排清楚的人吸引。","posterSubtext":"你迷恋的不是强势，而是有人能让混乱停下来。","maturityScore":86,"coreConclusion":"你会被“能把事情定下来”的人迅速吸引。确定感让你安心，但安心不等于把决定权全部交出去。","diagnosis":"你对计划、承诺和执行力非常敏感。遇到果断可靠的人，你的身体会先松下来，这份放松很容易被你理解成心动。关系开始后，你也可能为了维持稳定而让出越来越多选择权，直到“被照顾”悄悄变成“被安排”。","whatYouReallyWant":"你真正需要的是稳定的共同体：对方言行一致、关键时刻靠得住，也尊重你的判断。你要的不是一个替你做主的人，而是一个让你安心做自己的人。","mechanism":{"title":"熟悉循环：确定感 → 交出判断 → 依赖加深","content":"当外部有人迅速做决定，你会暂时摆脱犹豫和风险。短期很舒服，长期却可能削弱你对自己判断的信任。于是你越依赖对方的确定，越难在不舒服时提出不同意见。"},"professionalBasis":"这更接近对可预测性与低不确定性的偏好，不代表你软弱。稳定确实重要，但健康稳定同时包含协商、边界和可退出性。","coreTensions":["容易忽略的红旗：以“为你好”为名的单方面决定","心动触发点：计划清楚、说到做到、临场能稳住局面","关系卡点：怕失去稳定，所以把不同意见咽回去"],"suitableIf":["对方愿意说明计划，也愿意听你的版本","重大决定会协商，不用照顾换取服从","关系稳定后，你仍能保有朋友、兴趣和判断"],"cautionIf":["对方把质疑理解成不信任或不懂事","你越来越习惯说“都听你的”","生活看似稳定，你却经常感觉自己缩小了"],"indices":[{"label":"确定感需求","value":94},{"label":"自主边界","value":68},{"label":"稳定识别力","value":88},{"label":"失控敏感度","value":82},{"label":"关系执行力","value":90}],"ifStay":"继续只按熟悉感选择，你可能得到秩序，却越来越不敢独立决定。","ifChange":"把“可靠”和“控制”分开，你会拥有既稳定又平等的关系。","notRecommended":["把强势直接等同于负责","用“他更懂”长期放弃表达","因为已经规划未来，就忽略现在的不舒服"],"plan90":["列出3件必须共同决定的事，提前说清协商方式","每天保留一个由自己完成的小决定，重新建立判断感","观察对方被拒绝时的反应，比观察他主动时更重要"],"closing":"真正的安全感，不是有人替你走路，而是有人陪你决定往哪里走。"},"DISTANCE":{"typeName":"距离追逐型 · 若即若离上头者","subtitle":"越难确认的人，越容易占据你的注意力。","posterSubtext":"让你上头的，可能不是爱得更深，而是答案一直没给全。","maturityScore":91,"coreConclusion":"你对若即若离非常敏感。越难确认的人，越容易占据你的注意力。","diagnosis":"你不是喜欢受伤，而是大脑很容易被“偶尔出现的奖励”抓住。一次迟来的热烈回应，会抵消前面很多次等待，让你误以为关系正在变好。你越想得到明确答案，就越可能把大量注意力投入一个始终不够明确的人。","whatYouReallyWant":"你真正需要的是持续一致的回应。喜欢不必全天候，但关系要能讨论、能确认、能修复，而不是靠猜测维持浓度。","mechanism":{"title":"熟悉循环：不确定 → 高度关注 → 偶尔靠近 → 更难离开","content":"忽冷忽热会制造强烈的间歇性强化。因为下一次回应不可预测，你会更频繁地检查消息、回想细节、寻找证据。注意力越集中，越容易把投入本身误认成感情深度。"},"professionalBasis":"间歇性强化可以解释“越不稳定越上头”的体验，但它不是对具体关系的诊断。判断一段关系，优先看长期行为是否一致。","coreTensions":["容易忽略的红旗：长期失联、承诺模糊、只在要失去你时热烈","心动触发点：神秘、克制、偶尔只对你特别","关系卡点：把等待后的松一口气误认成幸福"],"suitableIf":["对方忙碌时也会交代，不让你长期猜","言语和行动大体一致，冲突后能回来处理","你在关系中多数时间是平静的，不靠焦虑维持联系"],"cautionIf":["每次想离开时，对方才突然变得热烈","你总在分析聊天记录，很少真正讨论需求","关系的甜主要来自“终于等到”，而非日常相处"],"indices":[{"label":"不确定激活","value":96},{"label":"回应敏感度","value":93},{"label":"一致性识别","value":66},{"label":"抽离能力","value":61},{"label":"情感专注度","value":92}],"ifStay":"继续追逐模糊答案，你会越来越会猜，却越来越难知道自己要什么。","ifChange":"把持续一致当成心动条件，你会发现平静并不等于无聊。","notRecommended":["用一次热烈覆盖长期冷淡","替对方的失联反复寻找合理解释","在没有共识的关系里无限等待"],"plan90":["连续记录14天实际行为，只写事实，不写你的解释","设定可接受的沟通下限，并直接告诉对方","情绪上头时延迟24小时再决定，不用焦虑替你做选择"],"closing":"真正适合你的爱，不需要靠失去感来证明它存在。"},"RESCUER":{"typeName":"温柔拯救型 · 被需要确认者","subtitle":"当一个人需要你，你会很快感到关系有了意义。","posterSubtext":"你很会爱人，但容易把“有用”误认成“被爱”。","maturityScore":89,"coreConclusion":"你容易被带着伤口、需要理解的人吸引。被需要会让你迅速确认自己的价值。","diagnosis":"你对别人的情绪和困难非常敏锐，也很擅长提供支持。问题不在于善良，而在于关系可能从“互相靠近”变成“你负责修复”。当对方依赖你、向你袒露脆弱时，你会感到不可替代，也更难承认这段关系已经消耗了你。","whatYouReallyWant":"你真正需要的是互相承接：你可以照顾别人，也能放心被照顾；你能提供帮助，但不必靠解决问题证明自己值得留下。","mechanism":{"title":"熟悉循环：看见伤口 → 主动救场 → 过度承担 → 疲惫内疚","content":"被需要会带来即时价值感。你越能解决对方的问题，越容易成为关系里的高功能者。久而久之，对方的责任被你接走，而你的需求因为“他已经很难了”被不断延后。"},"professionalBasis":"高共情和照顾能力是优势。风险出现在共情变成责任替代时。健康支持强调同意、能力边界和双方责任。","coreTensions":["容易忽略的红旗：反复失责，却用脆弱阻止你离开","心动触发点：真实袒露、信任你、说只有你懂他","关系卡点：一想离开，就担心对方会不会垮掉"],"suitableIf":["对方愿意为自己的问题采取实际行动","你说累时，他不会用内疚留住你","帮助是双向的，你也有被照顾和被理解的位置"],"cautionIf":["你总在替对方收拾相同的后果","关系价值只剩下“他离不开我”","你的生活不断缩水，对方却没有真正成长"],"indices":[{"label":"共情敏感度","value":95},{"label":"被需要驱动","value":94},{"label":"责任边界","value":62},{"label":"自我照顾","value":65},{"label":"关系修复力","value":91}],"ifStay":"继续靠救场维持关系，你会很重要，却很难真正轻松。","ifChange":"把爱和责任分开，你的温柔会从消耗变成真正的连接。","notRecommended":["在对方没请求时主动接管问题","因为心疼，一次次取消自己的边界","用“只有我懂他”合理化长期失衡"],"plan90":["提供帮助前先问：这是支持，还是替他承担后果","每周安排一件只为自己、无需对任何人有用的事","练习说“我能陪你想办法，但这件事需要你自己完成”"],"closing":"你不必先成为谁的救生圈，才配得到一段完整的爱。"},"HALO":{"typeName":"光环仰望型 · 认可追逐者","subtitle":"你容易被优秀、强大、带着光环的人点燃心动。","posterSubtext":"你迷恋的不只是优秀，也可能是被优秀的人选中的证明。","maturityScore":88,"coreConclusion":"你容易被有能力、有光环、能让你仰望的人吸引，同时也容易在关系里进入证明模式。","diagnosis":"你欣赏能力、见识和进取心，这本身没有问题。真正让你疲惫的是：当心动与认可绑在一起，你会把对方的选择当成自我价值证明。于是你隐藏普通、脆弱和需求，只展示那个更懂事、更优秀、更值得留下的自己。","whatYouReallyWant":"你真正需要的是平等的欣赏。对方可以优秀，但不会用优越感压低你；你可以成长，却不是为了争取被选择。","mechanism":{"title":"熟悉循环：仰望光环 → 努力匹配 → 隐藏需要 → 永远不够","content":"当一个高价值对象认可你，短期会带来强烈自我肯定。为了不失去这份肯定，你会更在意表现，也更难暴露不完美。关系越重要，你反而越不像自己。"},"professionalBasis":"仰慕可以促进成长，但关系若长期建立在评价者与被评价者的位置上，亲密感会被表演感取代。平等并不要求双方一样强，而是双方都拥有完整话语权。","coreTensions":["容易忽略的红旗：习惯比较、贬低、只在你优秀时热情","心动触发点：能力、成就、审美、稀缺感与社会认可","关系卡点：越喜欢越紧张，越不敢表现真实需要"],"suitableIf":["对方欣赏你的能力，也尊重你的普通和脆弱","你不必一直精彩，关系仍然温暖稳定","双方能互相学习，而不是一方长期打分"],"cautionIf":["见面前总想把自己包装得更好","对方一句评价能左右你好几天","你越来越努力，却越来越觉得自己配不上"],"indices":[{"label":"光环敏感度","value":95},{"label":"认可驱动","value":92},{"label":"平等感知","value":69},{"label":"真实表达","value":64},{"label":"成长动机","value":94}],"ifStay":"继续用表现换取爱，你会越来越优秀，却越来越害怕被看见真实的自己。","ifChange":"把欣赏和自我价值分开，你会遇到能互相照亮而非互相评判的人。","notRecommended":["把对方的社会价值当成关系质量","用持续自我提升回避表达需求","接受以玩笑或指导为名的长期贬低"],"plan90":["每次见面后记录：我更自在了，还是更想证明自己","主动表达一个不完美但真实的小需求","把评价对方的标准从“他多厉害”改为“他如何对待我”"],"closing":"值得你靠近的人，会欣赏你的光，也容得下你不发光的时刻。"}},"secondaryNotes":{"ANCHOR":{"DISTANCE":"你的主模式是“安全锚点型”，同时带有“距离追逐型”倾向。真实关系中，你可能在两种脚本之间切换。建议先观察：让你最上头的时刻，究竟来自安心、等待、被需要，还是被认可。","RESCUER":"你的主模式是“安全锚点型”，同时带有“温柔拯救型”倾向。真实关系中，你可能在两种脚本之间切换。建议先观察：让你最上头的时刻，究竟来自安心、等待、被需要，还是被认可。","HALO":"你的主模式是“安全锚点型”，同时带有“光环仰望型”倾向。真实关系中，你可能在两种脚本之间切换。建议先观察：让你最上头的时刻，究竟来自安心、等待、被需要，还是被认可。"},"DISTANCE":{"ANCHOR":"你的主模式是“距离追逐型”，同时带有“安全锚点型”倾向。真实关系中，你可能在两种脚本之间切换。建议先观察：让你最上头的时刻，究竟来自安心、等待、被需要，还是被认可。","RESCUER":"你的主模式是“距离追逐型”，同时带有“温柔拯救型”倾向。真实关系中，你可能在两种脚本之间切换。建议先观察：让你最上头的时刻，究竟来自安心、等待、被需要，还是被认可。","HALO"     <script>
(function () {
  const app = document.getElementById("app");
  const configPaths = ["./configs/site-config.json", "./configs/career-change.json"];

  const state = {
    config: null,
    answers: {},
    profile: { birthDate: "", actualAge: "" },
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);
      applyTheme(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }
      const savedProfile = sessionStorage.getItem(getProfileStorageKey());
      if (savedProfile) {
        state.profile = JSON.parse(savedProfile);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function applyTheme(cfg) {
    Object.entries(cfg.theme || {}).forEach(([name, value]) => {
      document.documentElement.style.setProperty(name, value);
    });
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;

    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {

        state.locked = false;
        state.selected = null;
        renderQuiz();

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {

  function scoreAnswers(answers) {
    if (state.config.scoring?.mode === "psychological-age") {
      return scorePsychologicalAge(answers, state.config.scoring);
    }
    if (state.config.scoring?.mode === "paired-attributes") {
      return scorePairedAttributes(answers, state.config.scoring);
    }
    if (state.config.scoring?.mode === "city-with-elements") {
      return scoreCityWithElements(answers, state.config.scoring);
    }

    const resultKeys = Object.keys(state.config.results || {});
    const counts = Object.fromEntries(resultKeys.map((key) => [key, 0]));
    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey) return;
      const option = (question.options || []).find((item) => item.key === answerKey);
      const weights = option?.weights;
      if (weights && typeof weights === "object") {
        Object.entries(weights).forEach(([key, value]) => {
          if (counts[key] !== undefined) counts[key] += Number(value) || 0;
        });
        return;
      }
      const scoreKey = option?.score || option?.result || answerKey;
      if (counts[scoreKey] !== undefined) counts[scoreKey] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function scorePsychologicalAge(answers, scoring) {
    const answerValues = scoring.answerValues || { A: 1, B: 2, C: 3, D: 4, E: 5 };
    const dimensionLabels = scoring.dimensionLabels || {};
    const dimensionOrder = scoring.dimensionOrder || Object.keys(dimensionLabels);
    const rawTotals = Object.fromEntries(dimensionOrder.map((key) => [key, 0]));
    const rawCounts = Object.fromEntries(dimensionOrder.map((key) => [key, 0]));

    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey || !question.dimension) return;
      const base = Number(answerValues[answerKey] ?? answerValues[String(answerKey)] ?? 0);
      if (!Number.isFinite(base) || base <= 0) return;
      const value = question.reverse ? 6 - base : base;
      rawTotals[question.dimension] = (rawTotals[question.dimension] || 0) + value;
      rawCounts[question.dimension] = (rawCounts[question.dimension] || 0) + 1;
    });

    const dimensions = {};
    dimensionOrder.forEach((key) => {
      const count = rawCounts[key] || 0;
      if (!count) {
        dimensions[key] = 0;
        return;
      }
      const min = count;
      const max = count * 5;
      dimensions[key] = Math.round(((rawTotals[key] - min) / (max - min)) * 100);
    });

    const matureDimensions = scoring.matureDimensions || ["emotion", "responsibility", "resilience", "tolerance", "selfAcceptance"];
    const youthfulDimensions = scoring.youthfulDimensions || ["curiosity", "socialEase", "lifePassion"];
    const matureIndex = average(matureDimensions.map((key) => dimensions[key]));
    const youthfulIndex = average(youthfulDimensions.map((key) => dimensions[key]));
    const actualAge = getActualAge(scoring);
    const psychologicalAge = clamp(
      Math.round(actualAge + (matureIndex - youthfulIndex) * Number(scoring.ageFactor ?? 0.22)),
      Number(scoring.minAge ?? 10),
      Number(scoring.maxAge ?? 70)
    );
    const delta = psychologicalAge - actualAge;
    const primary = getPsychologicalResultKey(delta, scoring);
    const counts = Object.fromEntries(Object.keys(state.config.results || {}).map((key) => [key, key === primary ? (state.config.questions || []).length : 0]));
    const rankedDimensions = dimensionOrder
      .map((key) => ({ key, label: dimensionLabels[key] || key, value: dimensions[key] ?? 0 }))
      .sort((left, right) => right.value - left.value);
    const tags = buildPsychologicalTags(rankedDimensions, delta, primary, scoring);

    return {
      counts,
      primary,
      secondary: null,
      psychological: {
        actualAge,
        psychologicalAge,
        delta,
        ageLabel: getPsychologicalAgeLabel(delta),
        matureIndex: Math.round(matureIndex),
        youthfulIndex: Math.round(youthfulIndex),
        dimensions,
        dimensionLabels,
        dimensionOrder,
        topDimensions: rankedDimensions.slice(0, 3),
        lowDimensions: rankedDimensions.slice(-2).reverse(),
        tags,
      },
    };
  }

  function getActualAge(scoring) {
    const numericAge = Number(state.profile.actualAge);
    if (Number.isFinite(numericAge) && numericAge > 0) return Math.round(numericAge);
    const birthAge = calculateAgeFromBirthDate(state.profile.birthDate);
    if (birthAge) return birthAge;
    return Number(scoring.defaultActualAge || 28);
  }

  function calculateAgeFromBirthDate(value) {
    if (!value) return null;
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return null;
    const now = new Date();
    let age = now.getFullYear() - date.getFullYear();
    const monthDiff = now.getMonth() - date.getMonth();
    if (monthDiff < 0 || (monthDiff === 0 && now.getDate() < date.getDate())) age -= 1;
    return age > 0 ? age : null;
  }

  function getPsychologicalResultKey(delta, scoring) {
    const groups = scoring.ageGroups || [
      { key: "CURIOUS_CHILD", maxDelta: -8 },
      { key: "HOT_BLOODED_TEEN", maxDelta: -3 },
      { key: "BALANCED_YOUTH", maxDelta: 2 },
      { key: "STEADY_ADVISER", maxDelta: 7 },
      { key: "CLEAR_HELM", maxDelta: Infinity },
    ];
    const hit = groups.find((item) => delta <= Number(item.maxDelta));
    return hit?.key || groups[groups.length - 1]?.key || Object.keys(state.config.results || {})[0];
  }

  function getPsychologicalAgeLabel(delta) {
    if (delta <= -8) return "灵魂明显年轻";
    if (delta <= -3) return "少年感在线";
    if (delta <= 2) return "与真实年龄同频";
    if (delta <= 7) return "心智略超前";
    return "灵魂明显成熟";
  }

  function buildPsychologicalTags(rankedDimensions, delta, primary, scoring) {
    const tagMap = scoring.dimensionTags || {};
    const ageTags = scoring.ageTags || {};
    const resultTags = scoring.resultTags || {};
    const tags = rankedDimensions
      .slice(0, 3)
      .map((item) => tagMap[item.key]?.[0] || item.label)
      .filter(Boolean);
    tags.push(ageTags[getPsychologicalAgeLabel(delta)] || getPsychologicalAgeLabel(delta));
    tags.push(resultTags[primary] || "社交原型清晰");
    return [...new Set(tags)].slice(0, 5);
  }

  function scoreCityWithElements(answers, scoring) {
    const resultKeys = Object.keys(state.config.results || {});
    const counts = Object.fromEntries(resultKeys.map((key) => [key, 0]));
    const elementMap = scoring.elementMap || {};
    const elementCounts = {};
    Object.values(elementMap).forEach((element) => { elementCounts[element] = 0; });

    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey) return;
      const option = (question.options || []).find((item) => item.key === answerKey);
      const scoreKey = option?.score || option?.result || answerKey;
      const element = elementMap[scoreKey];
      if (counts[scoreKey] !== undefined) counts[scoreKey] += 1;
      if (element && elementCounts[element] !== undefined) elementCounts[element] += 1;
    });

    const personalityElement = Object.entries(elementCounts).sort((left, right) => right[1] - left[1])[0]?.[0] || "未提供";
    const birthElement = getBirthElement(state.profile.birthDate, scoring);
    const birthWeight = Number(scoring.birthWeight ?? 0.25);
    const combined = Object.fromEntries(resultKeys.map((key) => {
      const birthBonus = elementMap[key] === birthElement ? (state.config.questions.length * birthWeight) : 0;
      return [key, counts[key] + birthBonus];
    }));
    const sorted = Object.entries(combined).sort((left, right) => right[1] - left[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    const personalityShare = counts[primary] / Math.max(1, state.config.questions.length);
    const birthMatch = elementMap[primary] === birthElement;
    const matchScore = Math.round(Math.min(99, 55 + personalityShare * 30 + (birthMatch ? 15 : 5)));
    return {
      counts,
      primary,
      secondary,
      match: { birthElement, personalityElement, elementCounts, matchScore },
    };
  }

  function getBirthElement(value, scoring) {
    if (!value) return "未提供";
    const parts = value.split("-").map(Number);
    if (parts.length !== 3 || parts.some((part) => !Number.isFinite(part))) return "未提供";
    const [year, month, day] = parts;
    const elements = scoring.birthElements || ["木", "火", "土", "金", "水"];
    return elements[Math.abs(year * 13 + month * 7 + day) % elements.length];
  }

  function scorePairedAttributes(answers, scoring) {
    const attributes = Object.fromEntries((scoring.attributes || []).map((key) => [key, 0]));
    const questionsById = Object.fromEntries((state.config.questions || []).map((question) => [question.id, question]));

    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey) return;
      const option = (question.options || []).find((item) => item.key === answerKey);
      (option?.attributes || []).forEach((attribute) => {
        if (attributes[attribute] !== undefined) attributes[attribute] += 1;
      });
    });

    const chosen = (scoring.pairs || []).map(([left, right], index) => {
      if (attributes[left] > attributes[right]) return left;
      if (attributes[right] > attributes[left]) return right;

      const tieQuestionId = scoring.tieBreakers?.[String(index)];
      const tieQuestion = questionsById[tieQuestionId];
      const tieAnswer = tieQuestion && answers[tieQuestionId];
      const tieOption = tieQuestion?.options?.find((item) => item.key === tieAnswer);
      return tieOption?.attributes?.includes(left) ? left : right;
    });

    const primary = chosen.join("");
    const counts = Object.fromEntries(Object.keys(state.config.results || {}).map((key) => [key, key === primary ? (state.config.questions || []).length : 0]));
    const alternate = chosen.slice();
    if (scoring.pairs?.length) {
      const firstPair = scoring.pairs[0];
      alternate[0] = alternate[0] === firstPair[0] ? firstPair[1] : firstPair[0];
    }
    const secondary = alternate.join("") !== primary && state.config.secondaryNotes?.[primary]?.[alternate.join("")] ? alternate.join("") : null;
    return { counts, primary, secondary, attributes };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function getProfileStorageKey() {
    return `xhsTestProfile:${state.config?.slug || "default"}`;
  }

  function getProfileInputValue(inputConfig) {
    if (!inputConfig) return "";
    if (inputConfig.type === "number") return state.profile.actualAge || "";
    return state.profile.birthDate || "";
  }

  function buildProfileFromInput(inputConfig, value) {
    if (inputConfig?.type === "number") {
      return { birthDate: "", actualAge: value };
    }
    return { birthDate: value, actualAge: "" };
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function average(values) {
    const cleanValues = values.map(Number).filter((value) => Number.isFinite(value));
    if (!cleanValues.length) return 0;
    return cleanValues.reduce((sum, value) => sum + value, 0) / cleanValues.length;
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
