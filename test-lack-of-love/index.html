    <script>window.__QUIZ_CONFIG__ = {"slug":"test-lack-of-love","topic":"你算不算一个缺爱的人？","kicker":"32-Q Attachment Self-Check","title":"你算不算一个缺爱的人？","subtitle":"32 道题，看清你在亲密关系里更容易反复求证、讨好补偿、回避自保，还是稳定自养。","metaDescription":"完成 32 道缺爱感自测，生成你的亲密关系模式、核心需求和自我修复提醒。","startButton":"开始测试","resultKicker":"Attachment Report","quizHint":"凭第一反应选择，系统会自动进入下一题","copyButton":"复制我的结果","restartButton":"重新测试","scoreLabel":"关系安全感","stageLabel":"当前安全感阶段","stageLabels":[{"max":55,"label":"安全感觉察期"},{"max":72,"label":"旧模式松动期"},{"max":86,"label":"自我安顿期"},{"max":100,"label":"稳定亲密期"}],"compareLabels":["如果继续用旧模式爱人","如果把爱放回自己身上"],"disclaimer":"本测试为趣味亲密关系自我观察工具，仅讨论依恋反应、需求表达和情绪模式，不代表心理诊断、人格评估或亲密关系建议。若长期痛苦或影响生活，请寻求专业人士帮助。","secondaryThreshold":4,"dimensions":["求证感","讨好感","回避感","自养感"],"intro":["很多人以为缺爱，就是没人爱。","但更真实的情况是：有人越被喜欢越害怕失去，有人越委屈越懂事，有人明明想靠近却先退后，也有人正在学会把安全感一点点放回自己身上。","32 道题会从被在意感、亲密反应、需求表达、讨好边界、自我价值、冲突修复、自我滋养和关系模式 8 个模块，生成你的缺爱感自测报告。"],"loadingMessages":["正在读取你的亲密关系第一反应...","正在拆分求证、讨好、回避和自养模式...","正在识别你最需要被看见的情感需求...","正在生成 32 题缺爱感自测报告...","分析完成。"],"questions":[{"id":1,"module":"被在意感","text":"对方突然很久没回消息，你第一反应更像：","options":[{"key":"A","text":"忍不住反复看聊天框，开始猜自己是不是被冷淡了"},{"key":"B","text":"先想是不是自己哪里说错了，想补一句让气氛好一点"},{"key":"C","text":"直接把期待收回来，告诉自己别这么在意"},{"key":"D","text":"会有点失落，但先看事实，不立刻给关系下结论"}]},{"id":2,"module":"被在意感","text":"你最容易被哪种细节击中：","options":[{"key":"A","text":"对方语气突然变淡，哪怕只是少了几个字"},{"key":"B","text":"对方好像不开心，你会担心是不是自己没照顾好"},{"key":"C","text":"对方靠太近或问太多，你会本能想后退"},{"key":"D","text":"对方前后不一致，你会观察，但不会马上慌"}]},{"id":3,"module":"被在意感","text":"如果一个人主动关心你，你更容易：","options":[{"key":"A","text":"很开心，但也会担心这份关心会不会很快消失"},{"key":"B","text":"立刻想回报对方，不想欠别人太多"},{"key":"C","text":"表面淡淡的，心里其实会记很久"},{"key":"D","text":"舒服地收下，也能自然表达感谢"}]},{"id":4,"module":"被在意感","text":"你最怕关系里出现哪种感觉：","options":[{"key":"A","text":"我好像一直在等对方证明还爱我"},{"key":"B","text":"我一直在付出，但还是不确定自己够不够好"},{"key":"C","text":"我一旦认真，就可能被拿捏或受伤"},{"key":"D","text":"双方都不说真实需求，慢慢变远"}]},{"id":5,"module":"亲密反应","text":"关系刚变亲近时，你更像：","options":[{"key":"A","text":"越喜欢越容易患得患失，想确认对方是不是一样认真"},{"key":"B","text":"会下意识变得更懂事，希望自己不要给对方添麻烦"},{"key":"C","text":"会突然想保持距离，怕太近之后失控"},{"key":"D","text":"能享受靠近，也保留自己的节奏和生活"}]},{"id":6,"module":"亲密反应","text":"别人说你在关系里很敏感，你心里可能会想：","options":[{"key":"A","text":"我不是敏感，我只是太怕被忽略了"},{"key":"B","text":"是不是我又让别人觉得有压力了"},{"key":"C","text":"那我干脆什么都不说，省得麻烦"},{"key":"D","text":"我可以敏感，但也需要学会确认事实"}]},{"id":7,"module":"亲密反应","text":"你表达喜欢时，最常见的方式是：","options":[{"key":"A","text":"想知道对方有没有同等回应，回应越明确越安心"},{"key":"B","text":"多照顾、多迁就、多替对方想，把喜欢做出来"},{"key":"C","text":"不太主动说，怕说出来之后自己变被动"},{"key":"D","text":"会表达，也会观察对方是否真的适合继续靠近"}]},{"id":8,"module":"亲密反应","text":"如果对方突然冷淡，你更可能：","options":[{"key":"A","text":"不断回想细节，想找出关系变了的证据"},{"key":"B","text":"先降低自己的需求，努力让对方轻松一点"},{"key":"C","text":"立刻冷下来，不想让对方看出你受影响"},{"key":"D","text":"找合适时机沟通，不把所有问题都归因到自己"}]},{"id":9,"module":"需求表达","text":"当你很想被陪伴时，你通常会：","options":[{"key":"A","text":"拐弯抹角试探，希望对方主动发现"},{"key":"B","text":"先压下去，怕自己的需求让别人为难"},{"key":"C","text":"嘴上说不用，心里却越来越关门"},{"key":"D","text":"尽量直接说出需要，也接受对方有自己的安排"}]},{"id":10,"module":"需求表达","text":"你最不擅长说出口的是：","options":[{"key":"A","text":"你能不能多在意我一点"},{"key":"B","text":"我其实不想一直这么懂事"},{"key":"C","text":"我也会想你，也会需要你"},{"key":"D","text":"这件事让我不舒服，我们能不能谈谈"}]},{"id":11,"module":"需求表达","text":"如果你提出需求被拒绝，你更容易：","options":[{"key":"A","text":"觉得自己不重要，开始怀疑对方的爱"},{"key":"B","text":"马上说没关系，然后把失落藏起来"},{"key":"C","text":"以后都不提了，避免再次尴尬"},{"key":"D","text":"会难过，但能区分被拒绝的是需求，不是整个人"}]},{"id":12,"module":"需求表达","text":"你最羡慕哪种人：","options":[{"key":"A","text":"能被坚定选择，不用反复证明自己值得爱"},{"key":"B","text":"不用讨好也有人愿意留下来"},{"key":"C","text":"敢需要别人，也不怕显得脆弱"},{"key":"D","text":"能爱人，也能好好爱自己"}]},{"id":13,"module":"讨好边界","text":"别人情绪不好时，你更容易：","options":[{"key":"A","text":"紧张对方是不是不想理你了"},{"key":"B","text":"马上进入照顾模式，想让对方舒服一点"},{"key":"C","text":"往后退，不想卷进别人的情绪里"},{"key":"D","text":"关心对方，但不会把所有情绪都揽到自己身上"}]},{"id":14,"module":"讨好边界","text":"你在关系里最容易委屈自己的地方是：","options":[{"key":"A","text":"对方一点冷淡，我就开始降低自己的位置"},{"key":"B","text":"明明不舒服，还要表现得很体贴"},{"key":"C","text":"明明想靠近，却先装作不需要"},{"key":"D","text":"有时太理性，忘了给自己的感受留空间"}]},{"id":15,"module":"讨好边界","text":"当你想拒绝别人时，你最怕：","options":[{"key":"A","text":"对方因此不喜欢我，关系变淡"},{"key":"B","text":"对方觉得我自私、不够好"},{"key":"C","text":"解释太多会暴露我的在意"},{"key":"D","text":"拒绝方式伤人，所以需要把边界说清楚"}]},{"id":16,"module":"讨好边界","text":"你最希望自己在关系里学会：","options":[{"key":"A","text":"不靠反复确认来获得安全感"},{"key":"B","text":"不靠过度付出来证明自己值得爱"},{"key":"C","text":"不靠假装无所谓来保护自己"},{"key":"D","text":"既能亲密，也能保持独立和边界"}]},{"id":17,"module":"自我价值","text":"你最容易在哪个瞬间怀疑自己不值得被爱：","options":[{"key":"A","text":"对方没有及时回应我的期待"},{"key":"B","text":"我付出了很多，对方却没有看见"},{"key":"C","text":"我暴露需求后，对方没有接住"},{"key":"D","text":"我状态很差，开始把一切都往自己身上揽"}]},{"id":18,"module":"自我价值","text":"你对“被爱”的理解更接近：","options":[{"key":"A","text":"对方能持续回应我、选择我、让我安心"},{"key":"B","text":"我做得够好、够懂事，对方自然会珍惜我"},{"key":"C","text":"最好不要太依赖别人，这样就不会太痛"},{"key":"D","text":"爱是互相靠近，也允许彼此是独立的人"}]},{"id":19,"module":"自我价值","text":"你最想从关系里得到的，其实是：","options":[{"key":"A","text":"稳定感"},{"key":"B","text":"被肯定感"},{"key":"C","text":"安全距离"},{"key":"D","text":"真实连接"}]},{"id":20,"module":"自我价值","text":"你最容易被哪句话安抚：","options":[{"key":"A","text":"我在，我没有不想理你"},{"key":"B","text":"你不用一直这么懂事，我也会在意你"},{"key":"C","text":"你可以慢慢来，不用马上交出全部自己"},{"key":"D","text":"你的感受是重要的，我们可以一起处理"}]},{"id":21,"module":"冲突修复","text":"吵架之后，你最常见的状态是：","options":[{"key":"A","text":"想赶紧确认关系还好吗，怕对方不爱了"},{"key":"B","text":"先道歉、先缓和，哪怕心里还有委屈"},{"key":"C","text":"沉默冷处理，等自己完全安全了再说"},{"key":"D","text":"先冷静，再讨论具体问题和彼此感受"}]},{"id":22,"module":"冲突修复","text":"冲突里你最容易做出的反应是：","options":[{"key":"A","text":"追问、确认、想立刻要一个答案"},{"key":"B","text":"压住自己的委屈，先让对方别生气"},{"key":"C","text":"关闭沟通，不想继续暴露情绪"},{"key":"D","text":"表达立场，也愿意听对方真实想法"}]},{"id":23,"module":"冲突修复","text":"你最怕哪种冲突结局：","options":[{"key":"A","text":"对方不解释，也不给你任何确定感"},{"key":"B","text":"你退让了很多，最后还是没人心疼你"},{"key":"C","text":"你一认真，对方就掌握了伤害你的入口"},{"key":"D","text":"问题没有被处理，只是暂时翻篇"}]},{"id":24,"module":"冲突修复","text":"如果关系要修复，你最需要：","options":[{"key":"A","text":"明确回应，让我知道你还在"},{"key":"B","text":"看见我的付出，也看见我的委屈"},{"key":"C","text":"给我空间，但不要用冷漠惩罚我"},{"key":"D","text":"双方都愿意讲真话，也愿意调整"}]},{"id":25,"module":"自我滋养","text":"一个人独处时，你更容易：","options":[{"key":"A","text":"想起关系里的细节，越想越不安"},{"key":"B","text":"反省自己是不是哪里做得还不够"},{"key":"C","text":"把自己封起来，假装什么都不需要"},{"key":"D","text":"整理情绪，做一点能让自己回到稳定的事"}]},{"id":26,"module":"自我滋养","text":"你最需要补上的能力是：","options":[{"key":"A","text":"不用别人立刻回应，也能先稳住自己"},{"key":"B","text":"不用一直表现很好，也相信自己值得被爱"},{"key":"C","text":"不用假装不需要，也敢承认自己的渴望"},{"key":"D","text":"在关系和自我之间保持流动"}]},{"id":27,"module":"自我滋养","text":"你觉得真正被爱的人，最明显的状态是：","options":[{"key":"A","text":"不需要反复猜，因为心里很笃定"},{"key":"B","text":"不用过度懂事，也有人接住她的真实"},{"key":"C","text":"敢靠近，也不怕被看见脆弱"},{"key":"D","text":"能爱别人，也不会丢掉自己"}]},{"id":28,"module":"自我滋养","text":"你最想对过去的自己说：","options":[{"key":"A","text":"不是每一次冷淡，都证明你不值得被爱"},{"key":"B","text":"你不用一直做得很好，才配被留下"},{"key":"C","text":"你可以需要别人，这不丢人"},{"key":"D","text":"你值得被爱，也值得被自己好好照顾"}]},{"id":29,"module":"关系模式","text":"你最像哪种关系循环：","options":[{"key":"A","text":"越在意越想确认，越确认越怕失去"},{"key":"B","text":"越害怕失去越付出，越付出越委屈"},{"key":"C","text":"越想靠近越后退，越后退越孤单"},{"key":"D","text":"会受影响，但能逐渐回到沟通和自我安顿"}]},{"id":30,"module":"关系模式","text":"你最想摆脱的是：","options":[{"key":"A","text":"反复内耗对方爱不爱我"},{"key":"B","text":"用懂事和付出来换安全感"},{"key":"C","text":"明明渴望爱，却总把人推远"},{"key":"D","text":"明明知道怎么做，却偶尔还是被旧模式拉回去"}]},{"id":31,"module":"关系模式","text":"如果用一句话形容你的“缺爱感”，更像：","options":[{"key":"A","text":"我需要被反复选择，才敢相信自己重要"},{"key":"B","text":"我需要足够有用，才敢相信自己会被留下"},{"key":"C","text":"我需要不需要别人，才敢相信自己安全"},{"key":"D","text":"我有渴望，但正在学会不让渴望吞掉自己"}]},{"id":32,"module":"关系模式","text":"做完这 32 题，你最想得到的答案是：","options":[{"key":"A","text":"我为什么总需要确认别人还爱我"},{"key":"B","text":"我为什么总用懂事和付出去换爱"},{"key":"C","text":"我为什么明明想被爱，却总装作不需要"},{"key":"D","text":"我怎样把爱放回自己身上，同时保留亲密"}]}],"results":{"A":{"typeName":"反复求证型","subtitle":"你缺的不是爱本身，而是稳定被选择、被回应、被放在心上的感觉。","posterSubtext":"你不是太敏感，你只是太怕爱突然消失。","maturityScore":72,"coreConclusion":"你的答案显示，你在关系里很容易捕捉到细小变化。对方语气淡一点、回复慢一点、态度含糊一点，你都可能立刻进入不安和猜测。你真正想要的不是控制对方，而是一个明确的信号：我还在，我没有把你丢下。 这种模式常见于曾经反复得不到稳定回应的人。你会把很多精力用在确认爱是否还在，于是越在意越焦虑，越焦虑越想抓住。你的课题不是让自己变冷，而是学会先安顿自己，再去确认事实。","diagnosis":"你的答案显示，你在关系里很容易捕捉到细小变化。对方语气淡一点、回复慢一点、态度含糊一点，你都可能立刻进入不安和猜测。你真正想要的不是控制对方，而是一个明确的信号：我还在，我没有把你丢下。","whatYouReallyWant":"这种模式常见于曾经反复得不到稳定回应的人。你会把很多精力用在确认爱是否还在，于是越在意越焦虑，越焦虑越想抓住。你的课题不是让自己变冷，而是学会先安顿自己，再去确认事实。","mechanism":{"title":"回应饥饿机制","content":"反复求证型的核心，是对回应和确定性的高度敏感。优势是很会感受关系温度，风险是容易把对方的普通状态波动理解成关系危机。"},"professionalBasis":["从被在意感看，你对语气、频率和回应速度很敏感。","从冲突修复看，你更需要明确回应，而不是冷处理或含糊带过。","从关系模式看，你容易进入越想确认越怕失去的循环。"],"coreTensions":["需要回应","害怕被丢下","容易过度解读","很重视确定感","需要自我安顿"],"suitableIf":["稳定表达型关系","慢热但可靠的人","清晰沟通","情绪复盘","自我安抚练习"],"cautionIf":["把延迟回复等同于不爱","用追问代替沟通","反复试探对方","把关系安全感完全交给别人"],"indices":[{"label":"回应敏感度","value":92},{"label":"被选择需求","value":89},{"label":"情绪捕捉力","value":86},{"label":"自我安抚课题","value":68}],"ifStay":"如果你一直把安全感放在对方的即时回应里，关系会变得很累，你也很难真正放松。","ifChange":"如果你能把确认需求说清楚，同时练习自己稳住自己，你会从患得患失变成更真实、更有力量的亲密。","notRecommended":["把延迟回复等同于不爱","用追问代替沟通","反复试探对方","把关系安全感完全交给别人"],"plan90":[{"title":"第 1 周：区分事实和脑补","content":"把对方真实做了什么、你脑中推测了什么分开写下。"},{"title":"第 2-3 周：延迟追问","content":"很想确认时先给自己 20 分钟，让情绪峰值过去再表达。"},{"title":"第 4-6 周：说需求而不是审问","content":"把“你是不是不爱我了”换成“我现在有点不安，想要一个明确回应”。"},{"title":"第 7-12 周：建立自己的稳定来源","content":"把一部分注意力放回生活、朋友、身体和长期目标。"}],"closing":"你不是不能爱，你只是需要学会：被爱很重要，但你的稳定不能只靠别人给。"},"B":{"typeName":"讨好补偿型","subtitle":"你习惯用懂事、付出和照顾别人，来换一种“我值得被留下”的安全感。","posterSubtext":"你不是太懂事，你是太怕真实的自己不被爱。","maturityScore":70,"coreConclusion":"你的答案显示，你在关系里很容易先照顾别人。对方不开心，你会先反思自己；关系变冷，你会先多做一点；明明委屈，也会说没关系。你不是没有需求，而是太习惯把需求藏在懂事后面。 你真正想要的是被看见，不只是被需要。你希望有人发现你其实也累、也委屈、也想被主动照顾。你的课题是把“我够好才配被爱”，慢慢改成“我真实也值得被爱”。","diagnosis":"你的答案显示，你在关系里很容易先照顾别人。对方不开心，你会先反思自己；关系变冷，你会先多做一点；明明委屈，也会说没关系。你不是没有需求，而是太习惯把需求藏在懂事后面。","whatYouReallyWant":"你真正想要的是被看见，不只是被需要。你希望有人发现你其实也累、也委屈、也想被主动照顾。你的课题是把“我够好才配被爱”，慢慢改成“我真实也值得被爱”。","mechanism":{"title":"懂事换爱机制","content":"讨好补偿型的核心，是用付出降低被抛下的风险。优势是体贴、共情强、愿意经营关系；风险是长期压抑自己，最后变成委屈和怨气。"},"professionalBasis":["从需求表达看，你容易先压下自己的需要，怕给别人添麻烦。","从讨好边界看，你会把别人的情绪过度揽到自己身上。","从自我价值看，你容易把自己是否值得爱，和自己是否足够好绑定。"],"coreTensions":["过度懂事","害怕麻烦别人","付出很多","委屈后知后觉","需要练习被看见"],"suitableIf":["会回应的人","互相照顾型关系","清晰边界","情绪表达练习","自我价值重建"],"cautionIf":["用付出换承诺","把不舒服说成没事","习惯先道歉","把别人的情绪当成自己的责任"],"indices":[{"label":"照顾他人度","value":94},{"label":"自我压抑度","value":88},{"label":"共情敏感度","value":86},{"label":"边界表达课题","value":66}],"ifStay":"如果你一直用懂事换爱，别人可能习惯你的付出，却忘了你也需要被照顾。","ifChange":"如果你敢把需求说出来，你会发现真正健康的关系，不会因为你不再讨好就离开。","notRecommended":["用付出换承诺","把不舒服说成没事","习惯先道歉","把别人的情绪当成自己的责任"],"plan90":[{"title":"第 1 周：停止自动说没事","content":"每次想说没事前，先问自己：我真的没事吗？"},{"title":"第 2-3 周：练习小需求","content":"从一个很小的请求开始，让自己体验被回应。"},{"title":"第 4-6 周：识别过度责任","content":"别人的情绪可以关心，但不必全部由你解决。"},{"title":"第 7-12 周：把价值感收回来","content":"每天记录一件不靠付出也能证明你值得被爱的事。"}],"closing":"你值得被爱，不是因为你一直很好用，而是因为你本来就很珍贵。"},"C":{"typeName":"回避自保型","subtitle":"你看起来不缺爱，甚至很独立，但内心深处很怕需要别人之后失去主动权。","posterSubtext":"你不是没有需求，你只是太擅长把需求藏起来。","maturityScore":74,"coreConclusion":"你的答案显示，你在关系里很会保护自己。一旦感觉太近、太依赖、太暴露，你就会下意识后退。你不是冷漠，也不是不想被爱，而是很怕自己真的需要之后，对方却接不住。 你真正想要的是既能被爱，又不用失去安全距离。你害怕的是脆弱被看见后变成把柄。你的课题不是逼自己立刻敞开，而是让自己慢慢相信：靠近不等于被拿捏，需要不等于失败。","diagnosis":"你的答案显示，你在关系里很会保护自己。一旦感觉太近、太依赖、太暴露，你就会下意识后退。你不是冷漠，也不是不想被爱，而是很怕自己真的需要之后，对方却接不住。","whatYouReallyWant":"你真正想要的是既能被爱，又不用失去安全距离。你害怕的是脆弱被看见后变成把柄。你的课题不是逼自己立刻敞开，而是让自己慢慢相信：靠近不等于被拿捏，需要不等于失败。","mechanism":{"title":"回避防御机制","content":"回避自保型的核心，是通过降低期待来减少受伤概率。优势是独立、清醒、不容易被关系吞没；风险是把想要爱的人推远，也让自己长期孤单。"},"professionalBasis":["从亲密反应看，你越在意越容易后退，怕自己变被动。","从需求表达看，你嘴上说不用，心里却可能慢慢关门。","从关系模式看，你容易用假装不需要来保护自己。"],"coreTensions":["表面独立","害怕暴露需求","习惯后退","渴望又防御","需要安全靠近"],"suitableIf":["尊重边界的人","低压亲密","慢节奏关系","稳定陪伴","安全表达练习"],"cautionIf":["把冷淡当保护","用消失测试关系","不表达却希望被懂","把需要别人等同于软弱"],"indices":[{"label":"自我保护度","value":93},{"label":"独立感","value":90},{"label":"亲密防御度","value":87},{"label":"表达脆弱课题","value":64}],"ifStay":"如果你一直靠后退保护自己，你会安全一点，但也可能错过真正愿意靠近你的人。","ifChange":"如果你能在安全的人面前一点点表达需要，你的独立会变得更柔软，关系也会更有温度。","notRecommended":["把冷淡当保护","用消失测试关系","不表达却希望被懂","把需要别人等同于软弱"],"     <script>
(function () {
  const app = document.getElementById("app");
  const configPaths = ["./configs/site-config.json", "./configs/career-change.json"];

  const state = {
    config: null,
    answers: {},
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    const counts = { A: 0, B: 0, C: 0, D: 0 };
    Object.values(answers).forEach((key) => {
      if (counts[key] !== undefined) counts[key] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
</html>
