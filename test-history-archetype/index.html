响结果"},{"key":"B","text":"稳定秩序，让大家知道事情该怎么推进"},{"key":"C","text":"提出新办法，把大家从卡住的地方带出去"},{"key":"D","text":"保持独立，不急着站队，但会清楚表达立场"}]},{"id":6,"module":"关系策略","text":"别人向你求助时，你通常会：","options":[{"key":"A","text":"先分析他真正的问题在哪里，而不是只听表面说法"},{"key":"B","text":"帮他拆步骤、定责任、把事情推进下去"},{"key":"C","text":"直接给一个能动起来的方案，先别原地耗着"},{"key":"D","text":"先确认这件事值不值得帮，不能违背我的原则"}]},{"id":7,"module":"关系策略","text":"你最擅长处理哪类人际局面？","options":[{"key":"A","text":"各方都有算盘，需要看懂暗线和真实目的"},{"key":"B","text":"大家都很混乱，需要有人稳定场面和分工"},{"key":"C","text":"所有人都不敢动，需要有人先打破僵局"},{"key":"D","text":"氛围很浑浊，需要有人说真话、守底线"}]},{"id":8,"module":"关系策略","text":"你在人际关系里最讨厌什么？","options":[{"key":"A","text":"明明有利益冲突，却假装全是感情"},{"key":"B","text":"没有边界、没有责任、谁都不把话说清"},{"key":"C","text":"拖拖拉拉，大家都在等一个不存在的完美时机"},{"key":"D","text":"为了合群而违心，明明不认同还要陪笑"}]},{"id":9,"module":"权力感","text":"如果你拥有更大的影响力，你最想用它来：","options":[{"key":"A","text":"重新布局资源，让事情按更聪明的方式运转"},{"key":"B","text":"建立秩序，让重要的人和事各归其位"},{"key":"C","text":"打开新局面，让停滞的东西重新流动起来"},{"key":"D","text":"保护自己认同的价值，不被现实轻易碾碎"}]},{"id":10,"module":"权力感","text":"你对“上位”的真实态度更接近：","options":[{"key":"A","text":"位置本身不重要，重要的是能不能掌握关键节点"},{"key":"B","text":"位置很重要，因为责任和资源需要名分支撑"},{"key":"C","text":"我不一定走传统上位路线，但我必须有选择权"},{"key":"D","text":"我可以不在高位，但不能丢掉尊严和独立判断"}]},{"id":11,"module":"权力感","text":"你最怕自己被放在哪种位置？","options":[{"key":"A","text":"看得懂局势，却没有任何可以落子的空间"},{"key":"B","text":"承担责任，却没有足够的话语权和资源"},{"key":"C","text":"被安排在稳定但毫无突破可能的位置"},{"key":"D","text":"为了利益被迫说违心话、做违心事"}]},{"id":12,"module":"权力感","text":"面对强势的人，你更可能：","options":[{"key":"A","text":"先观察他的弱点、需求和真正意图"},{"key":"B","text":"用规则、责任和事实把边界讲清楚"},{"key":"C","text":"找机会证明我不是只能被他压着的人"},{"key":"D","text":"不盲从，也不讨好，必要时直接保持距离"}]},{"id":13,"module":"行动方式","text":"你做重大选择时，最常用的方式是：","options":[{"key":"A","text":"先谋后动，尽量把后果和变量都推演一遍"},{"key":"B","text":"先评估稳定性和可持续性，再做决定"},{"key":"C","text":"先试一小步，边走边调整，比原地想更有效"},{"key":"D","text":"先问自己是否愿意为这个选择负责到底"}]},{"id":14,"module":"行动方式","text":"你最容易在哪个阶段变强？","options":[{"key":"A","text":"局势越复杂，越能激发我的判断和谋划"},{"key":"B","text":"责任越重，越能逼出我的稳定和统筹"},{"key":"C","text":"环境越不确定，越能逼出我的胆量和创造力"},{"key":"D","text":"别人越不理解，越能逼出我的定力和风骨"}]},{"id":15,"module":"行动方式","text":"如果事情失败，你最先复盘：","options":[{"key":"A","text":"是不是误判了人心、利益和时机"},{"key":"B","text":"是不是责任、流程和执行没有落稳"},{"key":"C","text":"是不是行动太晚，错过了最佳突破口"},{"key":"D","text":"是不是为了结果牺牲了不该牺牲的东西"}]},{"id":16,"module":"行动方式","text":"你最不能忍受的低效是：","options":[{"key":"A","text":"看不懂局，还在凭情绪乱做决定"},{"key":"B","text":"没有标准和节奏，事情一直散着推进"},{"key":"C","text":"所有人都只会讨论风险，没有人敢试"},{"key":"D","text":"大家都知道不对，却没人愿意说真话"}]},{"id":17,"module":"内在矛盾","text":"你最隐秘的压力来自：","options":[{"key":"A","text":"我看得太清，所以很难真正轻松相信别人"},{"key":"B","text":"我总要稳住局面，所以很少允许自己崩掉"},{"key":"C","text":"我总想改变现状，所以很难接受平庸稳定"},{"key":"D","text":"我太在意真实和尊严，所以常常显得不合群"}]},{"id":18,"module":"内在矛盾","text":"你最容易被哪种评价刺痛？","options":[{"key":"A","text":"你是不是太会算计，没那么真诚"},{"key":"B","text":"你是不是太守旧，不够有想象力"},{"key":"C","text":"你是不是太不安分，不能踏实一点"},{"key":"D","text":"你是不是太清高，不懂现实规则"}]},{"id":19,"module":"内在矛盾","text":"你最想被人真正理解的是：","options":[{"key":"A","text":"我不是冷，我只是习惯先看清局面再投入"},{"key":"B","text":"我不是无趣，我只是知道稳定背后需要代价"},{"key":"C","text":"我不是鲁莽，我只是受不了一直被困在原地"},{"key":"D","text":"我不是不懂妥协，我只是有些东西不能卖掉"}]},{"id":20,"module":"内在矛盾","text":"你最需要补上的一课是：","options":[{"key":"A","text":"别把所有关系都看成局，也要允许真诚发生"},{"key":"B","text":"别把所有责任都背起来，也要允许自己松动"},{"key":"C","text":"别把所有稳定都看成束缚，也要学会长期积累"},{"key":"D","text":"别把所有妥协都看成背叛，也要学会策略性表达"}]},{"id":21,"module":"现实剧本","text":"放到现代职场，你更像哪种人？","options":[{"key":"A","text":"能看懂组织暗线和利益结构的策略型人物"},{"key":"B","text":"能撑住项目、团队和长期结果的中枢型人物"},{"key":"C","text":"能开新业务、找新路径、打破僵局的突破型人物"},{"key":"D","text":"能守住专业、原则和个人表达的独立型人物"}]},{"id":22,"module":"现实剧本","text":"如果做副业或个人品牌，你更适合：","options":[{"key":"A","text":"做洞察、咨询、策略、拆解和判断类内容"},{"key":"B","text":"做体系、管理、方法论、长期陪跑类内容"},{"key":"C","text":"做实验、挑战、转型、破局类内容"},{"key":"D","text":"做观点、审美、文化、价值表达类内容"}]},{"id":23,"module":"现实剧本","text":"你最容易吸引哪类人信任你？","options":[{"key":"A","text":"想看清复杂局面、需要判断和方向的人"},{"key":"B","text":"需要秩序、稳定、执行和长期规划的人"},{"key":"C","text":"卡在原地、需要勇气和突破口的人"},{"key":"D","text":"不想随波逐流、需要精神共鸣的人"}]},{"id":24,"module":"现实剧本","text":"你最适合被放大的优势是：","options":[{"key":"A","text":"洞察力、布局力、判断人心和时机的能力"},{"key":"B","text":"责任感、稳定性、组织和长期经营能力"},{"key":"C","text":"行动力、创造力、试错和重新开局能力"},{"key":"D","text":"表达力、审美力、原则感和精神影响力"}]},{"id":25,"module":"历史映射","text":"如果在历史里，你更像哪种角色？","options":[{"key":"A","text":"军师、谋臣、幕僚、能在背后影响大局的人"},{"key":"B","text":"宰辅、统帅、守成者、能把秩序撑起来的人"},{"key":"C","text":"开拓者、改革者、游侠、能把死局打穿的人"},{"key":"D","text":"文人、隐士、谏臣、能用风骨留下名字的人"}]},{"id":26,"module":"历史映射","text":"你最欣赏哪种历史人物？","options":[{"key":"A","text":"不一定站在台前，但能决定关键走向的人"},{"key":"B","text":"能承担重任、稳住时代秩序的人"},{"key":"C","text":"敢改变规则、开出一条新路的人"},{"key":"D","text":"身处逆境也不丢掉人格和表达的人"}]},{"id":27,"module":"历史映射","text":"你觉得自己年轻时最明显的问题是：","options":[{"key":"A","text":"想得太深，容易对人和事提前失望"},{"key":"B","text":"太想稳住所有东西，容易忽略自己的渴望"},{"key":"C","text":"太急着证明自己，容易低估长期积累"},{"key":"D","text":"太在意对错和尊严，容易不愿解释自己"}]},{"id":28,"module":"历史映射","text":"你最希望自己最终被记住为：","options":[{"key":"A","text":"那个看清大势、关键时刻做对判断的人"},{"key":"B","text":"那个稳住局面、让很多事真正落地的人"},{"key":"C","text":"那个不认命、把不可能变成可能的人"},{"key":"D","text":"那个没有随波逐流、一直保留自己的人"}]},{"id":29,"module":"最终选择","text":"如果历史给你一个位置，你最想拿到：","options":[{"key":"A","text":"幕后执棋者：不一定最显眼，但能影响结局"},{"key":"B","text":"中枢掌舵者：承担责任，也拥有位置和秩序"},{"key":"C","text":"乱世破局者：不等别人允许，自己开路"},{"key":"D","text":"清醒风骨者：不迎合时代，也能留下精神坐标"}]},{"id":30,"module":"最终选择","text":"你现在最该发展的能力是：","options":[{"key":"A","text":"把洞察变成可执行的策略，而不是只看透"},{"key":"B","text":"把责任变成权力边界，而不是只兜底"},{"key":"C","text":"把胆量变成稳定系统，而不是只靠冲劲"},{"key":"D","text":"把原则变成有效表达，而不是只保持沉默"}]},{"id":31,"module":"最终选择","text":"你做这个测试，最想确认的是：","options":[{"key":"A","text":"我是不是天生适合谋局、判断和看懂复杂人性"},{"key":"B","text":"我是不是适合承担责任、长期经营和稳定掌舵"},{"key":"C","text":"我是不是有不认命、能重启人生的破局能力"},{"key":"D","text":"我是不是有自己的风骨，不适合被普通规则驯化"}]},{"id":32,"module":"最终选择","text":"凭第一反应，你更像哪种历史人格？","options":[{"key":"A","text":"谋局者：看得深、想得远，擅长在复杂局势里落子"},{"key":"B","text":"掌舵者：稳、能担事，适合做秩序和长期结果的中枢"},{"key":"C","text":"破局者：不安分、不认命，擅长打破旧局和重启人生"},{"key":"D","text":"风骨者：清醒、有原则，不愿为了合群失去自己"}]}],"results":{"A":{"typeName":"谋局者原型","subtitle":"你的历史人格接近诸葛亮、张良、司马懿这一类人：不急着站到台前，但会先看清大势、人心和关键节点。","posterSubtext":"你不是想太多，你是天生习惯先看清局，再决定怎么落子。","maturityScore":90,"coreConclusion":"你的答案显示，你在复杂局面里会先观察结构、利益、人心和时机。你不太相信表面的热闹，更在意事情背后的真实逻辑。你的优势是洞察力、策略感和提前推演能力；风险是容易把关系也看成局，太早失望，太难完全放松信任。 你真正想要的不是单纯赢一次，而是拥有判断局势和影响结局的能力。你希望自己不是被局势推着走的人，而是能在关键时刻看懂选择、做出布局的人。","diagnosis":"你的答案显示，你在复杂局面里会先观察结构、利益、人心和时机。你不太相信表面的热闹，更在意事情背后的真实逻辑。你的优势是洞察力、策略感和提前推演能力；风险是容易把关系也看成局，太早失望，太难完全放松信任。","whatYouReallyWant":"你真正想要的不是单纯赢一次，而是拥有判断局势和影响结局的能力。你希望自己不是被局势推着走的人，而是能在关键时刻看懂选择、做出布局的人。","mechanism":{"title":"历史人物匹配","content":"你更接近诸葛亮的审慎谋划、张良的全局判断，以及司马懿的忍耐和时机感。你的人生关键词是：看清、布局、等待、落子。"},"professionalBasis":["判断方式上，你更依赖局势分析，而不是单点情绪反应。","关系策略上，你会先看清谁能结盟、谁会影响结果。","现实剧本上，你适合做策略、洞察、咨询、拆解和方向判断类角色。"],"coreTensions":["看得深","想得远","不轻易信任","擅长推演","需要练习真诚连接"],"suitableIf":["策略咨询","商业拆解","组织洞察","内容分析","投资判断","复杂项目规划"],"cautionIf":["过度猜测","太晚行动","把关系全看成博弈","看透后失去热情"],"indices":[{"label":"局势洞察","value":94},{"label":"判断力","value":91},{"label":"忍耐力","value":86},{"label":"行动外显","value":68},{"label":"关系信任","value":64}],"ifStay":"如果你只停留在看透和推演里，你会越来越聪明，也越来越难真正进入生活。","ifChange":"当你把洞察变成具体行动和可交付结果，你的谋局能力会成为真正的影响力。","notRecommended":["过度猜测","太晚行动","把关系全看成博弈","看透后失去热情"],"plan90":[{"title":"第1-2周：把判断写成方案","content":"每次看清一个问题后，补上可执行的第一步，不只停在分析。"},{"title":"第3-4周：减少无效推演","content":"对无法验证的人心和猜测设置停止线，避免长期内耗。"},{"title":"第2个月：建立你的策略作品","content":"把你擅长的拆解、判断和方法论做成内容或服务。"},{"title":"第3个月：练习明确表达立场","content":"不要只做幕后观察者，关键场合要让别人看见你的判断价值。"}],"closing":"谋局者真正的上限，不是看透一切，而是看透之后还能把局往前推。"},"B":{"typeName":"掌舵者原型","subtitle":"你的历史人格接近张居正、曾国藩、唐太宗这一类人：能担事、能稳局，也适合把混乱整理成秩序。","posterSubtext":"你不是无趣保守，你只是知道真正能落地的东西，都需要秩序和责任。","maturityScore":88,"coreConclusion":"你的答案显示，你很重视责任、秩序、长期结果和位置感。你不是只会守规矩，而是天然知道一个系统要运转，必须有人承担、统筹和兜住关键环节。你的优势是稳定、可靠、组织力强；风险是容易把责任背得太满，最后别人依赖你，你却很少真正为自己争取资源和边界。 你真正想要的是有名分、有资源、有秩序的长期位置。你不一定追求短期刺激，但你希望自己的能力被正式承认，而不是只做那个默默兜底的人。","diagnosis":"你的答案显示，你很重视责任、秩序、长期结果和位置感。你不是只会守规     <script>
(function () {
  const app = document.getElementById("app");
  const configPaths = ["./configs/site-config.json", "./configs/career-change.json"];

  const state = {
    config: null,
    answers: {},
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    const counts = { A: 0, B: 0, C: 0, D: 0 };
    Object.values(answers).forEach((key) => {
      if (counts[key] !== undefined) counts[key] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
</html>
