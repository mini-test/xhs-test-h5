d":5,"module":"关系位置","text":"在亲密关系里，你最想要的位置更接近：","options":[{"key":"A","text":"被偏爱、被珍惜，哪怕我不用一直证明自己"},{"key":"B","text":"被尊重、被认真对待，两个人能共同经营生活"},{"key":"C","text":"保持主动权，不因为爱一个人就失去自己"},{"key":"D","text":"有亲密，也有边界，不必每天被关系捆住"}]},{"id":6,"module":"关系位置","text":"当对方冷淡时，你第一反应更像：","options":[{"key":"A","text":"会想是不是我不够被在乎，忍不住反复确认"},{"key":"B","text":"先观察关系是不是出了结构性问题，需要沟通和修复"},{"key":"C","text":"迅速收回投入，不允许自己一直处在低位"},{"key":"D","text":"给对方空间，也给自己退路，不追着问太多"}]},{"id":7,"module":"关系位置","text":"你最不想在关系里变成：","options":[{"key":"A","text":"明明值得被爱，却一直小心翼翼讨一个回应"},{"key":"B","text":"一直维持关系的秩序，却没人看见我的辛苦"},{"key":"C","text":"为了爱放弃判断，被别人牵着情绪走"},{"key":"D","text":"为了维持亲密，把自己的自由和节奏交出去"}]},{"id":8,"module":"关系位置","text":"如果被喜欢的人忽视，你更可能：","options":[{"key":"A","text":"心里很受伤，但还是会希望对方重新看见我"},{"key":"B","text":"找一次合适机会把问题说清楚，不让关系继续糊着"},{"key":"C","text":"直接降低对方权重，把注意力收回自己身上"},{"key":"D","text":"安静退开，确认这段关系值不值得继续投入"}]},{"id":9,"module":"权力边界","text":"面对一个想控制你的人，你最自然的反应是：","options":[{"key":"A","text":"先用柔软方式化解，但心里会很抗拒被管太多"},{"key":"B","text":"把规则和边界讲清楚，不能让关系失序"},{"key":"C","text":"直接反控制，我不接受别人替我决定人生"},{"key":"D","text":"拉开距离，减少对方能影响我的入口"}]},{"id":10,"module":"权力边界","text":"你对“掌控感”的真实态度是：","options":[{"key":"A","text":"我不一定想掌控全局，但我想被好好对待"},{"key":"B","text":"我需要可预期、可沟通、有秩序的生活"},{"key":"C","text":"我必须拥有主动权，否则会非常焦虑和不甘心"},{"key":"D","text":"我不想掌控别人，也不想被任何人掌控"}]},{"id":11,"module":"权力边界","text":"别人越界占你便宜，你更容易：","options":[{"key":"A","text":"一开始不好意思翻脸，但会慢慢冷下来"},{"key":"B","text":"体面指出问题，让对方知道什么能做什么不能做"},{"key":"C","text":"立刻把话说重，不给对方继续试探的机会"},{"key":"D","text":"不解释太多，直接把这个人从我的生活范围里移走"}]},{"id":12,"module":"权力边界","text":"你最需要补上的一课是：","options":[{"key":"A","text":"不要把被偏爱当成唯一的安全感来源"},{"key":"B","text":"不要为了顾全大局，把自己的需求一直往后放"},{"key":"C","text":"不要把所有关系都变成输赢和控制权争夺"},{"key":"D","text":"不要因为害怕被束缚，就拒绝所有深度连接"}]},{"id":13,"module":"情绪安全","text":"你情绪不稳定时，最需要什么？","options":[{"key":"A","text":"有人明确告诉我：你很重要，我没有忽视你"},{"key":"B","text":"有人愿意坐下来把事情讲清楚，而不是让我猜"},{"key":"C","text":"一个能重新掌控局面的动作，让我不再被动"},{"key":"D","text":"独处空间，让我先把自己从情绪里拿回来"}]},{"id":14,"module":"情绪安全","text":"你最容易被哪种感觉击中？","options":[{"key":"A","text":"明明付出了很多温柔，却没有被珍惜"},{"key":"B","text":"我一直维持秩序，最后却没人站在我这边"},{"key":"C","text":"我有能力，却被别人放在低位或替代品的位置"},{"key":"D","text":"我本来很自由，却被关系、人情或期待慢慢困住"}]},{"id":15,"module":"情绪安全","text":"你最常见的自我保护方式是：","options":[{"key":"A","text":"把自己打扮好、状态调整好，不让别人看出失落"},{"key":"B","text":"把生活和关系重新整理，先恢复秩序"},{"key":"C","text":"立刻制定计划，用行动证明我不会输"},{"key":"D","text":"消失一阵子，等自己恢复清醒再回来"}]},{"id":16,"module":"情绪安全","text":"你最想被别人理解的是：","options":[{"key":"A","text":"我不是只想被宠，我也有很深的情绪和自尊"},{"key":"B","text":"我不是天生爱管事，我只是受不了混乱和敷衍"},{"key":"C","text":"我不是强势，我只是不能接受人生被别人安排"},{"key":"D","text":"我不是冷淡，我只是需要不被打扰的完整自我"}]},{"id":17,"module":"资源审美","text":"如果拥有一段“富贵人生”，你最想要的是：","options":[{"key":"A","text":"好看的生活、被偏爱的关系、稳定的情绪滋养"},{"key":"B","text":"体面的家、稳固的资源、被尊重的长期位置"},{"key":"C","text":"可以做主的事业、财富和不必仰人鼻息的选择权"},{"key":"D","text":"自由的时间、可进可退的资产和不被束缚的空间"}]},{"id":18,"module":"资源审美","text":"你花钱时最容易为哪类东西买单？","options":[{"key":"A","text":"提升气质、审美、仪式感和被自己宠爱的东西"},{"key":"B","text":"让生活更稳定、更有秩序、更长期有用的东西"},{"key":"C","text":"能提升能力、影响力、赚钱效率和个人势能的东西"},{"key":"D","text":"能换来自由、体验、独处和精神空间的东西"}]},{"id":19,"module":"资源审美","text":"你理解的“贵气”更接近：","options":[{"key":"A","text":"被爱滋养出来的松弛、柔软和漂亮状态"},{"key":"B","text":"稳定、体面、有规矩，不轻易失态的底气"},{"key":"C","text":"不求人、不低头，能自己决定命运的力量"},{"key":"D","text":"有选择权，不被任何身份和关系框死的自在"}]},{"id":20,"module":"资源审美","text":"如果要经营个人形象，你会更偏向：","options":[{"key":"A","text":"氛围感、精致感、柔软但不廉价的吸引力"},{"key":"B","text":"端庄、稳定、可信赖，有长期口碑的形象"},{"key":"C","text":"强识别度、强表达、强能量，让人记住我不是陪衬"},{"key":"D","text":"清冷、独立、不费力，带一点难以靠近的距离"}]},{"id":21,"module":"冲突处理","text":"有人当众让你难堪，你更可能：","options":[{"key":"A","text":"表面保持体面，心里会记住这次被轻视的感觉"},{"key":"B","text":"稳住场面，事后把规则和责任说清楚"},{"key":"C","text":"当场反击，不能让别人以为我好欺负"},{"key":"D","text":"不急着争，直接降低对这个人的信任和权重"}]},{"id":22,"module":"冲突处理","text":"你在冲突里最强的能力是：","options":[{"key":"A","text":"让尖锐局面软下来，保留一点情面和吸引力"},{"key":"B","text":"把混乱拆成规则、责任和解决方案"},{"key":"C","text":"迅速抓住核心矛盾，把主动权拿回来"},{"key":"D","text":"不被情绪拖走，知道何时退出这场消耗"}]},{"id":23,"module":"冲突处理","text":"冲突结束后，你最容易后悔：","options":[{"key":"A","text":"为什么当时没有让对方更在意我的感受"},{"key":"B","text":"是不是又为了场面稳定，压下了自己的委屈"},{"key":"C","text":"话说得太狠，让关系没有回旋余地"},{"key":"D","text":"退得太快，没有把真正的立场讲出来"}]},{"id":24,"module":"冲突处理","text":"你心里真正的胜利是：","options":[{"key":"A","text":"对方意识到我的珍贵，不再随便忽视我"},{"key":"B","text":"关系和秩序都被修复，事情往长期方向走"},{"key":"C","text":"我拿回决定权，不再被别人定义位置"},{"key":"D","text":"我保住自由和尊严，不被烂局困住"}]},{"id":25,"module":"事业野心","text":"你对事业的真实欲望更接近：","options":[{"key":"A","text":"我希望它让我更闪亮、更有选择、更被看见"},{"key":"B","text":"我希望它让我稳定、有地位、有长期积累"},{"key":"C","text":"我希望它让我掌握资源和话语权，真正能做主"},{"key":"D","text":"我希望它给我自由，而不是把我绑进另一套规则"}]},{"id":26,"module":"事业野心","text":"面对一个大机会，你最先问自己：","options":[{"key":"A","text":"它能不能让我进入更好的圈层和状态"},{"key":"B","text":"它是否稳定、体面、可持续，能不能长期经营"},{"key":"C","text":"它能不能让我上一个台阶，拥有更大主导权"},{"key":"D","text":"它会不会吞掉我的生活、自由和个人节奏"}]},{"id":27,"module":"事业野心","text":"你最不想活成：","options":[{"key":"A","text":"有魅力却总在等待别人给我安全感的人"},{"key":"B","text":"什么都照顾到了，唯独忘了自己的人"},{"key":"C","text":"明明有能力，却一辈子站在别人身后的人"},{"key":"D","text":"为了所谓成功，把自己困进不喜欢身份的人"}]},{"id":28,"module":"事业野心","text":"你最应该发展的一项能力是：","options":[{"key":"A","text":"把魅力、审美和人缘转成真实资源"},{"key":"B","text":"把稳定、责任和统筹转成长期话语权"},{"key":"C","text":"把野心、判断和行动转成自己的事业版图"},{"key":"D","text":"把清醒、边界和自由转成可持续收入"}]},{"id":29,"module":"终局剧本","text":"如果人生像一部宫廷剧，你最想拿到的剧本是：","options":[{"key":"A","text":"不必争到最高，但一定要被真心偏爱、活得漂亮"},{"key":"B","text":"稳坐中宫，掌秩序、守底线，也拥有自己的尊严"},{"key":"C","text":"从不被看好一路走到最高处，命运由我改写"},{"key":"D","text":"不困在宫墙里，有身份、有退路，也有自己的天地"}]},{"id":30,"module":"终局剧本","text":"你最想证明给自己看的事是：","options":[{"key":"A","text":"我值得被珍惜，不必一直讨一个回应"},{"key":"B","text":"我能把日子和关系经营好，也不丢掉自己"},{"key":"C","text":"我不是配角，我有能力成为自己人生的主角"},{"key":"D","text":"我可以亲密，也可以自由，不必被任何关系定义"}]},{"id":31,"module":"终局剧本","text":"这个测试里，你最想知道的是：","options":[{"key":"A","text":"我是不是天生容易吸引偏爱和资源"},{"key":"B","text":"我是不是适合长期经营、稳定掌家和掌局"},{"key":"C","text":"我是不是有女帝一样的野心和上位能力"},{"key":"D","text":"我是不是更适合做不入局也很贵的长公主"}]},{"id":32,"module":"终局剧本","text":"凭第一直觉，你觉得自己更像：","options":[{"key":"A","text":"贵妃命：被偏爱、懂审美、有吸引力，但要学会不依赖偏爱"},{"key":"B","text":"皇后命：稳、能统筹、有长期位置，但要学会别总顾全大局"},{"key":"C","text":"女帝命：强、要主动权、有野心，但要学会别把自己逼太紧"},{"key":"D","text":"长公主命：清醒、自由、有距离感，但要学会允许深度连接"}]}],"results":{"A":{"typeName":"贵妃命","subtitle":"你的底色是魅力、审美、柔软感和被偏爱的吸引力。你很容易让人想靠近，也很需要被认真珍惜。","posterSubtext":"你不是只想被宠，你是需要在关系里确认自己值得被好好对待。","maturityScore":82,"coreConclusion":"你的答案显示，你对氛围、情绪、偏爱和细节非常敏感。你能给人松弛、漂亮、柔软的感受，也很容易在关系里捕捉对方是否真的把你放在心上。你的优势是吸引力、审美感、情绪流动和人缘资源；风险是把安全感过度寄托在别人是否偏爱你。 你真正想要的不是单纯被宠，而是被坚定选择。你希望自己的温柔、漂亮、情绪价值和细腻感受被看见，也希望自己不用一直证明“我值得”。","diagnosis":"你的答案显示，你对氛围、情绪、偏爱和细节非常敏感。你能给人松弛、漂亮、柔软的感受，也很容易在关系里捕捉对方是否真的把你放在心上。你的优势是吸引力、审美感、情绪流动和人缘资源；风险是把安全感过度寄托在别人是否偏爱你。","whatYouReallyWant":"你真正想要的不是单纯被宠，而是被坚定选择。你希望自己的温柔、漂亮、情绪价值和细腻感受被看见，也希望自己不用一直证明“我值得”。","mechanism":{"title":"偏爱吸引机制","content":"贵妃命的核心不是依附，而是吸引力和情绪滋养。你擅长营造氛围、连接人心、让关系变得柔软有温度。需要警惕的是：当偏爱变少时，你容易怀疑自己，而不是先判断这段关系是否值得继续投入。"},"professionalBasis":["从被看见方式看，你更容易被气质、审美、柔软感和亲和力记住。","从关系位置看，你重视被珍惜、被偏爱和被认真回应。","从资源审美看，你很适合把审美、状态、气质和人缘转成真实资源。"],"coreTensions":["需要偏爱","审美敏锐","情绪细腻","容易反复确认","要学会自我定价"],"suitableIf":["审美内容","情绪文案","穿搭美学","关系经营","个人品牌","高氛围感表达"],"cautionIf":["把冷淡理解成自己不够好","用讨好换安全感","过度在意别人眼光","只等别人给资源"],"indices":[{"label":"偏爱吸引力","value":94},{"label":"审美氛围感","value":91},{"label":"情绪感知力","value":88},{"label":"自我定价力","value":66}],"ifStay":"如果你一直把安全感交给别人的偏爱，你会在关系里忽冷忽热，也很容易被对方的态度牵着走。","ifChange":"如果你把吸引力变成作品、表达、审美资产和可持续人缘，你会越来越贵，而不是只等别人宠。","notRecommended":["把冷淡理解成自己不够好","用讨好换安全感","过度在意别人眼光","只等别人给资源"],"plan90":[{"title":"第1-2周：停止用回应定义价值","content":"记录让你不安的瞬间，先问事实是什么，再问自己真正需要什么。"},{"title":"第3-4周：把审美转成资产","content":"整理你的穿搭、审美、文案、情绪洞察，做成可持续输出的内容栏目。"},{"title":"第2个月：练习清晰表达需求","content":"不要用试探换安全感，直接说出你希望被怎样对待。"},{"title":"第3个月：建立自己的资源池","content":"把人缘、审美和表达转成作品、合作、收入或个人品牌，而不是停留在被喜欢。"}],"closing":"真正的贵妃命，不是等人偏爱一辈子，而是明白自己本来就值得被郑重对待。"},"B":{"typeName":"皇后命","subtitle":"你的底色是稳定、秩序、统筹和长期经营。你不是一定要最高的位置，但你需要被尊重、被信任，也需要关系有规矩。","posterSubte     <script>
(function () {
  const app = document.getElementById("app");
  const configPaths = ["./configs/site-config.json", "./configs/career-change.json"];

  const state = {
    config: null,
    answers: {},
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    const counts = { A: 0, B: 0, C: 0, D: 0 };
    Object.values(answers).forEach((key) => {
      if (counts[key] !== undefined) counts[key] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
</html>
