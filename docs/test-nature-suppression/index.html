    <title>天性压抑度测试</title>
    <style>
:root {
  --bg: #fbfaf7;
  --paper: #fffefd;
  --ink: #20242a;
  --muted: #65707d;
  --line: #d9d4ca;
  --line-strong: #b9afa0;
  --accent: #9b4339;
  --accent-soft: #f1dfd7;
  --gold: #c0964d;
  --sage: #66795f;
  --blue: #526a86;
  --shadow: 0 16px 36px rgba(60, 47, 38, 0.1);
  --radius: 8px;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background:
    linear-gradient(rgba(32, 36, 42, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(32, 36, 42, 0.035) 1px, transparent 1px),
    var(--bg);
  background-size: 24px 24px;
}

body {
  min-height: 100vh;
  margin: 0;
  color: var(--ink);
  font-family:
    "PingFang SC",
    "Microsoft YaHei",
    "Noto Sans SC",
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    sans-serif;
  letter-spacing: 0;
}

button {
  font: inherit;
}

.shell {
  width: min(100%, 480px);
  min-height: 100vh;
  margin: 0 auto;
  background: rgba(251, 250, 247, 0.88);
}

.top-rule {
  height: 4px;
  background: var(--accent);
}

.screen {
  min-height: calc(100vh - 4px);
  padding: 28px 22px 32px;
}

.home {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.kicker {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--muted);
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.dot {
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
}

.hero-title {
  margin: 26px 0 14px;
  color: var(--ink);
  font-size: 30px;
  line-height: 1.2;
  text-align: center;
  font-weight: 800;
}

.hero-subtitle {
  margin: 0 auto 28px;
  max-width: 340px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.75;
  text-align: center;
}

.hairline {
  width: 64px;
  height: 1px;
  margin: 0 auto 30px;
  background: var(--line-strong);
}

.intro {
  margin: 0 auto;
  max-width: 380px;
}

.intro p {
  margin: 0 0 15px;
  color: rgba(32, 36, 42, 0.82);
  font-size: 15px;
  line-height: 1.8;
}

.intro .strong {
  color: var(--accent);
  font-weight: 700;
}

.pill-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin: 28px 0;
}

.pill {
  min-height: 42px;
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  color: var(--muted);
  background: rgba(255, 255, 255, 0.44);
  font-size: 13px;
}

.primary-btn,
.ghost-btn,
.copy-btn {
  width: 100%;
  min-height: 48px;
  border: 1px solid var(--ink);
  border-radius: 0;
  cursor: pointer;
  transition: transform 150ms ease, background 150ms ease, color 150ms ease, border-color 150ms ease;
}

.primary-btn {
  background: var(--ink);
  color: #fff;
  font-weight: 700;
}

.ghost-btn,
.copy-btn {
  background: transparent;
  color: var(--ink);
}

.primary-btn:active,
.ghost-btn:active,
.copy-btn:active,
.option:active {
  transform: translateY(1px);
}

.disclaimer {
  margin: 18px auto 0;
  max-width: 340px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.65;
  text-align: center;
}

.quiz-screen {
  padding-top: 0;
}

.sticky-head {
  position: sticky;
  top: 0;
  z-index: 5;
  margin: 0 -22px 26px;
  padding: 14px 22px 12px;
  background: rgba(251, 250, 247, 0.95);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(12px);
}

.quiz-meta {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  color: var(--muted);
  font-size: 12px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

.progress-track {
  height: 4px;
  margin-top: 10px;
  background: rgba(32, 36, 42, 0.09);
}

.progress-bar {
  height: 100%;
  background: var(--accent);
  transition: width 260ms ease;
}

.question-no {
  color: rgba(155, 67, 57, 0.18);
  font-size: 48px;
  line-height: 1;
  font-weight: 800;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

.question-title {
  margin: 18px 0 24px;
  font-size: 22px;
  line-height: 1.5;
  font-weight: 750;
}

.options {
  display: grid;
  gap: 12px;
}

.option {
  min-height: 66px;
  display: grid;
  grid-template-columns: 30px 1fr;
  gap: 12px;
  align-items: start;
  width: 100%;
  padding: 15px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.68);
  color: var(--ink);
  text-align: left;
  cursor: pointer;
  transition: background 160ms ease, border-color 160ms ease, color 160ms ease, opacity 160ms ease;
}

.option-key {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border: 1px solid var(--line-strong);
  font-size: 13px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

.option-text {
  padding-top: 2px;
  font-size: 15px;
  line-height: 1.55;
}

.option.selected {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}

.option.selected .option-key {
  border-color: rgba(255, 255, 255, 0.8);
}

.option.dimmed {
  opacity: 0.42;
}

.hint {
  margin: 18px 0 0;
  color: var(--muted);
  font-size: 12px;
  text-align: center;
}

.loading-screen {
  display: grid;
  place-items: center;
}

.loading-card {
  width: 100%;
  max-width: 360px;
  text-align: center;
}

.spinner {
  width: 54px;
  height: 54px;
  margin: 0 auto 24px;
  border: 2px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 850ms linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.loading-text {
  min-height: 54px;
  color: var(--accent);
  font-size: 17px;
  line-height: 1.6;
  font-weight: 700;
}

.step-bars {
  display: grid;
  gap: 8px;
  margin-top: 28px;
}

.step {
  height: 4px;
  overflow: hidden;
  background: rgba(32, 36, 42, 0.09);
}

.step span {
  display: block;
  height: 100%;
  width: 0;
  background: var(--accent);
  transition: width 300ms ease;
}

.step.done span {
  width: 100%;
}

.result-screen {
  padding: 22px 18px 30px;
}

.report {
  padding: 22px 16px 18px;
  border: 1px solid var(--line);
  background: var(--paper);
  box-shadow: var(--shadow);
}

.result-type {
  margin: 8px 0 8px;
  color: var(--accent);
  font-size: 30px;
  line-height: 1.15;
  font-weight: 850;
  text-align: center;
}

.result-subtitle {
  margin: 0 auto 20px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.7;
  text-align: center;
}

.stamp-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin: 18px 0 20px;
}

.stamp {
  padding: 12px 10px;
  border: 1px solid var(--line);
  background: #fbfaf7;
}

.stamp strong {
  display: block;
  margin-bottom: 4px;
  color: var(--ink);
  font-size: 20px;
}

.stamp span {
  color: var(--muted);
  font-size: 12px;
}

.section {
  padding: 20px 0;
  border-top: 1px solid var(--line);
}

.section h2 {
  margin: 0 0 12px;
  font-size: 18px;
  color: var(--ink);
}

.section p {
  margin: 0 0 12px;
  color: rgba(32, 36, 42, 0.82);
  font-size: 15px;
  line-height: 1.85;
}

.quote {
  padding: 15px;
  border-left: 3px solid var(--accent);
  background: var(--accent-soft);
  color: #5b2d27;
  line-height: 1.8;
  font-weight: 700;
}

.meters {
  display: grid;
  gap: 14px;
}

.meter-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 7px;
  color: var(--muted);
  font-size: 13px;
}

.meter-track {
  height: 8px;
  background: rgba(32, 36, 42, 0.08);
}

.meter-fill {
  height: 100%;
  background: var(--accent);
}

.compare {
  display: grid;
  gap: 10px;
}

.compare-card {
  padding: 14px;
  border: 1px solid var(--line);
  background: #fbfaf7;
}

.compare-card h3,
.plan-card h3 {
  margin: 0 0 8px;
  font-size: 15px;
}

.compare-card p,
.plan-card p {
  font-size: 14px;
}

.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag {
  padding: 7px 9px;
  border: 1px solid var(--line);
  background: #fbfaf7;
  color: var(--muted);
  font-size: 13px;
}

.plan {
  display: grid;
  gap: 10px;
}

.plan-card {
  padding: 14px;
  border: 1px solid var(--line);
  background: #fbfaf7;
}

.secondary-note {
  padding: 14px;
  border: 1px dashed var(--line-strong);
  background: rgba(192, 150, 77, 0.12);
  line-height: 1.75;
  font-size: 14px;
}

.actions {
  display: grid;
  gap: 10px;
  margin-top: 18px;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 22px;
  z-index: 20;
  transform: translateX(-50%);
  padding: 10px 14px;
  background: var(--ink);
  color: #fff;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 180ms ease;
}

.toast.show {
  opacity: 1;
}

.error {
  display: grid;
  place-items: center;
  min-height: 100vh;
  padding: 24px;
  text-align: center;
}

.error p {
  color: var(--muted);
  line-height: 1.7;
}

@media (min-width: 700px) {
  body {
    padding: 28px 0;
  }

  .shell {
    min-height: calc(100vh - 56px);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
  }

  .screen {
    min-height: calc(100vh - 60px);
  }
}

    <script>window.__QUIZ_CONFIG__ = {"slug":"test-nature-suppression","topic":"天性压抑度测试","kicker":"32-Q Nature Suppression Test","title":"天性压抑度测试","subtitle":"32 道真实场景题，测出你真实自我被压住了多少，以及你的隐藏人格、伪装人格、衍生人格分别是什么。","metaDescription":"完成 32 道天性压抑度测试，生成你的真实自我、隐藏人格、伪装人格、衍生人格和自我修复建议。","startButton":"开始测试","resultKicker":"Suppression Report","quizHint":"凭第一反应选择，系统会自动进入下一题","copyButton":"复制我的结果","restartButton":"重新测试","scoreLabel":"天性压抑度","stageLabel":"当前压抑状态","indexTitle":"人格四象限","tensionTitle":"你的压抑来源","planTitle":"90天松绑建议","blurSummary":"做完 32 道题，查看你的天性压抑度、真实自我、隐藏人格、伪装人格和衍生人格。","stageLabels":[{"max":55,"label":"轻度遮蔽"},{"max":72,"label":"明显压住"},{"max":86,"label":"高度内耗"},{"max":100,"label":"临界爆发"}],"compareLabels":["如果继续压着自己","如果开始松绑自己"],"disclaimer":"本测试为趣味人格自我观察工具，仅供娱乐和自我觉察参考，不代表心理诊断、心理治疗、医学建议或任何确定性人格评估。若长期痛苦、失眠、焦虑或影响生活，请寻求专业人士帮助。","secondaryThreshold":4,"dimensions":["真实自我","隐藏人格","伪装人格","衍生人格"],"intro":["很多人不是没有情绪，只是太会装没事。","你以为自己是脾气好、很理性、很懂事、很洒脱，但这些也可能是你压住真实自我的方式。","32 道题会从日常忍耐、关系压抑、情绪出口、自我表达、冲突反应、欲望期待、疲惫信号和修复方向，生成你的天性压抑度报告。"],"loadingMessages":["正在读取你的第一反应...","正在识别真实自我和伪装人格...","正在计算天性压抑度...","正在生成隐藏人格和衍生人格报告...","分析完成。"],"questions":[{"id":1,"module":"日常忍耐","text":"朋友临时改计划，你其实很不舒服，第一反应是：","options":[{"key":"A","text":"说没事，然后把不舒服自己消化掉"},{"key":"B","text":"先分析改计划会不会影响后面的安排"},{"key":"C","text":"配合大家，担心自己扫兴"},{"key":"D","text":"表面答应，心里已经不想再约下一次"}]},{"id":2,"module":"日常忍耐","text":"别人问你最近怎么样，你更常说：","options":[{"key":"A","text":"还行，其实很多事不想讲"},{"key":"B","text":"挺忙的，把情绪藏在事项里"},{"key":"C","text":"挺好的，不想让别人担心"},{"key":"D","text":"没什么，反正说了也没人懂"}]},{"id":3,"module":"日常忍耐","text":"你最常把哪种感受压下去？","options":[{"key":"A","text":"委屈、难过、想被理解"},{"key":"B","text":"慌乱、失控、没有把握"},{"key":"C","text":"不满、拒绝、自己的真实需求"},{"key":"D","text":"愤怒、厌烦、想马上离开的冲动"}]},{"id":4,"module":"日常忍耐","text":"一天很累回到家，你最像：","options":[{"key":"A","text":"安静待着，脑子里反复回放白天的细节"},{"key":"B","text":"开始整理、计划、做点能恢复掌控感的事"},{"key":"C","text":"继续回消息，不想让别人觉得你冷淡"},{"key":"D","text":"什么都不想解释，只想和世界断开"}]},{"id":5,"module":"关系压抑","text":"关系里你最怕别人发现：","options":[{"key":"A","text":"我其实比看起来更敏感"},{"key":"B","text":"我并没有一直那么稳"},{"key":"C","text":"我不是每次都愿意迁就"},{"key":"D","text":"我有时候真的很想翻脸"}]},{"id":6,"module":"关系压抑","text":"对方情绪不好时，你更容易：","options":[{"key":"A","text":"先接住对方，自己的情绪往后放"},{"key":"B","text":"立刻找原因和解决办法"},{"key":"C","text":"调整自己，尽量不刺激对方"},{"key":"D","text":"越听越烦，但又不好直接走开"}]},{"id":7,"module":"关系压抑","text":"别人说你很懂事，你心里更可能：","options":[{"key":"A","text":"有点酸，因为懂事是忍出来的"},{"key":"B","text":"觉得这是对自己能力和稳定的肯定"},{"key":"C","text":"松一口气，至少没有让人失望"},{"key":"D","text":"不太想听，像被贴上不能失控的标签"}]},{"id":8,"module":"关系压抑","text":"你最不擅长向亲近的人表达：","options":[{"key":"A","text":"其实我也会受伤"},{"key":"B","text":"我现在真的没办法处理"},{"key":"C","text":"我不想这样，我有自己的想法"},{"key":"D","text":"你这样让我很烦，我想停一下"}]},{"id":9,"module":"情绪出口","text":"你情绪快满出来时，通常会：","options":[{"key":"A","text":"一个人躲起来哭或发呆"},{"key":"B","text":"让自己忙起来，不给情绪发作的时间"},{"key":"C","text":"继续装正常，等没人时才崩一下"},{"key":"D","text":"突然冷下来，语气变硬或直接消失"}]},{"id":10,"module":"情绪出口","text":"你最容易在哪一刻破防？","options":[{"key":"A","text":"明明很难受，还被人说你想太多"},{"key":"B","text":"努力撑住局面，却没人看见你的压力"},{"key":"C","text":"一直退让后，对方还觉得理所当然"},{"key":"D","text":"忍到最后，对方还继续越界"}]},{"id":11,"module":"情绪出口","text":"如果情绪有一个开关，你最想关掉：","options":[{"key":"A","text":"过度共情和反复回想"},{"key":"B","text":"焦虑预判和失控恐惧"},{"key":"C","text":"怕被讨厌和怕让人失望"},{"key":"D","text":"被冒犯后的强烈反击欲"}]},{"id":12,"module":"情绪出口","text":"你最常用什么方式让自己好一点？","options":[{"key":"A","text":"听歌、看旧聊天、沉进自己的感受里"},{"key":"B","text":"列清单、复盘、把问题拆小"},{"key":"C","text":"告诉自己别麻烦别人，再撑一撑"},{"key":"D","text":"远离人群，短时间谁都不想理"}]},{"id":13,"module":"自我表达","text":"如果可以不顾后果说一句真话，你最想说：","options":[{"key":"A","text":"我没有你们以为的那么没事"},{"key":"B","text":"我也会怕，我不是永远有办法"},{"key":"C","text":"我不想一直当那个好说话的人"},{"key":"D","text":"别再逼我，我真的会走"}]},{"id":14,"module":"自我表达","text":"别人夸你哪句话，你会有一点刺痛？","options":[{"key":"A","text":"你脾气真好，从来不计较"},{"key":"B","text":"你很靠谱，好像什么都能扛住"},{"key":"C","text":"你很好相处，不会给人压力"},{"key":"D","text":"你看起来很洒脱，什么都不在乎"}]},{"id":15,"module":"自我表达","text":"你最羡慕哪种人？","options":[{"key":"A","text":"能自然说出自己难过的人"},{"key":"B","text":"遇到失控也能承认自己不会的人"},{"key":"C","text":"能大方拒绝，还不内疚的人"},{"key":"D","text":"想走就走，不解释太多的人"}]},{"id":16,"module":"自我表达","text":"你的真实自我更像：","options":[{"key":"A","text":"很细腻，但总怕自己的感受太重"},{"key":"B","text":"很清醒，但其实很怕失去控制"},{"key":"C","text":"很想被偏爱，但习惯先照顾别人"},{"key":"D","text":"很需要自由，但总被关系和规则困住"}]},{"id":17,"module":"冲突反应","text":"别人踩到你的底线，你更常：","options":[{"key":"A","text":"先忍一下，等之后自己慢慢难受"},{"key":"B","text":"用道理说明问题，希望别闹得太情绪化"},{"key":"C","text":"换个委婉方式提醒，怕直接冲突"},{"key":"D","text":"当场不说，后面突然疏远或爆发"}]},{"id":18,"module":"冲突反应","text":"争吵时你最怕自己变成：","options":[{"key":"A","text":"哭出来，显得太脆弱"},{"key":"B","text":"失控，说出不理性的东西"},{"key":"C","text":"太自私，只顾自己的感受"},{"key":"D","text":"太狠，直接把关系推翻"}]},{"id":19,"module":"冲突反应","text":"别人一句「你怎么这么敏感」，你会：","options":[{"key":"A","text":"开始怀疑自己是不是反应过度"},{"key":"B","text":"把情绪收回去，尝试讲事实"},{"key":"C","text":"马上解释自己不是故意麻烦别人"},{"key":"D","text":"心里记一笔，从此不想再多说"}]},{"id":20,"module":"冲突反应","text":"你最常见的冷处理方式是：","options":[{"key":"A","text":"安静下来，不让别人看见难过"},{"key":"B","text":"进入理性模式，只谈事不谈感受"},{"key":"C","text":"装作没关系，但明显变得小心"},{"key":"D","text":"直接抽离，减少联系，慢慢淡掉"}]},{"id":21,"module":"欲望和期待","text":"你最不敢承认自己想要：","options":[{"key":"A","text":"被坚定地理解和接住"},{"key":"B","text":"可以不用一直那么能干"},{"key":"C","text":"被偏爱，而不是永远被要求懂事"},{"key":"D","text":"不被管、不被绑住、有随时离开的权利"}]},{"id":22,"module":"欲望和期待","text":"如果生活突然给你一周自由时间，你最想：","options":[{"key":"A","text":"找个安静地方，把心里堆着的感受慢慢放出来"},{"key":"B","text":"重新整理人生秩序，把失控的东西拉回来"},{"key":"C","text":"什么都不顾地按自己的喜好过几天"},{"key":"D","text":"换个环境，暂时不回应任何人的期待"}]},{"id":23,"module":"欲望和期待","text":"你最容易压抑哪种欲望？","options":[{"key":"A","text":"想被照顾、想被安慰"},{"key":"B","text":"想停下来、想承认自己做不到"},{"key":"C","text":"想拒绝、想优先考虑自己"},{"key":"D","text":"想逃走、想推翻现状"}]},{"id":24,"module":"欲望和期待","text":"你心里最想解除的限制是：","options":[{"key":"A","text":"不能太情绪化"},{"key":"B","text":"不能不靠谱"},{"key":"C","text":"不能让别人失望"},{"key":"D","text":"不能太自我、太叛逆"}]},{"id":25,"module":"疲惫信号","text":"你快撑不住时，身体最容易出现：","options":[{"key":"A","text":"胸口堵、想哭、睡前脑子停不下来"},{"key":"B","text":"肩颈紧、胃不舒服、总觉得还有事没做完"},{"key":"C","text":"很累但停不下回应别人"},{"key":"D","text":"突然烦躁，对声音、消息和人都没耐心"}]},{"id":26,"module":"疲惫信号","text":"你的内耗更像哪种声音？","options":[{"key":"A","text":"我是不是又太在意了"},{"key":"B","text":"如果我没处理好怎么办"},{"key":"C","text":"我这样会不会太麻烦别人"},{"key":"D","text":"我为什么还要忍这些"}]},{"id":27,"module":"疲惫信号","text":"你最容易被哪种环境消耗？","options":[{"key":"A","text":"情绪很多、没人把话说明白的环境"},{"key":"B","text":"混乱、反复变动、没有规则的环境"},{"key":"C","text":"大家都默认你应该配合的环境"},{"key":"D","text":"边界模糊、总有人干涉你的环境"}]},{"id":28,"module":"疲惫信号","text":"别人最容易误判你的地方是：","options":[{"key":"A","text":"以为我安静就是不痛"},{"key":"B","text":"以为我冷静就是不怕"},{"key":"C","text":"以为我好说话就是没需求"},{"key":"D","text":"以为我不解释就是不在乎"}]},{"id":29,"module":"修复方向","text":"如果要少压抑一点，你最需要先练习：","options":[{"key":"A","text":"把感受说出来，而不是只在心里反复咀嚼"},{"key":"B","text":"承认自己也会乱，也可以暂时没答案"},{"key":"C","text":"拒绝别人时不急着证明自己是好人"},{"key":"D","text":"在爆发前表达边界，而不是直接消失"}]},{"id":30,"module":"修复方向","text":"你最需要别人给你的空间是：","options":[{"key":"A","text":"允许我难过，不急着评价我"},{"key":"B","text":"允许我暂停，不逼我马上解决"},{"key":"C","text":"允许我有需求，不把我当工具人"},{"key":"D","text":"允许我保持距离，不把自由当冷漠"}]},{"id":31,"module":"修复方向","text":"你最想变成哪种状态？","options":[{"key":"A","text":"敏感但不被情绪淹没"},{"key":"B","text":"清醒但不靠控制感活着"},{"key":"C","text":"温柔但不靠讨好换关系"},{"key":"D","text":"有边界但不用靠爆发证明自己"}]},{"id":32,"module":"修复方向","text":"如果给现在的自己一句话，你会选：","options":[{"key":"A","text":"你的感受不是负担，它只是太久没被听见"},{"key":"B","text":"你不必永远有答案，失控也不是失败"},{"key":"C","text":"你可以善良，但不必一直牺牲自己"},{"key":"D","text":"你可以离开，但也可以先清楚表达"}]}],"results":{"A":{"typeName":"闷烧海绵型","subtitle":"你像一块安静吸水的海绵，表面很平静，里面已经装了太多没有说出口的情绪。","posterSubtext":"你不是没脾气，你只是太习惯把感受先吞回去。","maturityScore":74,"coreConclusion":"你的答案显示，你最常压住的是委屈、难过、被误解和想被照顾的需求。你很会读空气，也很会照顾别人的情绪，但正因为太会感受，你常常把别人的一句话、一个表情、一点冷淡都收进心里，反复消化。 你真正想要的不是被人哄，而是有人能认真听你说：我其实没有那么没事。你的真实自我很细腻，隐藏人格是高敏共情者，伪装人格是温和不计较的人，衍生人格是自我安抚者。","diagnosis":"你的答案显示，你最常压住的是委屈、难过、被误解和想被照顾的需求。你很会读空气，也很会照顾别人的情绪，但正因为太会感受，你常常把别人的一句话、一个表情、一点冷淡都收进心里，反复消化。","whatYouReallyWant":"你真正想要的不是被人哄，而是有人能认真听你说：我其实没有那么没事。你的真实自我很细腻，隐藏人格是高敏共情者，伪装人格是温和不计较的人，衍生人格是自我安抚者。","mechanism":{"title":"高敏接收与情绪吞咽机制","content":"闷烧海绵型的核心不是脆弱，而是情绪接收能力过强。你越不想麻烦别人，越容易把所有不舒服都留给自己处理。久了以后，别人会以为你真的不痛，而你会越来越难说出真实需求。"},"professionalBasis":["你对语气、氛围和他人情绪变化很敏感，容易先捕捉别人的状态。","你习惯用沉默维持关系稳定，短期看起来安全，长期会积压委屈。","你的压抑不是没有情绪，而是情绪太多，所以选择先不说。"],"coreTensions":["高敏感","怕麻烦别人","情绪吞咽","容易反复回想","需要被认真听见"],"suitableIf":["低刺激环境","稳定回应的人","情绪书写","慢节奏关系","明确表达练习"],"cautionIf":["把沉默当成熟","把难过憋到身体里","过度解读冷淡","只照顾别人不照顾自己"],"indices":[{"label":"天性压抑度","value":74},{"label":"情绪接收度","value":92},{"label":"真实表达度","value":46},{"label":"自我安抚力","value":70},{"label":"爆发风险","value":58}],"ifStay":"如果继续什么都往心里放，你会越来越像一个稳定的人，但内在会越来越容易疲惫、麻木和突然崩溃。","ifChange":"当你开始把感受用小句子说出来，你的温柔不会消失，反而会变得更有边界。","notRecommended":["把沉默当成熟","把难过憋到身体里","过度解读冷淡","只照顾别人不照顾自己"],"plan90":[{"title":"第 1-2 周：记录被刺痛的瞬间","content":"不要急着判断自己是不是敏感，只写下发生了什么和你真实感受到了什么。"},{"title":"第 3-4 周：练习低风险表达","content":"把「没事」换成「我有一点不舒服，但我想先缓一下」。"},{"title":"第 2 个月：筛选能听懂你的人","content":"不是所有人都值得你解释，把表达留给能回应的人。"},{"title":"第 3 个月：给情绪出口固定时间","content":"每周留一个不处理别人情绪的时段，只处理自己的感受。"}],"closing":"你不需要变得粗糙。你只需要让自己的感受，也拥有被放在桌面上的资格。"},"B":{"typeName":"冷静封箱型","subtitle":"你越慌，越会把自己收进理性盒子里，看起来很稳，其实是在用控制感压住不安。","posterSubtext":"你不是天生冷静，你只是太怕失控。","maturityScore":68,"coreConclusion":"你的答案显示，你最常压住的是慌乱、无助、不会做、不知道怎么办。你习惯把情绪翻译成问题，把问题拆成步骤，只要还能整理、规划、复盘，你就觉得自己没有崩。 你真正想要的是允许自己暂时没有答案。你的真实自我是清醒的观察者，隐藏人格是害怕失控的小孩，伪装人格是靠谱负责人，衍生人格是问题解决机器。","diagnosis":"你的答案显示，你最常压住的是慌乱、无助、不会做、不知道怎么办。你习惯把情绪翻译成问题，把问题拆成步骤，只要还能整理、规划、复盘，你就觉得自己没有崩。","whatYouReallyWant":"你真正想要的是允许自己暂时没有答案。你的真实自我是清醒的观察者，隐藏人格是害怕失控的小孩，伪装人格是靠谱负责人，衍生人格是问题解决机器。","mechanism":{"title":"理性防御与控制补偿机制","content":"冷静封箱型会把情绪关进理性系统里。优点是抗压、能扛事、关键时刻不容易乱；风险是你会把需要安慰的自己也当成一个待解决项目，久而久之忘了休息和求助。"},"professionalBasis":["你倾向于先找原因、拆步骤、做计划，用秩序对抗不安。","你害怕表现出不会、不能、没办法，因此容易过度负责。","你的稳定常常是真实能力，也是压力外壳。"],"coreTensions":["控制感强","害怕失控","过度负责","难以求助","容易身心紧绷"],"suitableIf":["清晰规则","可预期节奏","职责边界","身体放松训练","允许暂停"],"cautionIf":["把情绪都理性化","凡事都要自己扛","用效率逃避     answers: {},
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    const resultKeys = Object.keys(state.config.results || {});
    const counts = Object.fromEntries(resultKeys.map((key) => [key, 0]));
    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey) return;
      const option = (question.options || []).find((item) => item.key === answerKey);
      const scoreKey = option?.score || option?.result || answerKey;
      if (counts[scoreKey] !== undefined) counts[scoreKey] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
</html>
