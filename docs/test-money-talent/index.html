"text":"找谁最需要这个技能，哪里有缺口"},{"key":"B","text":"把它包装成别人一眼能看懂、想点开的内容"},{"key":"C","text":"设计一个简单明确的购买理由和交付承诺"},{"key":"D","text":"拆成可复制的产品、模板、流程或服务包"}]},{"id":6,"module":"价值创造","text":"你觉得自己最容易提供哪种价值：","options":[{"key":"A","text":"帮别人看见机会、资源、路径和人脉入口"},{"key":"B","text":"把普通东西讲得有吸引力，让别人愿意关注"},{"key":"C","text":"让犹豫的人做决定，把需求转成订单"},{"key":"D","text":"把混乱的事做成标准流程，让结果更稳定"}]},{"id":7,"module":"价值创造","text":"你最受不了哪种赚钱方式：","options":[{"key":"A","text":"埋头做事但完全不知道机会在哪里"},{"key":"B","text":"东西不错但表达太无聊，没人看见"},{"key":"C","text":"有人咨询很多却迟迟不成交，白白消耗"},{"key":"D","text":"每次都从零开始，不能沉淀复用"}]},{"id":8,"module":"价值创造","text":"如果客户说“你这个有什么用”，你更擅长：","options":[{"key":"A","text":"告诉 TA 这个东西能连接到哪些机会"},{"key":"B","text":"用一个场景让 TA 立刻代入自己的痛点"},{"key":"C","text":"直接指出 TA 现在不解决会继续损失什么"},{"key":"D","text":"展示清楚流程、结果和交付边界"}]},{"id":9,"module":"变现路径","text":"如果你现在要开始搞钱，最愿意先做：","options":[{"key":"A","text":"研究平台、行业和人群，找一个低竞争入口"},{"key":"B","text":"先发内容测试反馈，看哪个话题能吸引人"},{"key":"C","text":"先找 10 个潜在客户聊需求，直接验证付费意愿"},{"key":"D","text":"先做一个小产品或模板，用最小成本跑通流程"}]},{"id":10,"module":"变现路径","text":"你最有动力做哪种事：","options":[{"key":"A","text":"收集信息、对比路径、找到别人没看到的机会"},{"key":"B","text":"写标题、做封面、讲故事、把东西变得有传播感"},{"key":"C","text":"私聊、谈需求、处理顾虑、推动成交"},{"key":"D","text":"搭建系统、优化交付、把一次经验变成资产"}]},{"id":11,"module":"变现路径","text":"你最容易在哪个环节卡住：","options":[{"key":"A","text":"机会太多，容易一直研究不下场"},{"key":"B","text":"有表达欲，但产品和交付还不够清晰"},{"key":"C","text":"能成交，但后续交付和复购容易乱"},{"key":"D","text":"系统想得很完整，但前期获客速度慢"}]},{"id":12,"module":"变现路径","text":"你理想中的赚钱状态更像：","options":[{"key":"A","text":"永远知道下一个机会在哪里"},{"key":"B","text":"靠内容和个人影响力持续有人找来"},{"key":"C","text":"一眼看出客户需求，能把咨询变成订单"},{"key":"D","text":"一个模型慢慢跑顺，越做越省力"}]},{"id":13,"module":"风险偏好","text":"面对一个新机会，你最担心：","options":[{"key":"A","text":"我是不是进场太晚，信息已经不新了"},{"key":"B","text":"这个话题有没有人看，会不会发出去没人理"},{"key":"C","text":"用户是不是真的愿意付费，不是只说说而已"},{"key":"D","text":"这个东西能不能持续做，会不会一次性消耗"}]},{"id":14,"module":"风险偏好","text":"你更能接受哪种不确定：","options":[{"key":"A","text":"方向还没完全确定，但我能边找信息边调整"},{"key":"B","text":"内容前期不稳定，但我能快速试不同表达"},{"key":"C","text":"成交会被拒绝，但每次拒绝都能让我更懂客户"},{"key":"D","text":"前期很慢，但只要模型能沉淀，我愿意熬"}]},{"id":15,"module":"风险偏好","text":"你最容易因为哪件事放弃：","options":[{"key":"A","text":"发现自己没有信息优势，只是在跟风"},{"key":"B","text":"发了很多内容，但互动很冷"},{"key":"C","text":"聊了很多人，但都不愿意付钱"},{"key":"D","text":"每天很忙，但没有任何资产沉淀"}]},{"id":16,"module":"风险偏好","text":"如果一个项目三个月没起色，你会先检查：","options":[{"key":"A","text":"是不是选错入口或人群"},{"key":"B","text":"是不是内容表达没有打中痛点"},{"key":"C","text":"是不是报价、信任和成交链路有问题"},{"key":"D","text":"是不是流程太散，无法稳定重复"}]},{"id":17,"module":"执行节奏","text":"你做事最自然的节奏是：","options":[{"key":"A","text":"先观察一圈，找到最聪明的切口再动"},{"key":"B","text":"先快速发出去，用反馈倒逼优化"},{"key":"C","text":"先找人聊，边聊边推近真实需求"},{"key":"D","text":"先搭框架，把后续动作排清楚再推进"}]},{"id":18,"module":"执行节奏","text":"别人催你快点赚钱时，你内心更像：","options":[{"key":"A","text":"别急，入口选错会浪费更多时间"},{"key":"B","text":"先让我把表达和包装打磨到有人愿意看"},{"key":"C","text":"赚钱就是要去谈、去卖、去验证"},{"key":"D","text":"一时快没用，关键是能不能稳定做下去"}]},{"id":19,"module":"执行节奏","text":"你最容易进入心流的场景：","options":[{"key":"A","text":"翻资料、看趋势、找隐藏机会"},{"key":"B","text":"做内容、写文案、改封面标题"},{"key":"C","text":"和客户沟通、拆需求、处理异议"},{"key":"D","text":"做表格、流程、模板、自动化和复盘"}]},{"id":20,"module":"执行节奏","text":"如果只能保留一个能力，你会选：","options":[{"key":"A","text":"发现机会"},{"key":"B","text":"吸引注意"},{"key":"C","text":"促成购买"},{"key":"D","text":"持续复制"}]},{"id":21,"module":"资源关系","text":"你身边的人通常会找你：","options":[{"key":"A","text":"问哪里有机会、什么值得做、谁可以连接"},{"key":"B","text":"问怎么表达、怎么发内容、怎么让别人感兴趣"},{"key":"C","text":"问怎么报价、怎么谈、怎么让客户下单"},{"key":"D","text":"问怎么整理、怎么流程化、怎么长期坚持"}]},{"id":22,"module":"资源关系","text":"你在人群里最容易扮演的角色：","options":[{"key":"A","text":"信息中转站，知道很多资源和入口"},{"key":"B","text":"气氛制造者，能让一个东西被看见"},{"key":"C","text":"推动者，让大家从想想进入行动"},{"key":"D","text":"搭建者，把散乱的人和事整理成系统"}]},{"id":23,"module":"资源关系","text":"你最喜欢和哪类人合作：","options":[{"key":"A","text":"有资源、有信息、愿意互相交换的人"},{"key":"B","text":"有审美、有表达、会一起做内容的人"},{"key":"C","text":"有需求、有决心、能快速拍板的人"},{"key":"D","text":"稳定靠谱、重视流程和长期复盘的人"}]},{"id":24,"module":"资源关系","text":"你最怕合作里出现：","options":[{"key":"A","text":"信息不透明，关键资源和判断都藏着"},{"key":"B","text":"东西做得很好，但没人负责传播和获客"},{"key":"C","text":"大家都聊得很热闹，但没人推动成交"},{"key":"D","text":"没有流程、没有分工、最后全靠临时救火"}]},{"id":25,"module":"表达获客","text":"如果让你发一篇搞钱笔记，你会更想写：","options":[{"key":"A","text":"普通人如何发现一个小机会"},{"key":"B","text":"为什么你明明有能力，却没人愿意买单"},{"key":"C","text":"客户为什么犹豫，以及怎么让 TA 做决定"},{"key":"D","text":"如何把一次服务做成可复用的产品"}]},{"id":26,"module":"表达获客","text":"你觉得最能打动用户的是：","options":[{"key":"A","text":"让 TA 看到一个以前没想到的赚钱入口"},{"key":"B","text":"让 TA 在内容里看到自己的焦虑和欲望"},{"key":"C","text":"让 TA 清楚知道现在买能解决什么问题"},{"key":"D","text":"让 TA 相信你有稳定流程和交付结果"}]},{"id":27,"module":"表达获客","text":"你最想提升哪种表达：","options":[{"key":"A","text":"趋势判断和机会拆解"},{"key":"B","text":"标题、封面、故事和人设"},{"key":"C","text":"销售话术、报价和信任建立"},{"key":"D","text":"产品说明、案例复盘和交付展示"}]},{"id":28,"module":"表达获客","text":"别人看完你的内容，最好产生哪种反应：","options":[{"key":"A","text":"原来还有这种机会"},{"key":"B","text":"这说的就是我，我想继续看"},{"key":"C","text":"我现在就想问问怎么买"},{"key":"D","text":"这个人做事很稳，交给 TA 应该靠谱"}]},{"id":29,"module":"长期复利","text":"你认为真正能持续赚钱的关键是：","options":[{"key":"A","text":"持续掌握信息差，不断换到更好的入口"},{"key":"B","text":"持续积累信任和影响力，让别人主动找你"},{"key":"C","text":"持续提升成交效率，把需求变成现金流"},{"key":"D","text":"持续沉淀产品和系统，让时间帮你放大结果"}]},{"id":30,"module":"长期复利","text":"你最想摆脱的赚钱状态是：","options":[{"key":"A","text":"永远慢半拍，总等别人做起来才发现机会"},{"key":"B","text":"能力明明不差，却一直没有人看见"},{"key":"C","text":"聊了很多、忙了很多，但收入没有落袋"},{"key":"D","text":"每一单都很累，永远无法复制和放大"}]},{"id":31,"module":"长期复利","text":"如果给你的搞钱天赋取一个关键词，你会选：","options":[{"key":"A","text":"嗅觉"},{"key":"B","text":"吸引"},{"key":"C","text":"成交"},{"key":"D","text":"复利"}]},{"id":32,"module":"长期复利","text":"做完这 32 题，你最想得到的答案是：","options":[{"key":"A","text":"我到底靠什么机会感赚钱"},{"key":"B","text":"我到底适不适合做内容和个人 IP"},{"key":"C","text":"我到底有没有成交和销售天赋"},{"key":"D","text":"我到底适合做什么长期可复制的模式"}]}],"results":{"A":{"typeName":"机会捕手型","subtitle":"你的搞钱天赋在于发现入口、捕捉信息差和连接资源。你适合先找到对的池子，再决定怎么下场。","posterSubtext":"你赚钱不是靠蛮干，而是靠比别人更早看见机会。","maturityScore":86,"coreConclusion":"你的答案显示，你对新平台、新人群、新需求和资源流动非常敏感。别人看到的是热闹，你会下意识去问：钱从哪里来，谁在付费，哪个环节还没被满足。你不一定是最早行动的人，但你很容易找到更聪明的入口。 你真正需要的不是更多努力，而是把你的信息嗅觉变成验证动作。机会捕手最怕一直观察、一直比较，却迟迟不把机会落成产品、内容或客户。","diagnosis":"你的答案显示，你对新平台、新人群、新需求和资源流动非常敏感。别人看到的是热闹，你会下意识去问：钱从哪里来，谁在付费，哪个环节还没被满足。你不一定是最早行动的人，但你很容易找到更聪明的入口。","whatYouReallyWant":"你真正需要的不是更多努力，而是把你的信息嗅觉变成验证动作。机会捕手最怕一直观察、一直比较，却迟迟不把机会落成产品、内容或客户。","mechanism":{"title":"信息差变现机制","content":"机会捕手型的核心优势，是发现供需错位和资源缺口。你适合做选题、选品、平台研究、资源整合、趋势拆解和小众机会验证。你的关键不是知道得多，而是能不能把信息差变成可交付价值。"},"professionalBasis":["从机会嗅觉看，你会优先关注入口、人群和平台红利。","从资源关系看，你容易成为信息中转站，知道哪里有资源和机会。","从风险偏好看，你最怕跟风进场，所以需要建立快速验证机制。"],"coreTensions":["机会敏感","信息量大","容易观望","擅长连接","需要落地"],"suitableIf":["选题策划","资源整合","平台研究","小众机会测试","副业方向判断"],"cautionIf":["一直研究不行动","机会太多导致分散","只赚信息差不做交付","跟风慢半拍"],"indices":[{"label":"机会嗅觉","value":92},{"label":"信息整合力","value":89},{"label":"资源连接力","value":85},{"label":"落地行动课题","value":76}],"ifStay":"如果你一直只收集信息，机会会变成焦虑，最后看懂了很多东西，却没有真正变现。","ifChange":"如果你给每个机会设置 7 天验证动作，你会更快把嗅觉变成收入线索。","notRecommended":["一直研究不行动","机会太多导致分散","只赚信息差不做交付","跟风慢半拍"],"plan90":[{"title":"第 1 周：建立机会清单","content":"把你看到的机会按人群、痛点、付费意愿和竞争强度记录下来。"},{"title":"第 2-3 周：选 1 个入口验证","content":"不要同时试 5 个方向，先用一篇内容或一次访谈验证真实需求。"},{"title":"第 4-6 周：做最小交付","content":"把信息差变成清单、模板、咨询、社群或小服务。"},{"title":"第 7-12 周：复盘转化数据","content":"看哪个入口真正有人咨询、有人付费，再决定是否放大。"}],"closing":"你的搞钱天赋不是追热点，而是看见别人还没说出口的需求。"},"B":{"typeName":"表达变现型","subtitle":"你的搞钱天赋在于吸引注意、制造共鸣和建立个人信任。你适合用内容、人设和表达把能力卖出去。","posterSubtext":"你赚钱的入口，往往不是先卖货，而是先让别人看见你。","maturityScore":83,"coreConclusion":"你的答案显示，你对话题、标题、封面、故事和情绪共鸣很敏感。你知道同样一个东西，换一种说法就会完全不一样。你适合做内容获客、个人 IP、知识产品、审美包装和体验型表达。 你真正要解决的不是表达欲，而是表达和变现之间的桥。表达变现型最容易有热度但产品不清晰，有互动但成交链路不完整。","diagnosis":"你的答案显示，你对话题、标题、封面、故事和情绪共鸣很敏感。你知道同样一个东西，换一种说法就会完全不一样。你适合做内容获客、个人 IP、知识产品、审美包装和体验型表达。","whatYouReallyWant":"你真正要解决的不是表达欲，而是表达和变现之间的桥。表达变现型最容易有热度但产品不清晰，有互动但成交链路不完整。","mechanism":{"title":"注意力信任机制","content":"表达变现型的核心优势，是把价值包装成别人愿意停留、愿意相信、愿意继续了解的内容。你适合通过持续输出建立信任，再把关注转成咨询、产品、服务或社群。"},"professionalBasis":["从表达获客看，你擅长让用户在内容里看到自己。","从价值创造看，你     <script>
(function () {
  const app = document.getElementById("app");
  const configPaths = ["./configs/site-config.json", "./configs/career-change.json"];

  const state = {
    config: null,
    answers: {},
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    const counts = { A: 0, B: 0, C: 0, D: 0 };
    Object.values(answers).forEach((key) => {
      if (counts[key] !== undefined) counts[key] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
</html>
