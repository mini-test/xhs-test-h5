    <script>
(function () {
  const app = document.getElementById("app");
  const configPaths = ["./configs/site-config.json", "./configs/career-change.json"];

  const state = {
    config: null,
    answers: {},
    profile: { birthDate: "", actualAge: "" },
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);
      applyTheme(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }
      const savedProfile = sessionStorage.getItem(getProfileStorageKey());
      if (savedProfile) {
        state.profile = JSON.parse(savedProfile);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function applyTheme(cfg) {
    Object.entries(cfg.theme || {}).forEach(([name, value]) => {
      document.documentElement.style.setProperty(name, value);
    });
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;

    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";

  function scoreAnswers(answers) {
    if (state.config.scoring?.mode === "psychological-age") {
      return scorePsychologicalAge(answers, state.config.scoring);
    }
    if (state.config.scoring?.mode === "paired-attributes") {
      return scorePairedAttributes(answers, state.config.scoring);
    }
    if (state.config.scoring?.mode === "city-with-elements") {
      return scoreCityWithElements(answers, state.config.scoring);
    }

    const resultKeys = Object.keys(state.config.results || {});
    const counts = Object.fromEntries(resultKeys.map((key) => [key, 0]));
    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey) return;
      const option = (question.options || []).find((item) => item.key === answerKey);
      const scoreKey = option?.score || option?.result || answerKey;
      if (counts[scoreKey] !== undefined) counts[scoreKey] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function scorePsychologicalAge(answers, scoring) {
    const answerValues = scoring.answerValues || { A: 1, B: 2, C: 3, D: 4, E: 5 };
    const dimensionLabels = scoring.dimensionLabels || {};
    const dimensionOrder = scoring.dimensionOrder || Object.keys(dimensionLabels);
    const rawTotals = Object.fromEntries(dimensionOrder.map((key) => [key, 0]));
    const rawCounts = Object.fromEntries(dimensionOrder.map((key) => [key, 0]));

    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey || !question.dimension) return;
      const base = Number(answerValues[answerKey] ?? answerValues[String(answerKey)] ?? 0);
      if (!Number.isFinite(base) || base <= 0) return;
      const value = question.reverse ? 6 - base : base;
      rawTotals[question.dimension] = (rawTotals[question.dimension] || 0) + value;
      rawCounts[question.dimension] = (rawCounts[question.dimension] || 0) + 1;
    });

    const dimensions = {};
    dimensionOrder.forEach((key) => {
      const count = rawCounts[key] || 0;
      if (!count) {
        dimensions[key] = 0;
        return;
      }
      const min = count;
      const max = count * 5;
      dimensions[key] = Math.round(((rawTotals[key] - min) / (max - min)) * 100);
    });

    const matureDimensions = scoring.matureDimensions || ["emotion", "responsibility", "resilience", "tolerance", "selfAcceptance"];
    const youthfulDimensions = scoring.youthfulDimensions || ["curiosity", "socialEase", "lifePassion"];
    const matureIndex = average(matureDimensions.map((key) => dimensions[key]));
    const youthfulIndex = average(youthfulDimensions.map((key) => dimensions[key]));
    const actualAge = getActualAge(scoring);
    const psychologicalAge = clamp(
      Math.round(actualAge + (matureIndex - youthfulIndex) * Number(scoring.ageFactor ?? 0.22)),
      Number(scoring.minAge ?? 10),
      Number(scoring.maxAge ?? 70)
    );
    const delta = psychologicalAge - actualAge;
    const primary = getPsychologicalResultKey(delta, scoring);
    const counts = Object.fromEntries(Object.keys(state.config.results || {}).map((key) => [key, key === primary ? (state.config.questions || []).length : 0]));
    const rankedDimensions = dimensionOrder
      .map((key) => ({ key, label: dimensionLabels[key] || key, value: dimensions[key] ?? 0 }))
      .sort((left, right) => right.value - left.value);
    const tags = buildPsychologicalTags(rankedDimensions, delta, primary, scoring);

    return {
      counts,
      primary,
      secondary: null,
      psychological: {
        actualAge,
        psychologicalAge,
        delta,
        ageLabel: getPsychologicalAgeLabel(delta),
        matureIndex: Math.round(matureIndex),
        youthfulIndex: Math.round(youthfulIndex),
        dimensions,
        dimensionLabels,
        dimensionOrder,
        topDimensions: rankedDimensions.slice(0, 3),
        lowDimensions: rankedDimensions.slice(-2).reverse(),
        tags,
      },
    };
  }

  function getActualAge(scoring) {
    const numericAge = Number(state.profile.actualAge);
    if (Number.isFinite(numericAge) && numericAge > 0) return Math.round(numericAge);
    const birthAge = calculateAgeFromBirthDate(state.profile.birthDate);
    if (birthAge) return birthAge;
    return Number(scoring.defaultActualAge || 28);
  }

  function calculateAgeFromBirthDate(value) {
    if (!value) return null;
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return null;
    const now = new Date();
    let age = now.getFullYear() - date.getFullYear();
    const monthDiff = now.getMonth() - date.getMonth();
    if (monthDiff < 0 || (monthDiff === 0 && now.getDate() < date.getDate())) age -= 1;
    return age > 0 ? age : null;
  }

  function getPsychologicalResultKey(delta, scoring) {
    const groups = scoring.ageGroups || [
      { key: "CURIOUS_CHILD", maxDelta: -8 },
      { key: "HOT_BLOODED_TEEN", maxDelta: -3 },
      { key: "BALANCED_YOUTH", maxDelta: 2 },
      { key: "STEADY_ADVISER", maxDelta: 7 },
      { key: "CLEAR_HELM", maxDelta: Infinity },
    ];
    const hit = groups.find((item) => delta <= Number(item.maxDelta));
    return hit?.key || groups[groups.length - 1]?.key || Object.keys(state.config.results || {})[0];
  }

  function getPsychologicalAgeLabel(delta) {
    if (delta <= -8) return "灵魂明显年轻";
    if (delta <= -3) return "少年感在线";
    if (delta <= 2) return "与真实年龄同频";
    if (delta <= 7) return "心智略超前";
    return "灵魂明显成熟";
  }

  function buildPsychologicalTags(rankedDimensions, delta, primary, scoring) {
    const tagMap = scoring.dimensionTags || {};
    const ageTags = scoring.ageTags || {};
    const resultTags = scoring.resultTags || {};
    const tags = rankedDimensions
      .slice(0, 3)
      .map((item) => tagMap[item.key]?.[0] || item.label)
      .filter(Boolean);
    tags.push(ageTags[getPsychologicalAgeLabel(delta)] || getPsychologicalAgeLabel(delta));
    tags.push(resultTags[primary] || "社交原型清晰");
    return [...new Set(tags)].slice(0, 5);
  }

  function scoreCityWithElements(answers, scoring) {
    const resultKeys = Object.keys(state.config.results || {});
    const counts = Object.fromEntries(resultKeys.map((key) => [key, 0]));
    const elementMap = scoring.elementMap || {};
    const elementCounts = {};
    Object.values(elementMap).forEach((element) => { elementCounts[element] = 0; });

    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey) return;
      const option = (question.options || []).find((item) => item.key === answerKey);
      const scoreKey = option?.score || option?.result || answerKey;
      const element = elementMap[scoreKey];
      if (counts[scoreKey] !== undefined) counts[scoreKey] += 1;
      if (element && elementCounts[element] !== undefined) elementCounts[element] += 1;
    });

    const personalityElement = Object.entries(elementCounts).sort((left, right) => right[1] - left[1])[0]?.[0] || "未提供";
    const birthElement = getBirthElement(state.profile.birthDate, scoring);
    const birthWeight = Number(scoring.birthWeight ?? 0.25);
    const combined = Object.fromEntries(resultKeys.map((key) => {
      const birthBonus = elementMap[key] === birthElement ? (state.config.questions.length * birthWeight) : 0;
      return [key, counts[key] + birthBonus];
    }));
    const sorted = Object.entries(combined).sort((left, right) => right[1] - left[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    const personalityShare = counts[primary] / Math.max(1, state.config.questions.length);
    const birthMatch = elementMap[primary] === birthElement;
    const matchScore = Math.round(Math.min(99, 55 + personalityShare * 30 + (birthMatch ? 15 : 5)));
    return {
      counts,
      primary,
      secondary,
      match: { birthElement, personalityElement, elementCounts, matchScore },
    };
  }

  function getBirthElement(value, scoring) {
    if (!value) return "未提供";
    const parts = value.split("-").map(Number);
    if (parts.length !== 3 || parts.some((part) => !Number.isFinite(part))) return "未提供";
    const [year, month, day] = parts;
    const elements = scoring.birthElements || ["木", "火", "土", "金", "水"];
    return elements[Math.abs(year * 13 + month * 7 + day) % elements.length];
  }

  function scorePairedAttributes(answers, scoring) {
    const attributes = Object.fromEntries((scoring.attributes || []).map((key) => [key, 0]));
    const questionsById = Object.fromEntries((state.config.questions || []).map((question) => [question.id, question]));

    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey) return;
      const option = (question.options || []).find((item) => item.key === answerKey);
      (option?.attributes || []).forEach((attribute) => {
        if (attributes[attribute] !== undefined) attributes[attribute] += 1;
      });
    });

    const chosen = (scoring.pairs || []).map(([left, right], index) => {
      if (attributes[left] > attributes[right]) return left;
      if (attributes[right] > attributes[left]) return right;

      const tieQuestionId = scoring.tieBreakers?.[String(index)];
      const tieQuestion = questionsById[tieQuestionId];
      const tieAnswer = tieQuestion && answers[tieQuestionId];
      const tieOption = tieQuestion?.options?.find((item) => item.key === tieAnswer);
      return tieOption?.attributes?.includes(left) ? left : right;
    });

    const primary = chosen.join("");
    const counts = Object.fromEntries(Object.keys(state.config.results || {}).map((key) => [key, key === primary ? (state.config.questions || []).length : 0]));
    const alternate = chosen.slice();
    if (scoring.pairs?.length) {
      const firstPair = scoring.pairs[0];
      alternate[0] = alternate[0] === firstPair[0] ? firstPair[1] : firstPair[0];
    }
    const secondary = alternate.join("") !== primary && state.config.secondaryNotes?.[primary]?.[alternate.join("")] ? alternate.join("") : null;
    return { counts, primary, secondary, attributes };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function getProfileStorageKey() {
    return `xhsTestProfile:${state.config?.slug || "default"}`;
  }

  function getProfileInputValue(inputConfig) {
    if (!inputConfig) return "";
    if (inputConfig.type === "number") return state.profile.actualAge || "";
    return state.profile.birthDate || "";
  }

  function buildProfileFromInput(inputConfig, value) {
    if (inputConfig?.type === "number") {
      return { birthDate: "", actualAge: value };
    }
    return { birthDate: value, actualAge: "" };
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function average(values) {
    const cleanValues = values.map(Number).filter((value) => Number.isFinite(value));
    if (!cleanValues.length) return 0;
    return cleanValues.reduce((sum, value) => sum + value, 0) / cleanValues.length;
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
