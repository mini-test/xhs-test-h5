    <title>历史低谷原型测试</title>
    <style>
:root {
  --bg: #fbfaf7;
  --paper: #fffefd;
  --ink: #20242a;
  --muted: #65707d;
  --line: #d9d4ca;
  --line-strong: #b9afa0;
  --accent: #9b4339;
  --accent-soft: #f1dfd7;
  --gold: #c0964d;
  --sage: #66795f;
  --blue: #526a86;
  --shadow: 0 16px 36px rgba(60, 47, 38, 0.1);
  --radius: 8px;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background:
    linear-gradient(rgba(32, 36, 42, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(32, 36, 42, 0.035) 1px, transparent 1px),
    var(--bg);
  background-size: 24px 24px;
}

body {
  min-height: 100vh;
  margin: 0;
  color: var(--ink);
  font-family:
    "PingFang SC",
    "Microsoft YaHei",
    "Noto Sans SC",
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    sans-serif;
  letter-spacing: 0;
}

button {
  font: inherit;
}

.shell {
  width: min(100%, 480px);
  min-height: 100vh;
  margin: 0 auto;
  background: rgba(251, 250, 247, 0.88);
}

.top-rule {
  height: 4px;
  background: var(--accent);
}

.screen {
  min-height: calc(100vh - 4px);
  padding: 28px 22px 32px;
}

.home {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.kicker {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--muted);
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.dot {
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
}

.hero-title {
  margin: 26px 0 14px;
  color: var(--ink);
  font-size: 30px;
  line-height: 1.2;
  text-align: center;
  font-weight: 800;
}

.hero-subtitle {
  margin: 0 auto 28px;
  max-width: 340px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.75;
  text-align: center;
}

.hairline {
  width: 64px;
  height: 1px;
  margin: 0 auto 30px;
  background: var(--line-strong);
}

.intro {
  margin: 0 auto;
  max-width: 380px;
}

.intro p {
  margin: 0 0 15px;
  color: rgba(32, 36, 42, 0.82);
  font-size: 15px;
  line-height: 1.8;
}

.intro .strong {
  color: var(--accent);
  font-weight: 700;
}

.pill-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin: 28px 0;
}

.pill {
  min-height: 42px;
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  color: var(--muted);
  background: rgba(255, 255, 255, 0.44);
  font-size: 13px;
}

.primary-btn,
.ghost-btn,
.copy-btn {
  width: 100%;
  min-height: 48px;
  border: 1px solid var(--ink);
  border-radius: 0;
  cursor: pointer;
  transition: transform 150ms ease, background 150ms ease, color 150ms ease, border-color 150ms ease;
}

.primary-btn {
  background: var(--ink);
  color: #fff;
  font-weight: 700;
}

.ghost-btn,
.copy-btn {
  background: transparent;
  color: var(--ink);
}

.primary-btn:active,
.ghost-btn:active,
.copy-btn:active,
.option:active {
  transform: translateY(1px);
}

.disclaimer {
  margin: 18px auto 0;
  max-width: 340px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.65;
  text-align: center;
}

.quiz-screen {
  padding-top: 0;
}

.sticky-head {
  position: sticky;
  top: 0;
  z-index: 5;
  margin: 0 -22px 26px;
  padding: 14px 22px 12px;
  background: rgba(251, 250, 247, 0.95);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(12px);
}

.quiz-meta {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  color: var(--muted);
  font-size: 12px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

.progress-track {
  height: 4px;
  margin-top: 10px;
  background: rgba(32, 36, 42, 0.09);
}

.progress-bar {
  height: 100%;
  background: var(--accent);
  transition: width 260ms ease;
}

.question-no {
  color: rgba(155, 67, 57, 0.18);
  font-size: 48px;
  line-height: 1;
  font-weight: 800;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

.question-title {
  margin: 18px 0 24px;
  font-size: 22px;
  line-height: 1.5;
  font-weight: 750;
}

.options {
  display: grid;
  gap: 12px;
}

.option {
  min-height: 66px;
  display: grid;
  grid-template-columns: 30px 1fr;
  gap: 12px;
  align-items: start;
  width: 100%;
  padding: 15px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.68);
  color: var(--ink);
  text-align: left;
  cursor: pointer;
  transition: background 160ms ease, border-color 160ms ease, color 160ms ease, opacity 160ms ease;
}

.option-key {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border: 1px solid var(--line-strong);
  font-size: 13px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

.option-text {
  padding-top: 2px;
  font-size: 15px;
  line-height: 1.55;
}

.option.selected {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}

.option.selected .option-key {
  border-color: rgba(255, 255, 255, 0.8);
}

.option.dimmed {
  opacity: 0.42;
}

.hint {
  margin: 18px 0 0;
  color: var(--muted);
  font-size: 12px;
  text-align: center;
}

.loading-screen {
  display: grid;
  place-items: center;
}

.loading-card {
  width: 100%;
  max-width: 360px;
  text-align: center;
}

.spinner {
  width: 54px;
  height: 54px;
  margin: 0 auto 24px;
  border: 2px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 850ms linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.loading-text {
  min-height: 54px;
  color: var(--accent);
  font-size: 17px;
  line-height: 1.6;
  font-weight: 700;
}

.step-bars {
  display: grid;
  gap: 8px;
  margin-top: 28px;
}

.step {
  height: 4px;
  overflow: hidden;
  background: rgba(32, 36, 42, 0.09);
}

.step span {
  display: block;
  height: 100%;
  width: 0;
  background: var(--accent);
  transition: width 300ms ease;
}

.step.done span {
  width: 100%;
}

.result-screen {
  padding: 22px 18px 30px;
}

.report {
  padding: 22px 16px 18px;
  border: 1px solid var(--line);
  background: var(--paper);
  box-shadow: var(--shadow);
}

.result-type {
  margin: 8px 0 8px;
  color: var(--accent);
  font-size: 30px;
  line-height: 1.15;
  font-weight: 850;
  text-align: center;
}

.result-subtitle {
  margin: 0 auto 20px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.7;
  text-align: center;
}

.stamp-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin: 18px 0 20px;
}

.stamp {
  padding: 12px 10px;
  border: 1px solid var(--line);
  background: #fbfaf7;
}

.stamp strong {
  display: block;
  margin-bottom: 4px;
  color: var(--ink);
  font-size: 20px;
}

.stamp span {
  color: var(--muted);
  font-size: 12px;
}

.section {
  padding: 20px 0;
  border-top: 1px solid var(--line);
}

.section h2 {
  margin: 0 0 12px;
  font-size: 18px;
  color: var(--ink);
}

.section p {
  margin: 0 0 12px;
  color: rgba(32, 36, 42, 0.82);
  font-size: 15px;
  line-height: 1.85;
}

.quote {
  padding: 15px;
  border-left: 3px solid var(--accent);
  background: var(--accent-soft);
  color: #5b2d27;
  line-height: 1.8;
  font-weight: 700;
}

.meters {
  display: grid;
  gap: 14px;
}

.meter-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 7px;
  color: var(--muted);
  font-size: 13px;
}

.meter-track {
  height: 8px;
  background: rgba(32, 36, 42, 0.08);
}

.meter-fill {
  height: 100%;
  background: var(--accent);
}

.compare {
  display: grid;
  gap: 10px;
}

.compare-card {
  padding: 14px;
  border: 1px solid var(--line);
  background: #fbfaf7;
}

.compare-card h3,
.plan-card h3 {
  margin: 0 0 8px;
  font-size: 15px;
}

.compare-card p,
.plan-card p {
  font-size: 14px;
}

.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag {
  padding: 7px 9px;
  border: 1px solid var(--line);
  background: #fbfaf7;
  color: var(--muted);
  font-size: 13px;
}

.plan {
  display: grid;
  gap: 10px;
}

.plan-card {
  padding: 14px;
  border: 1px solid var(--line);
  background: #fbfaf7;
}

.secondary-note {
  padding: 14px;
  border: 1px dashed var(--line-strong);
  background: rgba(192, 150, 77, 0.12);
  line-height: 1.75;
  font-size: 14px;
}

.actions {
  display: grid;
  gap: 10px;
  margin-top: 18px;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 22px;
  z-index: 20;
  transform: translateX(-50%);
  padding: 10px 14px;
  background: var(--ink);
  color: #fff;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 180ms ease;
}

.toast.show {
  opacity: 1;
}

.error {
  display: grid;
  place-items: center;
  min-height: 100vh;
  padding: 24px;
  text-align: center;
}

.error p {
  color: var(--muted);
  line-height: 1.7;
}

@media (min-width: 700px) {
  body {
    padding: 28px 0;
  }

  .shell {
    min-height: calc(100vh - 56px);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
  }

  .screen {
    min-height: calc(100vh - 60px);
  }
}

    </style>

    <script>window.__QUIZ_CONFIG__ = {"slug":"test-history-lowpoint","topic":"你当下的难，历史上早有人熬过去了","kicker":"16-Q HISTORY LOWPOINT TEST","title":"历史低谷原型测试","subtitle":"16 个情伤与人生低谷情境，匹配一个曾在困境中熬过去的人物原型，给你一份心态调整和破局参照。","metaDescription":"完成历史低谷原型测试，生成你的历史人物原型、影子原型、破局指数和 90 天修复建议。","startButton":"开始测试","resultKicker":"Lowpoint Recovery Report","quizHint":"不要选更体面的答案，选你在低谷里最真实的第一反应。","copyButton":"复制我的结果","restartButton":"重新测试","scoreLabel":"破局韧性值","stageLabel":"低谷阶段","indexTitle":"破局五维指数","tensionTitle":"你当前的低谷矛盾点","planTitle":"未来 90 天修复建议","blurSummary":"做完 16 道题，查看你的历史低谷原型、影子原型、心态调整和破局建议。","stageLabels":[{"max":65,"label":"仍在失重"},{"max":78,"label":"开始止血"},{"max":88,"label":"破局成形"},{"max":100,"label":"反转在路上"}],"compareLabels":["顺着本能熬","升级后的破局方式"],"disclaimer":"本测试为历史人物原型投射与趣味自测，不构成心理诊断、治疗建议、法律建议或重大人生决策建议。若你正处于严重情绪危机、持续失眠或有伤害自己/他人的念头，请优先联系身边可信任的人和专业机构。","secondaryThreshold":1,"dimensions":["情绪复原","尊严边界","长期蛰伏","现实破局","意义重建"],"intro":["你现在觉得熬不过去的事，历史上早有人在更深的夜里熬过。","有人被贬、被困、被羞辱、被迫离开，也有人在失去、情伤和人生低谷里重新长出路。","接下来有 16 个低谷情境。不要选更体面的答案，选你最真实的第一反应。"],"loadingMessages":["正在读取你的低谷反应...","正在匹配历史人物原型...","正在分析你的破局方式...","正在生成心态调整建议...","报告已生成。"],"questions":[{"id":1,"module":"第一关 突然冷下来的关系","text":"那个人突然变得很冷，你第一反应更像：","options":[{"key":"A","text":"反复回想每一句话，想知道到底从哪里开始变了","score":"LQZ"},{"key":"B","text":"先把情绪收住，不让自己在对方面前失控","score":"SS"},{"key":"C","text":"把难受拆成任务，逼自己先把今天过完","score":"SMQ"},{"key":"D","text":"提醒自己先稳住，越乱越不能把判断权交出去","score":"WYM"}]},{"id":2,"module":"第二关 被人看轻以后","text":"你被人当众轻视，最可能出现的念头是：","options":[{"key":"A","text":"现在解释没用，先忍住，等有实力再说","score":"HX"},{"key":"B","text":"把这笔账记下来，慢慢做出一个他们无法忽视的结果","score":"GJ"},{"key":"C","text":"我要离开这个场子，去见更大的世界","score":"ZQ"},{"key":"D","text":"我现在只是暂时落在外面，不代表永远回不去","score":"CE"}]},{"id":3,"module":"第三关 失去以后","text":"一段关系结束后，你最难放下的是：","options":[{"key":"A","text":"那些细节太清楚了，像反复被翻出来的旧物","score":"LQZ"},{"key":"B","text":"我明明付出过真心，却像什么都没有留下","score":"SMQ"},{"key":"C","text":"我不甘心自己就这样被定义成输家","score":"GJ"},{"key":"D","text":"我怕自己以后再也没有力气重新相信谁","score":"SS"}]},{"id":4,"module":"第四关 最低谷的一天","text":"如果今天真的很糟，你更想做的是：","options":[{"key":"A","text":"找一个安静地方，把心里的秩序重新理一遍","score":"WYM"},{"key":"B","text":"哪怕没有人懂，也先把该做的事做完","score":"HX"},{"key":"C","text":"去一个陌生地方走走，让世界把我重新打开","score":"ZQ"},{"key":"D","text":"找一个还能相信我的人，哪怕只说几句话","score":"CE"}]},{"id":5,"module":"第五关 别人劝你放下","text":"别人说「别想了，向前看」，你心里更真实的反应是：","options":[{"key":"A","text":"我不是不想放下，是有些东西还没有被好好告别","score":"LQZ"},{"key":"B","text":"放下不是装作没发生，而是把它变成我自己的东西","score":"SMQ"},{"key":"C","text":"真正能向前看的人，是先把心安顿下来的人","score":"WYM"},{"key":"D","text":"我会向前看，但不要催我用快乐证明我好了","score":"SS"}]},{"id":6,"module":"第六关 重新开始","text":"如果让你重新开始，你最想先拥有：","options":[{"key":"A","text":"一个不被打扰的修复期，慢慢恢复元气","score":"SS"},{"key":"B","text":"一个能让我重新证明自己的机会","score":"HX"},{"key":"C","text":"一张长期计划表，我要把失去一点点赢回来","score":"GJ"},{"key":"D","text":"一条新的路线，哪怕要走很远很久","score":"ZQ"}]},{"id":7,"module":"第七关 孤立无援","text":"当你发现没人真的能帮你，你更容易：","options":[{"key":"A","text":"把情绪写下来，至少让它不要烂在身体里","score":"LQZ"},{"key":"B","text":"接受自己暂时孤独，但不接受人生就此作废","score":"SMQ"},{"key":"C","text":"向内找答案，先把自己从慌乱里捞出来","score":"WYM"},{"key":"D","text":"降低期待，先活下去，再找能一起走的人","score":"CE"}]},{"id":8,"module":"第八关 机会很小","text":"只剩一个很小的翻盘机会，你会：","options":[{"key":"A","text":"先低头穿过眼前这段路，不在最脏的时候硬碰硬","score":"HX"},{"key":"B","text":"忍到条件成熟，再一次性把局面扳回来","score":"GJ"},{"key":"C","text":"哪怕过程很漫长，也要去试那条别人没走过的路","score":"ZQ"},{"key":"D","text":"把人重新聚起来，先找回可以依靠的阵地","score":"CE"}]},{"id":9,"module":"第九关 反复想起旧人","text":"你又想起了旧人，最接近你的处理方式是：","options":[{"key":"A","text":"允许自己难过，但不再把全部人生交给那段关系","score":"SS"},{"key":"B","text":"把它整理成一段经验，提醒自己不要白痛一场","score":"SMQ"},{"key":"C","text":"看见念头来了，也看见念头会走，不跟它硬打","score":"WYM"},{"key":"D","text":"把那些旧物旧话保存好，因为它们也曾真实组成过我","score":"LQZ"}]},{"id":10,"module":"第十关 被迫离开","text":"如果你被迫离开熟悉的人和地方，你会更像：","options":[{"key":"A","text":"先活下来，走着走着也许就有了新的山河","score":"CE"},{"key":"B","text":"把离开当成远行，去收集下一阶段需要的地图","score":"ZQ"},{"key":"C","text":"把离开当成蛰伏，等自己真正强大再回来","score":"GJ"},{"key":"D","text":"不急着证明，先在低处把基本功练出来","score":"HX"}]},{"id":11,"module":"第十一关 夜里最疼的问题","text":"哪句话最容易戳到你：","options":[{"key":"A","text":"为什么我这么认真，还是会被辜负","score":"LQZ"},{"key":"B","text":"难道我受过的委屈只能白白算了吗","score":"SMQ"},{"key":"C","text":"我到底要怎么才能不被情绪牵着走","score":"WYM"},{"key":"D","text":"我是不是已经错过人生最好的时候了","score":"SS"}]},{"id":12,"module":"第十二关 别人的成功","text":"看到别人已经走出来了，你心里更可能：","options":[{"key":"A","text":"有点羡慕，但也提醒自己每个人的复原速度不同","score":"SS"},{"key":"B","text":"暗暗用力，我也要让这段低谷有一个交代","score":"GJ"},{"key":"C","text":"觉得自己需要一套更稳的心法，而不是继续靠硬撑","score":"WYM"},{"key":"D","text":"想去更远处看看，别总困在同一个比较里","score":"ZQ"}]},{"id":13,"module":"第十三关 对方回来找你","text":"如果伤害过你的人又回来，你第一反应是：","options":[{"key":"A","text":"先看他是否真正理解自己做错了什么","score":"SMQ"},{"key":"B","text":"我可以平静，但不会轻易交出边界","score":"SS"},{"key":"C","text":"不急着表态，先观察局势和对方的真实目的","score":"GJ"},{"key":"D","text":"我会问自己：现在的我还需要回到那里吗","score":"WYM"}]},{"id":14,"module":"第十四关 重建生活","text":"最能帮你重新活起来的东西是：","options":[{"key":"A","text":"规律、吃饭、睡觉、散步，把日子一点点养回来","score":"SS"},{"key":"B","text":"写作、记录、作品，把痛变成能留下的东西","score":"SMQ"},{"key":"C","text":"修心、复盘、看清自己真正能控制什么","score":"WYM"},{"key":"D","text":"新的路、新的人、新城市，让生命重新流动","score":"ZQ"}]},{"id":15,"module":"第十五关 你最想赢回什么","text":"这段低谷之后，你最想赢回的是：","options":[{"key":"A","text":"被自己尊重的感觉","score":"HX"},{"key":"B","text":"把命运握回手里的能力","score":"GJ"},{"key":"C","text":"不再被放逐感吞掉的归属","score":"CE"},{"key":"D","text":"对爱和美仍然敏感的自己","score":"LQZ"}]},{"id":16,"module":"第十六关 未来的你回头看","text":"如果未来的你回头看现在，希望看见自己：","options":[{"key":"A","text":"没有被苦难弄窄，反而把人生过宽了","score":"SS"},{"key":"B","text":"没有浪费痛苦，而是把它写进了自己的骨头里","score":"SMQ"},{"key":"C","text":"没有被外界拖走，终于拿回内心的主动权","score":"WYM"},{"key":"D","text":"没有一直停在原地，最后真的走出了自己的路","score":"CE"}]}],"results":{"SS":{"typeName":"苏轼型低谷者","subtitle":"失去后的旷达重建者","posterSubtext":"你不是不痛，你是在把痛慢慢活宽。","maturityScore":88,"coreConclusion":"你正在经历的难，最核心不是失去本身，而是世界突然变窄了。你会痛，会想不通，但你不愿让一段关系、一场失败，把整个人生都判死刑。 你真正想要的是重新恢复生活感。不是立刻赢，也不是立刻忘，而是有一天还能好好吃饭、认真看风、笑出来时不觉得背叛了过去。","diagnosis":"你正在经历的难，最核心不是失去本身，而是世界突然变窄了。你会痛，会想不通，但你不愿让一段关系、一场失败，把整个人生都判死刑。","whatYouReallyWant":"你真正想要的是重新恢复生活感。不是立刻赢，也不是立刻忘，而是有一天还能好好吃饭、认真看风、笑出来时不觉得背叛了过去。","mechanism":{"title":"你的破局机制：把苦难重新放回生活里","content":"你适合用日常感修复自己。规律、散步、做饭、见朋友、写几句轻松的话，这些看起来很小的事，会慢慢把你从情绪深水区托起来。"},"professionalBasis":["苏轼的一生多次被贬，却不断把失意转成生活、文字和旷达。这个原型提醒你，破局不一定是反击，也可以是把生命重新过宽。","你不需要用快乐证明自己好了。你只需要一点点恢复对生活的触感。"],"coreTensions":["痛感很深","复原力强","生活感修复","不愿被困住"],"suitableIf":["适合先从生活秩序恢复，而不是急着做重大决定。"],"cautionIf":["不要把故作豁达当成真正放下，能承认痛也是旷达的一部分。"],"indices":[{"label":"情绪复原","value":91},{"label":"尊严边界","value":78},{"label":"长期蛰伏","value":72},{"label":"现实破局","value":80},{"label":"意义重建","value":86}],"ifStay":"如果一直顺着本能，你会慢慢恢复，但也可能太快用玩笑盖住真正的伤口。","ifChange":"升级方式是允许自己痛，同时认真把生活重新养起来。","notRecommended":["强装没事","用热闹逃避失落","马上做终局决定","把一次失去看成全盘否定"],"plan90":[{"title":"先恢复生活感","content":"每天固定一个小动作：散步、吃热饭、晒太阳或整理房间。"},{"title":"把痛说轻一点","content":"不是否认，而是给自己留一点呼吸空间。"},{"title":"重建小期待","content":"每周安排一件能让你重新感觉到生活的事。"}],"closing":"愿你熬过这一段以后，不只是走出来，而是把人生重新过宽。"},"SMQ":{"typeName":"司马迁型低谷者","subtitle":"屈辱后的意义书写者","posterSubtext":"这段难不必立刻赢，它可以先变成你的作品和证据。","maturityScore":86,"coreConclusion":"你的痛里有很强的“不甘”。你最难接受的不是吃苦，而是这段委屈好像没有意义、没有见证、没有一个最终交代。 你想把自己从受害位置里救出来。你希望有一天回头看，这段低谷不是白受的，它让你变得更深、更硬，也更有自己的秩序。","diagnosis":"你的痛里有很强的“不甘”。你最难接受的不是吃苦，而是这段委屈好像没有意义、没有见证、没有一个最终交代。","whatYouReallyWant":"你想把自己从受害位置里救出来。你希望有一天回头看，这段低谷不是白受的，它让你变得更深、更硬，也更有自己的秩序。","mechanism":{"title":"你的破局机制：把委屈变成可留下的东西","content":"你适合记录、输出、复盘、做作品。不是为了反复咀嚼痛苦，而是把混乱固定成结构，让你知道自己不是被事情吞掉的人。"},"professionalBasis":["司马迁在极端屈辱后完成《史记》，这个原型的关键不是忍受苦难，而是把苦难转化成更大的叙事。","当你能把痛变成结构，痛就不再只是痛，它会成为你的证词和台阶。"],"coreTensions":["强烈不甘","意义执着","记录欲","长期转化"],"suitableIf":["适合写复盘、做内容、学习一门技能，给这段低谷一个可见成果。"],"cautionIf":["不要为了证明痛苦有意义，而长期把自己困在痛苦里。"],"indices":[{"label":"情绪复原","value":76},{"label":"尊严边界","value":84},{"label":"长期蛰伏","value":86},{"label":"现实破局","value":78},{"label":"意义重建","value":96}],"ifStay":"如果一直顺着本能，你会越来越能扛，但也可能把人生变成一场自证。","ifChange":"升级方式是把委屈变成作品，同时允许自己重新快乐。","notRecommended":["反复自证","沉迷受害叙事","等别人还你公道","把所有情绪都压成理性"],"plan90":[{"title":"写一份低谷档案","content":"写清发生了什么、你失去了什么、你要带走什么经验。"},{"title":"做一个可见成果","content":"用 30 天完成一件小作品，让痛苦开始有出口。"},{"title":"停止向伤害者讨意义","content":"意义不一定由对方归还，可以由你自己创造。"}],"closing":"愿你不是被这段难改写，而是亲手把它写进自己的来路。"},"WYM":{"typeName":"王阳明型低谷者","subtitle":"绝境中的心法重建者","posterSubtext":"外面越乱，你越需要先把心里的指挥权拿回来。","maturityScore":87,"coreConclusion":"你当前最需要解决的不是外部局面，而是内心失控感。事情越乱，你越容易被念头拖着跑，反复想、反复怕、反复消耗。 你想重新拿回主动权。不是控制别人，也不是立刻改变结局，而是不再让情绪替你做决定。","diagnosis":"你当前最需要解决的不是外部局面，而是内心失控感。事情越乱，你越容易被念头拖着跑，反复想、反复怕、反复消耗。","whatYouReallyWant":"你想重新拿回主动权。不是控制别人，也不是立刻改变结局，而是不再让情绪替你做决定。","mechanism":{"title":"你的破局机制：先定心，再定局","content":"你适合用复盘、冥想、写作、运动和边界练习，把注意力拉回自己能控制的地方。你的翻盘从心里的秩序开始。"},"professionalBasis":["王阳明在龙场困厄中完成心学转向，这个原型的重点是：外部无法立刻改变时，先重建内部系统。","很多低谷不是靠硬撑走出来的，而是靠一套新的心法走出来的。"],"coreTensions":["内耗强","觉察力高","心法重建","控制感修复"],"suitableIf":["适合暂停争辩，先建立稳定作息、复盘框架和情绪边界。"],"cautionIf":["不要把“修心”变成继续忍受不合理处境的借口。"],"indices":[{"label":"情绪复原","value":84},{"label":"尊严边界","value":82},{"label":"长期蛰伏","value":78},{"label":"现实破局","value":76},{"label":"意义重建","value":94}],"ifStay":"如果一直顺着本能，你会更懂自己，但也可能把现实问题都解释成心态问题。","ifChange":"升级方式是心里稳住以后，做一个具体的现实动作。","notRecommended":["无限内省","把痛苦全怪自己","用道理压情绪","在坏环境里只练忍耐"],"plan90":[{"title":"建立情绪刹车","content":"情绪上来时先等 20 分钟，再回复、解释或决定。"},{"title":"写控制清单","content":"每天只列三件自己能控制的事，并真的去做。"},{"title":"做现实边界","content":"修心之后，要有一次清晰表达或实际调整。"}],"closing":"愿你在最乱的时候，先把自己从念头里救回来。"},"LQZ":{"typeName":"李清照型低谷者","subtitle":"破碎里的情感存档者","posterSubtext":"你会记住失去，也能从失去里留下自己的语言。","maturityScore":85,"coreConclusion":"你对失去的感受非常细。别人一句“都过去了”，对你来说太轻了，因为那些细节、时间、旧物和未说完的话，确实曾经构成过你。 你不是沉迷过去，你只是希望那段经历被认真对待。你想好好告别，而不是被催着变得没事。","diagnosis":"你对失去的感受非常细。别人一句“都过去了”，对你来说太轻了，因为那些细节、时间、旧物和未说完的话，确实曾经构成过你。","whatYouReallyWant":"你不是沉迷过去，你只是希望那段经历被认真对待。你想好好告别，而不是被催着变得没事。","mechanism":{"title":"你的破局机制：让悲伤拥有一种形式","content":"你适合用文字、照片、整理旧物、仪式感来完成告别。你的复原不是忘记，而是把破碎放到一个不会继续割伤你的地方。"},"professionalBasis":["李清照经历国破、流离与情感重创，却把破碎保存成极高密度的表达。这个原型提醒你，细腻不是软弱，记得也不等于困住。","当悲伤被赋形，它会从一团雾变成可以被安放的东西。"],"coreTensions":["情感细腻","旧事难放","告别需求",       if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .filter(([, value]) => value > 0)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    if (state.config.scoring?.mode === "paired-attributes") {
      return scorePairedAttributes(answers, state.config.scoring);
    }

    const resultKeys = Object.keys(state.config.results || {});
    const counts = Object.fromEntries(resultKeys.map((key) => [key, 0]));
    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey) return;
      const option = (question.options || []).find((item) => item.key === answerKey);
      const scoreKey = option?.score || option?.result || answerKey;
      if (counts[scoreKey] !== undefined) counts[scoreKey] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function scorePairedAttributes(answers, scoring) {
    const attributes = Object.fromEntries((scoring.attributes || []).map((key) => [key, 0]));
    const questionsById = Object.fromEntries((state.config.questions || []).map((question) => [question.id, question]));

    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey) return;
      const option = (question.options || []).find((item) => item.key === answerKey);
      (option?.attributes || []).forEach((attribute) => {
        if (attributes[attribute] !== undefined) attributes[attribute] += 1;
      });
    });

    const chosen = (scoring.pairs || []).map(([left, right], index) => {
      if (attributes[left] > attributes[right]) return left;
      if (attributes[right] > attributes[left]) return right;

      const tieQuestionId = scoring.tieBreakers?.[String(index)];
      const tieQuestion = questionsById[tieQuestionId];
      const tieAnswer = tieQuestion && answers[tieQuestionId];
      const tieOption = tieQuestion?.options?.find((item) => item.key === tieAnswer);
      return tieOption?.attributes?.includes(left) ? left : right;
    });

    const primary = chosen.join("");
    const counts = Object.fromEntries(Object.keys(state.config.results || {}).map((key) => [key, key === primary ? (state.config.questions || []).length : 0]));
    const alternate = chosen.slice();
    if (scoring.pairs?.length) {
      const firstPair = scoring.pairs[0];
      alternate[0] = alternate[0] === firstPair[0] ? firstPair[1] : firstPair[0];
    }
    const secondary = alternate.join("") !== primary && state.config.secondaryNotes?.[primary]?.[alternate.join("")] ? alternate.join("") : null;
    return { counts, primary, secondary, attributes };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
