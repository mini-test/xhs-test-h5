    <script>window.__QUIZ_CONFIG__ = {"slug":"test-cognition-level","topic":"测测你的认知在第几层？","kicker":"32-Q Cognition Level Test","title":"测测你的认知在第几层？","subtitle":"32 道题，看你更像信息接收层、经验判断层、系统建模层，还是元认知校准层。","metaDescription":"完成 32 道认知层级测试，生成你的认知方式报告。","startButton":"开始测试","resultKicker":"Cognition Report","quizHint":"凭第一反应选择，系统会自动进入下一题","copyButton":"复制我的结果","restartButton":"重新测试","scoreLabel":"认知清晰度","stageLabel":"当前阶段","stageLabels":[{"max":55,"label":"信息整理期"},{"max":72,"label":"经验校准期"},{"max":86,"label":"系统升级期"},{"max":100,"label":"反思迭代期"}],"compareLabels":["如果继续原认知习惯","如果刻意升级认知方式"],"disclaimer":"本测试为趣味自我观察工具，非科学测评、心理诊断、能力评级或人生决策建议。结果仅供娱乐和自我复盘参考。","secondaryThreshold":4,"dimensions":["信息处理","判断建模","偏见识别","学习升级"],"intro":["同一件事，有人只看到热闹，有人能看到经验，有人能看到系统，还有人能看见自己为什么会这样想。","这不是测聪不聪明，而是看你最常用哪一种认知入口：被信息牵动、靠经验判断、拆系统变量，还是持续校准自己的盲点。","32 道题会从信息进入、决策判断、复杂问题、情绪偏见、学习升级、人际观点、现实选择和反思迭代 8 个模块，生成你的认知方式报告。"],"loadingMessages":["正在读取你的第一反应...","正在区分信息、经验、系统和元认知倾向...","正在识别你的认知层级主类型...","正在生成 32 题认知方式报告...","分析完成。"],"questions":[{"id":1,"module":"信息进入","text":"看到一个刷屏观点时，你最常见的第一反应是：","options":[{"key":"A","text":"先看大家怎么说，评论区和转发量会影响我对它的判断"},{"key":"B","text":"马上想起自己经历过的类似情况，判断它说得像不像真的"},{"key":"C","text":"先拆它的适用对象、前提条件、变量和反例"},{"key":"D","text":"先观察自己为什么被它吸引或反感，再决定要不要相信"}]},{"id":2,"module":"信息进入","text":"朋友给你发一篇“很颠覆”的文章，你会：","options":[{"key":"A","text":"先收藏，觉得以后可能用得上，但不一定马上消化"},{"key":"B","text":"看作者是谁、有没有案例，和我过去看到的东西能不能对上"},{"key":"C","text":"提炼它的核心假设，再看证据链有没有断点"},{"key":"D","text":"同时问自己：我是不是因为它迎合了我的焦虑才觉得有道理"}]},{"id":3,"module":"信息进入","text":"进入一个完全陌生的领域，你通常会先：","options":[{"key":"A","text":"大量搜资料、关注账号、把相关内容先堆起来"},{"key":"B","text":"找有经验的人问一圈，先拿到几个实用判断"},{"key":"C","text":"画出这个领域的角色、规则、成本、收益和关键变量"},{"key":"D","text":"写下我现在的盲区、偏见和需要被验证的假设"}]},{"id":4,"module":"信息进入","text":"你看到两个互相矛盾但都很有道理的观点时，会：","options":[{"key":"A","text":"更容易被表达更强烈、点赞更多的一方带走"},{"key":"B","text":"选更符合我经验的一方，毕竟亲身经历最有参考性"},{"key":"C","text":"判断它们是不是在谈不同场景、不同对象或不同时间尺度"},{"key":"D","text":"先允许它们同时成立，再检查我急着站队的心理来源"}]},{"id":5,"module":"判断决策","text":"遇到一个重要选择，你脑子里最先出现的是：","options":[{"key":"A","text":"别人一般怎么选，哪条路看起来更安全、更被认可"},{"key":"B","text":"我以前这样选过，结果怎么样，这次能不能照着来"},{"key":"C","text":"目标、代价、概率、资源、时间窗口分别是什么"},{"key":"D","text":"我是不是被恐惧、面子或证明自己的欲望推着走"}]},{"id":6,"module":"判断决策","text":"有人问你“这个机会值不值得做”，你会先问：","options":[{"key":"A","text":"这个机会现在火不火，别人有没有做起来"},{"key":"B","text":"你有没有相关经验，过去有没有成功案例"},{"key":"C","text":"你的目标、资源、可承受损失和退出条件是什么"},{"key":"D","text":"你想做它，是被吸引，还是在逃离另一个问题"}]},{"id":7,"module":"判断决策","text":"当你很想买一个昂贵课程或工具时，你更像：","options":[{"key":"A","text":"被宣传里的结果打动，怕错过这次机会"},{"key":"B","text":"看有没有熟人买过，口碑好不好，能不能马上用上"},{"key":"C","text":"先算它解决什么问题、替代方案、投入产出和复盘标准"},{"key":"D","text":"先分辨：我是在买能力，还是在买一种“我会变好”的感觉"}]},{"id":8,"module":"判断决策","text":"你做决定最怕的是：","options":[{"key":"A","text":"自己和大多数人选得不一样，最后显得很蠢"},{"key":"B","text":"以前吃过的亏又重复一次"},{"key":"C","text":"没有把关键变量算清楚，导致后面连锁失控"},{"key":"D","text":"我以为是理性选择，其实是在合理化自己的情绪"}]},{"id":9,"module":"复杂问题","text":"工作里遇到反复出现的问题，你通常会：","options":[{"key":"A","text":"先找现成方法或模板，看看别人怎么处理"},{"key":"B","text":"凭经验判断是哪类老问题，先用熟悉办法压住"},{"key":"C","text":"拆流程、角色、激励、信息差和反馈机制"},{"key":"D","text":"检查自己是不是一直用同一种视角理解它，所以才反复卡住"}]},{"id":10,"module":"复杂问题","text":"当一件事迟迟没有结果时，你更容易：","options":[{"key":"A","text":"焦虑地继续补信息，感觉知道得还不够多"},{"key":"B","text":"怀疑是不是自己方法不熟，再多试几次旧办法"},{"key":"C","text":"重新看约束条件、关键路径和最小验证动作"},{"key":"D","text":"问自己：我是否在用“努力”掩盖不愿面对的真问题"}]},{"id":11,"module":"复杂问题","text":"你听到“这件事很复杂”时，真实反应更接近：","options":[{"key":"A","text":"有点退缩，希望有人直接告诉我结论"},{"key":"B","text":"复杂也可以先按经验分几类处理"},{"key":"C","text":"复杂不等于不可解，先找主要矛盾和变量关系"},{"key":"D","text":"我会警惕自己过早简化，也警惕自己把复杂当借口"}]},{"id":12,"module":"复杂问题","text":"你判断一个人厉不厉害，最看重：","options":[{"key":"A","text":"他懂得多不多、说出来的信息密度高不高"},{"key":"B","text":"他有没有实战经验，讲的东西能不能落地"},{"key":"C","text":"他能不能把混乱问题拆成可操作模型"},{"key":"D","text":"他能不能承认不确定，并不断修正自己的判断"}]},{"id":13,"module":"情绪与偏见","text":"被别人质疑时，你的第一反应是：","options":[{"key":"A","text":"心里一紧，马上想找更多支持自己的人或证据"},{"key":"B","text":"看对方有没有资格质疑我，没经验的人我不太想听"},{"key":"C","text":"先问清楚对方质疑的是事实、逻辑还是结论"},{"key":"D","text":"先感受自己的防御感，再判断质疑里有没有有效信息"}]},{"id":14,"module":"情绪与偏见","text":"看到别人比你进展快，你更可能：","options":[{"key":"A","text":"被刺激到，开始怀疑自己是不是落后了"},{"key":"B","text":"比较对方路径和自己的路径，找能借鉴的经验"},{"key":"C","text":"拆对方的资源、起点、策略和时间成本，不只看结果"},{"key":"D","text":"观察自己的嫉妒、焦虑或不甘，看看它提醒了什么真实需求"}]},{"id":15,"module":"情绪与偏见","text":"当一个观点让你很舒服时，你会：","options":[{"key":"A","text":"更容易相信它，因为它说出了我想听的话"},{"key":"B","text":"如果它符合我经验，我会觉得它很靠谱"},{"key":"C","text":"反而会检查它有没有偷换概念或选择性举例"},{"key":"D","text":"先提醒自己：舒服不等于正确，不舒服也不等于错误"}]},{"id":16,"module":"情绪与偏见","text":"你最容易在什么情况下判断失真？","options":[{"key":"A","text":"信息太多、大家都在讨论，我会被氛围推着走"},{"key":"B","text":"某件事触发了我以前的经历，我会不自觉套旧模板"},{"key":"C","text":"变量太多但时间太少，我可能会忽略系统里的慢变量"},{"key":"D","text":"我太想证明自己清醒时，反而可能看不见自己的盲点"}]},{"id":17,"module":"学习升级","text":"学一个新东西时，你更常做的是：","options":[{"key":"A","text":"收藏很多内容，感觉先把资料库建起来比较安心"},{"key":"B","text":"找最实用的步骤，照着做出一个结果再说"},{"key":"C","text":"搭框架、找底层原理，再把案例放进框架里校验"},{"key":"D","text":"记录自己从不会到会的误区，更新学习方法本身"}]},{"id":18,"module":"学习升级","text":"你复盘失败时，通常会：","options":[{"key":"A","text":"看是不是信息不够、准备不足，下次多查一点"},{"key":"B","text":"总结这次踩了什么坑，下次换个经验打法"},{"key":"C","text":"拆目标、策略、执行、反馈四段里哪一段断了"},{"key":"D","text":"追问我当时为什么会那样判断，背后假设是什么"}]},{"id":19,"module":"学习升级","text":"你最认可哪种成长方式？","options":[{"key":"A","text":"多输入，多接触不同信息，眼界自然会打开"},{"key":"B","text":"多经历，多踩坑，经验会把人磨出来"},{"key":"C","text":"多建模，多验证，把经验升级成可迁移的方法"},{"key":"D","text":"多反思，多更新自己的思维方式，不被旧我绑住"}]},{"id":20,"module":"学习升级","text":"当你发现自己一直信的东西可能是错的，你会：","options":[{"key":"A","text":"有点慌，先去找更多支持原观点的信息"},{"key":"B","text":"如果现实经验确实推翻了它，我会慢慢改"},{"key":"C","text":"重新检查证据和模型，看看哪部分需要替换"},{"key":"D","text":"把这当成升级机会，同时观察自己抗拒改变的原因"}]},{"id":21,"module":"人际观点","text":"和别人争论时，你更在意：","options":[{"key":"A","text":"自己有没有被理解，别人是不是站在我这边"},{"key":"B","text":"谁更有经验、谁说的更符合现实"},{"key":"C","text":"双方概念是否一致，证据和推理是否能对齐"},{"key":"D","text":"这场争论背后，我们各自在保护什么身份感"}]},{"id":22,"module":"人际观点","text":"听到一个人说话很绝对，你会：","options":[{"key":"A","text":"如果他说得很笃定，我会下意识觉得他可能很懂"},{"key":"B","text":"看他有没有经历支撑，没经历就只是口号"},{"key":"C","text":"关注他忽略了哪些条件、边界和例外"},{"key":"D","text":"同时看见：他为什么需要这么确定，我为什么会被影响"}]},{"id":23,"module":"人际观点","text":"当朋友做了你不理解的选择，你更可能：","options":[{"key":"A","text":"先用大众标准判断这是不是明智"},{"key":"B","text":"用自己的经历提醒他可能会踩什么坑"},{"key":"C","text":"问他的目标、约束和承受能力，再给建议"},{"key":"D","text":"先承认我不了解他的内在动机，避免把自己投射过去"}]},{"id":24,"module":"人际观点","text":"你最欣赏哪种表达方式？","options":[{"key":"A","text":"信息量大、金句多、听完有被震到的感觉"},{"key":"B","text":"话不虚，都是经验和具体做法"},{"key":"C","text":"能把复杂问题讲清楚，还能说明适用边界"},{"key":"D","text":"既能给出判断，也能暴露自己的不确定和修正过程"}]},{"id":25,"module":"现实选择","text":"面对职业选择，你更常问自己：","options":[{"key":"A","text":"这条路是不是大家都觉得体面、稳定、有前景"},{"key":"B","text":"这条路有没有人走通过，我能不能复制经验"},{"key":"C","text":"我的资源、能力、市场需求和时间窗口是否匹配"},{"key":"D","text":"我选它，是出于真实想要，还是出于恐惧、比较或证明"}]},{"id":26,"module":"现实选择","text":"别人突然赚到钱，你会先想到：","options":[{"key":"A","text":"这个赛道是不是又起来了，我是不是也该赶紧看看"},{"key":"B","text":"他做对了哪一步，经验上有没有能学的地方"},{"key":"C","text":"他的流量、产品、转化、成本和复购分别怎么跑"},{"key":"D","text":"我对这件事的羡慕，暴露了我哪种未被满足的需求"}]},{"id":27,"module":"现实选择","text":"当你感觉人生卡住时，你更倾向于：","options":[{"key":"A","text":"不停看内容，希望刷到一个能点醒我的答案"},{"key":"B","text":"找身边过来人聊聊，看他们当年怎么过来的"},{"key":"C","text":"把卡住拆成资源、能力、环境、选择和行动五部分"},{"key":"D","text":"先看自己是不是一直在重复同一种自我叙事"}]},{"id":28,"module":"现实选择","text":"你做计划时最容易忽略的是：","options":[{"key":"A","text":"自己到底能不能消化那么多信息"},{"key":"B","text":"过去经验这次是否还适用"},{"key":"C","text":"系统里的反馈延迟、关键约束和连锁反应"},{"key":"D","text":"我对计划的执念，是否来自不安全感而不是清晰判断"}]},{"id":29,"module":"反思迭代","text":"一件事做完后，你复盘最常停留在：","options":[{"key":"A","text":"这次我知道了哪些新信息，下次多准备一点"},{"key":"B","text":"这次经验教训是什么，下次别再踩同样的坑"},{"key":"C","text":"这套方法在哪些条件下有效，哪些条件下失效"},{"key":"D","text":"我当时的思维模式、情绪和身份感如何影响了选择"}]},{"id":30,"module":"反思迭代","text":"你觉得“认知高”更像是：","options":[{"key":"A","text":"知道很多别人不知道的信息"},{"key":"B","text":"经历多，判断准，少走弯路"},{"key":"C","text":"能看见结构、关系、变量和长期后果"},{"key":"D","text":"能不断校准自己，知道自己为什么会这样想"}]},{"id":31,"module":"反思迭代","text":"如果一个策略短期有效但长期有副作用，你会：","options":[{"key":"A","text":"先看别人是不是也这么做，大家都做就比较安心"},{"key":"B","text":"如果以前有用，我会先继续用，再边走边看"},{"key":"C","text":"评估短期收益、长期成本和替代方案"},{"key":"D","text":"检查自己是不是因为贪快，故意忽略了长期代价"}]},{"id":32,"module":"反思迭代","text":"做完这个测试，你最想得到的不是标签，而是：","options":[{"key":"A","text":"知道自己现在主要被哪些信息影响"},{"key":"B","text":"知道自己哪些经验可靠，哪些经验可能过期"},{"key":"C","text":"知道自己如何把问题拆得更清楚、更能行动"},{"key":"D","text":"知道自己如何看见盲点，并持续更新自己的思考方式"}]}],"results":{"A":{"typeName":"信息接收层","subtitle":"你对信息很敏感，容易先被氛围、热度和表达强度牵动，再慢慢形成判断。","posterSubtext":"你不是不聪明，而是太容易被信息流推着走。","maturityScore":64,"coreConclusion":"你现在最需要的不是更多信息，而是信息筛选和消化机制。你会快速捕捉热点、金句和别人给出的答案，但如果没有自己的判断框架，很容易出现收藏很多、想法很多、行动很少的状态。 你真正想要的是一个确定感：有人告诉你什么是对的，什么值得跟，什么不会错过。但成熟的认知不是跟上所有信息，而是知道哪些信息不需要进入你的大脑。","diagnosis":"你现在最需要的不是更多信息，而是信息筛选和消化机制。你会快速捕捉热点、金句和别人给出的答案，但如果没有自己的判断框架，很容易出现收藏很多、想法很多、行动很少的状态。","whatYouReallyWant":"你真正想要的是一个确定感：有人告诉你什么是对的，什么值得跟，什么不会错过。但成熟的认知不是跟上所有信息，而是知道哪些信息不需要进入你的大脑。","mechanism":{"title":"信息牵引机制","content":"当外界信息密度过高时，人会本能依赖热度、权威感和群体反馈来降低判断成本。它能让你快速跟上环境，但也会让你把“被触动”误当成“理解了”。"},"professionalBasis":["从信息处理看，你的入口很开放，但缺少稳定的过滤层。建议把收藏、转发、被打动和真正理解分开。","从决策方式看，你容易借用大众判断降低不确定感。短期能省力，长期会削弱独立判断的肌肉。","从成长路径看，你适合先建立信息饮食规则：少输入、慢消化、强输出，用复述和行动验证理解。"],"coreTensions":["信息敏感","容易被氛围带动","收藏多行动少","需要建立过滤器"],"suitableIf":["做信息收集、趋势观察、素材整理","先用框架限制输入量","把每天看到的观点写成自己的判断","用小行动验证观点，而不是继续刷"],"cautionIf":["把热度当真理","把收藏当学习","被强表达带着站队","用别人的结论替代自己的判断"],"indices":[{"label":"信息敏感度","value":88},{"label":"独立建模度","value":48},{"label":"情绪卷入度","value":82},{"label":"过滤机制需求","value":91}],"ifStay":"如果继续原习惯，你会越来越知道很多观点，却越来越难做自己的判断。信息越多，反而越容易焦虑和摇摆。","ifChange":"如果开始建立过滤机制，你会明显变清醒：不是每个热点都要追，不是每个观点都要信，也不是每个焦虑都要接住。","notRecommended":["把热度当真理","把收藏当学习","被强表达带着站队","用别人的结论替代自己的判断"],"plan90":[{"title":"第 1 周：给信息设门槛","content":"每天只保留 3 条真正值得消化的信息，并写下它的核心前提、适用对象和反例。"},{"title":"第 2-3 周：训练复述能力","content":"任何让你觉得“很有道理”的内容，都用自己的话复述一遍。复述不出来，就先不要转发和下结论。"},{"title":"第 4-6 周：减少被动输入","content":"关闭 3 个最容易制造焦虑的信息源，把刷内容时间换成输出、实践或复盘。"},{"title":"第 7-12 周：建立个人判断库","content":"每周沉淀 5 条自己的判断：我认同什么、反对什么、证据是什么、边界在哪里。"}],"closing":"你的升级点不是看更多，而是少看一点、看慢一点、看出自己的判断。"},"B":{"typeName":"经验判断层","subtitle":"你重视经历、案例和现实反馈，判断比较落地，但也容易被过去的经验框住。","posterSubtext":"你很务实，但要小心把旧经验当成永远有效的答案。","maturityScore":76,"coreConclusion":"你不是容易被热点带走的人，你更相信亲身经历、真实案例和过来人的经验。这个优势让你判断更接地气，也更容易落地行动。但风险在于：经验有适用边界，过去有效的打法，换了环境、资源和时间窗口，可能就不再成立。 你想要的是少踩坑、快落地、别被虚概念骗。你对空话天然警惕，这很好；下一步要做的是把经验升级成模型，而不是只停留在“我以前见过”。","diagnosis":"你不是容易被热点带走的人，你更相信亲身经历、真实案例和过来人的经验。这个优势让你判断更接地气，也更容易落地行动。但风险在于：经验有适用边界，过去有效的打法，换了环境、资源和时间窗口，可能就不再成立。","whatYouReallyWant":"你想要的是少踩坑、快落地、别被虚概念骗。你对空话天然警惕，这很好；下一步要做的是把经验升级成模型，而不是只停留在“我以前见过”。","mechanism":{"title":"经验迁移机制","content":"经验能帮助人快速判断，但它默认当前场景和过去场景足够相似。一旦环境变量变化，经验就需要被重新校准，否则会从优势变成惯性。"},"professionalBasis":["从决策方式看，你会优先调用过往案例，这能减少试错成本，但也可能让你低估新变量。","从学习方式看，你适合从实战里提炼规律。关键是把“发生过什么”升级成“为什么会发生、何时还会发生”。","从认知升级看，你下一步不是否定经验，而是给经验加边界：适用条件、失效条件、可迁移部分。"],"coreTensions":["落地能力强","信经验","容易低估新变量","需要把经验模型化"],"suitableIf":["实战复盘、案例拆解、流程优化","把经验沉淀成清单和判断标准","做小步快跑的验证","向不同背景的人校准盲区"],"cautionIf":["把过去的坑套到所有人身上","用经验压过数据","过早说“我见过”","忽略环境已经变了"],"indices":[{"label":"经验调用度","value":90},{"label":"现实落地度","value":84},{"label":"模型迁移度","value":66},{"label":"旧经验惯性","value":72}],"ifStay":"如果继续只靠经验判断，你会很稳，但天花板会越来越明显：越是新问题，越容易用旧答案处理。","ifChange":"如果把经验拆成模型，你会从“会做事的人”升级成“能迁移方法的人”，面对陌生问题也更有底气。","notRecommended":["把过去的坑套到所有人身上","用经验压过数据","过早说“我见过”","忽略环境已经变了"],"plan90":[{"title":"第 1 周：写经验边界","content":"挑 5 个你最常用的判断，分别写下它们成立的条件和可能失效的场景。"},{"title":"第 2-3 周：案例变变量","content":"每次复盘不要只写教训，要写目标、资源、环境、策略、反馈五个变量。"},{"title":"第 4-6 周：找反例训练","content":"主动找和你经验相反但也成功的案例，训练自己看见不同路径。"},{"title":"第 7-12 周：形成方法卡","content":"把经验沉淀成可复用的方法卡：适用对象、步骤、风险、检查点。"}],"closing":"你的经验很值钱。更进一步，是让经验不只服务过去，也能处理未来。"},"C":{"typeName":"系统建模层","subtitle":"你习惯看结构、变量和因果链，能把复杂问题拆成更可判断、可行动的模型。","posterSubtext":"你不是只看答案的人，你更在意答案背后的系统。","maturityScore":88,"coreConclusion":"你的认知方式已经比较成熟。你面对问题时，不会只看表面观点，也不会只靠过往经验，而是会拆目标、约束、变量、反馈和长期后果。你适合处理复杂选择、策略判断和多方利益问题。但你的风险是：有时会过度建模，想把所有变量都看清楚，导致行动变慢或表达变得不够有温度。 你想要的是清晰和可控。你希望看见事情背后的运行方式，而不是被单点信息或情绪带着跑。下一步不是继续把模型做复杂，而是让模型服务行动。","diagnosis":"你的认知方式已经比较成熟。你面对问题时，不会只看表面观点，也不会只靠过往经验，而是会拆目标、约束、变量、反馈和长期后果。你适合处理复杂选择、策略判断和多方利益问题。但你的风险是：有时会过度建模，想把所有变量都看清楚，导致行动变慢或表达变得不够有温度。","whatYouReallyWant":"你想要的是清晰和可控。你希望看见事情背后的运行方式，而不是被单点信息或情绪带着跑。下一步不是继续把模型做复杂，而是让模型服务行动。","mechanism":{"title":"系统建模机制","content":"系统建模型的人会把单个事件放回关系网络里理解：谁影响谁，什么是关键变量，反馈在哪里延迟，短期收益会不会带来长期成本。"},"professionalBasis":["从复杂问题处理看，你能主动拆结构，这让你比只看结论的人更稳定。","从决策质量看，你会考虑条件、边界、概率和代价，适合做职业、商业、关系中的多变量判断。","从升级方向看，你需要补的是行动节奏和表达温度，避免把所有问题都变成分析题。"],"coreTensions":["结构感强","能拆变量","容易过度分析","需要更快验证"],"suitableIf":["策略规划、商业拆解、职业选择分析","做决策模型和行动路线","处理复杂项目","帮助别人把混乱问题讲清楚"],"cautionIf":["建模过度导致拖延","忽略情绪和关系层面","把不确定问题讲得太绝对","为了完整分析错过行动窗口"],"indices":[{"label":"系统感","value":91},{"label":"变量识别","value":89},{"label":"行动转化","value":74},{"label":"过度分析风险","value":63}],"ifStay":"如果只停留在分析，你会越来越清楚问题，却可能迟迟不出手。模型再漂亮，也需要被现实验证。","ifChange":"如果把模型压缩成最小行动，你的优势会很明显：既能看清结构，又能用小实验快速校准。","notRecommended":["建模过度导致拖延","忽略情绪和关系层面","把不确定问题讲得太绝对","为了完整分析错过行动窗口"],"plan90":[{"title":"第 1 周：每个模型配一个动作","content":"分析任何问题后，都必须写出一个 48 小时内能执行的小验证动作。"},{"title":"第 2-3 周：练习一页纸表达","content":"把复杂判断压成目标、变量、风险、下一步四栏，避免分析越写越散。"},{"title":"第 4-6 周：建立反馈周期","content":"每个判断设置反馈点：什么时候看结果，用什么指标判断是否调整。"},{"title":"第 7-12 周：把模型产品化","content":"把你常用的分析框架做成模板，用来做内容、咨询、复盘或自己的决策工具。"}],"closing":"你已经能看见系统。现在要做的是让系统变成行动，而不是只变成脑内推演。"},"D":{"typeName":"元认知校准层","subtitle":"你不仅会思考问题，还会观察自己如何思考，能识别情绪、假设和盲点。","posterSubtext":"你的优势不是永远正确，而是能持续更新自己。","maturityScore":93,"coreConclusion":"你的答案显示，你具备较强的元认知能力。你不仅关心观点对不对，也会关心自己为什么会相信它、为什么会抗拒它、判断背后有没有投射、恐惧、面子或身份感。你能容纳不确定，也能在新证据出现时修正自己。风险在于：过度自我观察可能让你变得迟疑，或者把每个选择都分析成心理课题。 你想要的不是赢过别人，而是看清自己。你更在意判断是否诚实、是否可更新、是否被盲点劫持。下一步要练的是：在保持觉察的同时，更果断地进入现实行动。","diagnosis":"你的答案显示，你具备较强的元认知能力。你不仅关心观点对不对，也会关心自己为什么会相信它、为什么会抗拒它、判断背后有没有投射、恐惧、面子或身份感。你能容纳不确定，也能在新证据出现时修正自己。风险在于：过度自我观察可能让你变得迟疑，或者把每个选择都分析成心理课题。","whatYouReallyWant":"你想要的不是赢过别人，而是看清自己。你更在意判断是否诚实、是否可更新、是否被盲点劫持。下一步要练的是：在保持觉察的同时，更果断地进入现实行动。","mechanism":{"title":"自我校准机制","content":"元认知不是想得更多，而是能把“我正在怎么想”也纳入观察。它让你识别确认偏误、防御反应、身份执念和情绪驱动，从而持续更新判断。"},"professionalBasis":["从反思方式看，你会检查自己的假设和情绪来源，这是高质量判断的重要前提。","从学习方式看，你能把失败转化为方法更新，而不是只归因于外部或运气。","从行动风险看，你需要避免觉察过度。看见盲点之后，仍然要选择、执行、承担反馈。"],"coreTensions":["觉察力强","能更新自己","容纳不确定","容易过度反思"],"suitableIf":["复杂决策复盘、心理洞察型内容、个人成长咨询","做长期主义规划","处理高不确定问题","帮助别人识别思维盲区"],"cautionIf":["把行动推迟成无尽反思","过度分析自己的情绪","为了保持开放而不敢下判断","把普通问题都上升成深层课题"],"indices":[{"label":"自我觉察","value":94},{"label":"偏见识别","value":91},{"label":"更新能力","value":89},{"label":"行动果断度","value":72}],"ifStay":"如果只停留在自我观察，你会越来越懂自己，但现实推进可能变慢。觉察要服务行动，而不是替代行动。","ifChange":"如果给反思设置时限，你会变得非常强：既不被情绪劫持，也不被反思困住，能在不确定中持续校准。","notRecommended":["把行动推迟成无尽反思","过度分析自己的情绪","为了保持开放而不敢下判断","把普通问题都上升成深层课题"],"plan90":[{"title":"第 1 周：反思限时","content":"任何纠结先写 15 分钟，超过时间必须输出一个临时判断和下一步动作。"},{"title":"第 2-3 周：区分情绪和事实","content":"复盘时分两栏：我感受到什么、现实证据是什么，避免把感受直接当结论。"},{"title":"第 4-6 周：练习可撤销决策","content":"把选择分成可撤销和不可撤销。可撤销的事尽快试，不要用过度思考消耗自己。"},{"title":"第 7-12 周：建立更新日志","content":"每周记录一个被修正的判断：原假设、新证据、调整后的行动。"}],"closing":"你不需要永远正确。你真正厉害的地方，是能在变化中不断校准自己。"}},"secondaryNotes":{"A":{"B":"你的主倾向是「信息接收层」，但也带有「经验判断层」的影子。这说明你的认知方式不是单一标签：主倾向代表你最常用的思考入口，副倾向提醒你下一步可以补强的能力。","C":"你的主倾向是「信息接收层」，但也带有「系统建模层」的影子。这说明你的认知方式不是单一标签：主倾向代表你最常用的思考入口，副倾向提醒你下一步可以补强的能力。","D":"你的主倾向是「信息接收层」，但也带有「元认知校准层」的影子。这说明你的认知方式不是单一标签：主倾向代表你最常用的思考入口，副倾向提醒你下一步可以补强的能力。"},"B":{"A":"你的主倾向是「经验判断层」，但也带有「信息接收层」的影子。这说明你的认知方式不是单一标签：主倾向代表你最常用的思考入口，副倾向提醒你下一步可以补强的能力。","C":"你的主倾向是「经验判断层」，但也带有「系统建模层」的影子。这说明你的认知方式不是单一标签：主倾向代表你最常用的思考入口，副倾向提醒你下一步可以补强的能力。","D":"你的主倾向是「经验判断层」，但也带有「元认知校准层」的影子。这说明你的认知方式不是单一标签：主倾向代表你最常用的思考入口，副倾向提醒你下一步可以补强的能力。"},"C":{"A":"你的主倾向是「系统建模层」，但也带有「信息接收层」的影子。这说明你的认知方式不是单一标签：主倾向代表你最常用的思考入口，副倾向提醒你下一步可以补强的能力。","B":"你的主倾向是「系统建模层」，但也带有「经验判断层」的影子。这说明你的认知方式不是单一标签：主倾向代表你最常用的思考入口，副倾向提醒你下一步可以补强的能力。","D":"你的主倾向是「系统建模层」，但也带有「元认知校准层」的影子。这说明你的认知方式不是单一标签：主倾向代表你最常用的思考入口，副倾向提醒你下一步可以补强的能力。"},"D":{"A":"你的主倾向是「元认知校准层」，但也带有「信息接收层」的影子。这说明你的认知方式不是单一标签：主倾向代表你最常用的思考入口，副倾向提醒你下一步可以补强的能力。","B":"你的主倾向是「元认知校准层」，但也带有「经验判断层」的影子。这说明你的认知方式不是单一标签：主倾向代表你最常用的思考入口，副倾向提醒你下一步可以补强的能力。","C":"你的主倾向是「元认知校准层」，但也带有「系统建模层」的影子。这说明你的认知方式不是单一标签：主倾向代表你最常用的思考入口，副倾向提醒你下一步可以补强的能力。"}},"shareTemplate":["我测出来了：{{typeName}}","{{posterSubtext}}","{{secondaryLine}}","","测测你的认知在第几层？32题报告"]};</script>
    <script>
(function () {
  const app = document.getElementById("app");
  const configPaths = ["./configs/site-config.json", "./configs/career-change.json"];

  const state = {
    config: null,
    answers: {},
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    const counts = { A: 0, B: 0, C: 0, D: 0 };
    Object.values(answers).forEach((key) => {
      if (counts[key] !== undefined) counts[key] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
</html>
