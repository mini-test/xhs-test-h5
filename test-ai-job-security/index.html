    "Microsoft YaHei",

    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    sans-serif;
  letter-spacing: 0;
}

button {
  font: inherit;
}

.shell {

  min-height: 100vh;
  margin: 0 auto;
  background: rgba(251, 250, 247, 0.88);
}

.top-rule {
  height: 4px;
  background: var(--accent);
}

.screen {

}

.home {

  justify-content: center;
}

.kicker {

  align-items: center;
  justify-content: center;

  color: var(--muted);

  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.dot {

  height: 7px;
  background: var(--accent);
  border-radius: 50%;
}

.hero-title {

  font-size: 30px;
  line-height: 1.2;
  text-align: center;
  font-weight: 800;

.hero-subtitle {

  max-width: 340px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.75;
  text-align: center;
}

.hairline {
  width: 64px;
  height: 1px;
  margin: 0 auto 30px;
  background: var(--line-strong);
}

.intro {
  margin: 0 auto;
  max-width: 380px;
}

.intro p {
  margin: 0 0 15px;
  color: rgba(32, 36, 42, 0.82);

  line-height: 1.8;
}

.intro .strong {
  color: var(--accent);
  font-weight: 700;
}

.pill-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin: 28px 0;
}

.pill {
  min-height: 42px;
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  color: var(--muted);
  background: rgba(255, 255, 255, 0.44);
  font-size: 13px;
}

.primary-btn,
.ghost-btn,
.copy-btn {
  width: 100%;
  min-height: 48px;
  border: 1px solid var(--ink);
  border-radius: 0;
  cursor: pointer;
  transition: transform 150ms ease, background 150ms ease, color 150ms ease, border-color 150ms ease;
}

.primary-btn {
  background: var(--ink);
  color: #fff;
  font-weight: 700;
}

.ghost-btn,
.copy-btn {
  background: transparent;
  color: var(--ink);
}

.primary-btn:active,
.ghost-btn:active,
.copy-btn:active,
.option:active {
  transform: translateY(1px);
}

.disclaimer {
  margin: 18px auto 0;
  max-width: 340px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.65;
  text-align: center;
}

.quiz-screen {
  padding-top: 0;
}

.sticky-head {

  top: 0;
  z-index: 5;
  margin: 0 -22px 26px;
  padding: 14px 22px 12px;

.quiz-meta {

  justify-content: space-between;

.progress-track {

  background: rgba(32, 36, 42, 0.09);

  gap: 12px;

.option {

  gap: 12px;
  align-items: start;
  width: 100%;
  padding: 15px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.68);

  text-align: left;
  cursor: pointer;
  transition: background 160ms ease, border-color 160ms ease, color 160ms ease, opacity 160ms ease;
}

.option-key {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border: 1px solid var(--line-strong);
  font-size: 13px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

.option-text {
  padding-top: 2px;
  font-size: 15px;
  line-height: 1.55;
}

.option.selected {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;

.option.selected .option-key {

.hint {

  width: 100%;
  max-width: 360px;
  text-align: center;
}

.spinner {

  height: 54px;
  margin: 0 auto 24px;
  border: 2px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 850ms linear infinite;
}

  to {
    transform: rotate(360deg);
  }
}

.loading-text {
  min-height: 54px;
  color: var(--accent);
  font-size: 17px;
  line-height: 1.6;
  font-weight: 700;
}

  display: grid;
  gap: 8px;
  margin-top: 28px;

  background: rgba(32, 36, 42, 0.09);
}

.step span {
  display: block;
  height: 100%;
  width: 0;
  background: var(--accent);
  transition: width 300ms ease;
}

.step.done span {
  width: 100%;
}

.result-screen {
  padding: 22px 18px 30px;
}

.report {
  padding: 22px 16px 18px;
  border: 1px solid var(--line);
  background: var(--paper);

  line-height: 1.15;

}

.result-subtitle {

  color: var(--muted);
  font-size: 15px;
  line-height: 1.7;
  text-align: center;
}

  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin: 18px 0 20px;

.stamp {
  padding: 12px 10px;
  border: 1px solid var(--line);
  background: #fbfaf7;
}

.stamp strong {
  display: block;
  margin-bottom: 4px;
  color: var(--ink);
  font-size: 20px;
}

.stamp span {
  color: var(--muted);
  font-size: 12px;
}

.section {
  padding: 20px 0;
  border-top: 1px solid var(--line);

.section h2 {
  margin: 0 0 12px;
  font-size: 18px;
  color: var(--ink);
}

.section p {
  margin: 0 0 12px;
  color: rgba(32, 36, 42, 0.82);
  font-size: 15px;
  line-height: 1.85;
}

.quote {
  padding: 15px;
  border-left: 3px solid var(--accent);
  background: var(--accent-soft);
  color: #5b2d27;
  line-height: 1.8;
  font-weight: 700;
}

.meters {
  display: grid;
  gap: 14px;
}

.meter-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 7px;
  color: var(--muted);
  font-size: 13px;
}

.meter-track {
  height: 8px;
  background: rgba(32, 36, 42, 0.08);
}

.meter-fill {
  height: 100%;
  background: var(--accent);
}

.compare {
  display: grid;
  gap: 10px;
}

.compare-card {
  padding: 14px;
  border: 1px solid var(--line);
  background: #fbfaf7;
}

.compare-card h3,
.plan-card h3 {
  margin: 0 0 8px;
  font-size: 15px;
}

.compare-card p,
.plan-card p {
  font-size: 14px;
}

.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag {
  padding: 7px 9px;
  border: 1px solid var(--line);
  background: #fbfaf7;
  color: var(--muted);
  font-size: 13px;
}

.plan {
  display: grid;
  gap: 10px;
}

.plan-card {
  padding: 14px;
  border: 1px solid var(--line);
  background: #fbfaf7;
}

.secondary-note {
  padding: 14px;
  border: 1px dashed var(--line-strong);
  background: rgba(192, 150, 77, 0.12);
  line-height: 1.75;
  font-size: 14px;
}

.actions {
  display: grid;
  gap: 10px;
  margin-top: 18px;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 22px;
  z-index: 20;
  transform: translateX(-50%);
  padding: 10px 14px;
  background: var(--ink);
  color: #fff;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 180ms ease;
}

.toast.show {
  opacity: 1;
}

.error {
  display: grid;
  place-items: center;
  min-height: 100vh;
  padding: 24px;
  text-align: center;
}

.error p {
  color: var(--muted);
  line-height: 1.7;
}

@media (min-width: 700px) {
  body {
    padding: 28px 0;
  }

  .shell {
    min-height: calc(100vh - 56px);
    border: 1px solid var(--line);

  .screen {

  }

    <script>window.__QUIZ_CONFIG__ = {"slug":"test-ai-job-security","topic":"你会被 AI 替代吗？","kicker":"32-Q AI Job Security Test","title":"你会被 AI 替代吗？","subtitle":"32 道题，测测你的职业安全感等级：高替代风险、工具协作待升级、人机协同增值，还是稀缺判断护城河。","metaDescription":"完成 32 道 AI 职业安全感测试，生成你的替代风险和升级路径报告。","startButton":"开始测试","resultKicker":"AI Job Security Report","quizHint":"凭第一反应选择，系统会自动进入下一题","copyButton":"复制我的结果","restartButton":"重新测试","scoreLabel":"职业安全感","stageLabel":"当前阶段","stageLabels":[{"max":55,"label":"高风险补课期"},{"max":72,"label":"工具协作升级期"},{"max":86,"label":"工作流放大期"},{"max":100,"label":"护城河沉淀期"}],"compareLabels":["如果继续原工作方式","如果主动升级 AI 工作流"],"disclaimer":"本测试为趣味自我观察工具，非职业咨询、就业预测、法律建议或能力评级。结果仅供娱乐和自我复盘参考，不构成任何离职、转行或学习投资建议。","secondaryThreshold":4,"dimensions":["替代风险","AI 协作","业务判断","迁移能力"],"intro":["AI 真正替代的，往往不是某个岗位名称，而是岗位里可重复、可模板化、可低成本交付的那一部分。","这份测试不是吓你辞职，也不是告诉你一定安全，而是帮你看清：你的工作价值到底靠什么支撑。","32 道题会从工作内容、AI 使用、业务理解、判断能力、沟通协作、创造定义、数据反馈和学习转型 8 个模块，生成你的职业安全感报告。"],"loadingMessages":["正在读取你的岗位任务结构...","正在计算 AI 替代风险和协作能力...","正在识别你的职业安全感类型...","正在生成 32 题 AI 职业安全感报告...","分析完成。"],"questions":[{"id":1,"module":"工作内容","text":"你每天最主要的工作内容，更接近：","options":[{"key":"A","text":"按固定流程处理重复任务，结果标准比较单一"},{"key":"B","text":"有一些重复任务，也有少量需要自己判断的地方"},{"key":"C","text":"经常需要把信息整理成方案、流程或可执行动作"},{"key":"D","text":"经常要定义问题、协调资源，并为结果负责"}]},{"id":2,"module":"工作内容","text":"如果把你的工作写成 SOP，你觉得：","options":[{"key":"A","text":"大部分步骤都能写清楚，别人照着做也差不多"},{"key":"B","text":"基础部分能写清楚，但细节还要靠经验补"},{"key":"C","text":"能写成流程，但关键在于如何判断例外情况"},{"key":"D","text":"很难完全写死，因为核心是判断、沟通和取舍"}]},{"id":3,"module":"工作内容","text":"你产出的东西，通常最像：","options":[{"key":"A","text":"表格、记录、整理、转述、基础文案或固定格式材料"},{"key":"B","text":"在模板上做调整，保证内容准确、格式完整"},{"key":"C","text":"把复杂信息转成清楚方案，让别人能行动"},{"key":"D","text":"推动一个结果发生，包括判断方向、影响别人和承担后果"}]},{"id":4,"module":"工作内容","text":"如果公司要降本增效，你最担心自己哪一块被替代？","options":[{"key":"A","text":"录入、整理、查询、初稿、回复这些基础动作"},{"key":"B","text":"我会的工具和流程，别人学一阵也能上手"},{"key":"C","text":"部分执行会被替代，但方案设计和复盘还需要我"},{"key":"D","text":"单点任务可能会变，但我的价值不只在一个动作上"}]},{"id":5,"module":"AI 使用","text":"你现在使用 AI 工具的频率是：","options":[{"key":"A","text":"基本不用，或者只听别人说过"},{"key":"B","text":"偶尔用来写文案、总结、翻译，但不稳定"},{"key":"C","text":"经常用它做初稿、检索、拆任务、改表达和提效"},{"key":"D","text":"会把 AI 嵌进自己的工作流，让它承担固定环节"}]},{"id":6,"module":"AI 使用","text":"你用 AI 得到一个答案后，通常会：","options":[{"key":"A","text":"能用就直接用，主要看它写得像不像那么回事"},{"key":"B","text":"简单改一改，检查有没有明显错误"},{"key":"C","text":"核对事实、补上下文，再按目标重组输出"},{"key":"D","text":"把它当成协作对象，继续追问、验证、拆解和迭代"}]},{"id":7,"module":"AI 使用","text":"你最怕 AI 的地方是：","options":[{"key":"A","text":"它能更快完成我每天在做的基础任务"},{"key":"B","text":"我知道该学，但总觉得工具更新太快，跟不上"},{"key":"C","text":"我怕自己只会用工具，却没有形成更强的判断能力"},{"key":"D","text":"我更担心组织用 AI 改变分工，而不是某个工具本身"}]},{"id":8,"module":"AI 使用","text":"如果领导让团队全面使用 AI，你会：","options":[{"key":"A","text":"有点慌，不知道自己还能负责什么"},{"key":"B","text":"先学几个常用提示词，保证别落后太多"},{"key":"C","text":"主动找出自己工作里最适合自动化的环节"},{"key":"D","text":"重新设计流程：哪些给 AI，哪些保留给人判断"}]},{"id":9,"module":"业务理解","text":"别人问你“你这个岗位创造什么价值”，你会：","options":[{"key":"A","text":"说出自己每天负责哪些任务"},{"key":"B","text":"说出自己支持了哪些流程和部门"},{"key":"C","text":"说清楚自己的工作如何影响效率、成本或体验"},{"key":"D","text":"说清楚业务目标、关键指标和自己对结果的贡献"}]},{"id":10,"module":"业务理解","text":"你对公司赚钱方式的了解程度是：","options":[{"key":"A","text":"只知道自己手头任务，不太清楚钱从哪里来"},{"key":"B","text":"大概知道业务模式，但和我日常工作连接不强"},{"key":"C","text":"知道客户、成本、转化、交付等关键环节"},{"key":"D","text":"能判断不同决策会怎样影响收入、利润或增长"}]},{"id":11,"module":"业务理解","text":"你汇报工作时，更常说：","options":[{"key":"A","text":"我完成了什么、整理了什么、处理了多少"},{"key":"B","text":"这周进展到哪里，还有哪些问题"},{"key":"C","text":"我发现了什么问题，建议下一步怎么做"},{"key":"D","text":"这件事对目标有什么影响，我建议如何取舍资源"}]},{"id":12,"module":"业务理解","text":"如果 AI 能做你的任务，你最能保住价值的是：","options":[{"key":"A","text":"我做得更熟、更快，错误更少"},{"key":"B","text":"我懂公司流程，能处理一些特殊情况"},{"key":"C","text":"我知道什么时候该用 AI，什么时候必须人工判断"},{"key":"D","text":"我能判断要不要做这件事，以及做了对业务是否值得"}]},{"id":13,"module":"判断能力","text":"面对模糊任务时，你通常会：","options":[{"key":"A","text":"等别人说清楚标准，再开始执行"},{"key":"B","text":"先按过去经验做一版，再让别人反馈"},{"key":"C","text":"先问目标、对象、边界、成功标准和截止时间"},{"key":"D","text":"先判断这件事真正要解决什么问题，再定义方案"}]},{"id":14,"module":"判断能力","text":"当信息互相矛盾时，你更可能：","options":[{"key":"A","text":"不知道该信谁，先找一个看起来权威的说法"},{"key":"B","text":"选更符合自己经验或领导偏好的一方"},{"key":"C","text":"拆信息来源、适用场景和证据链"},{"key":"D","text":"判断冲突背后的利益、约束和未说出口的目标"}]},{"id":15,"module":"判断能力","text":"你最擅长的不是执行，而是：","options":[{"key":"A","text":"其实我现在主要还是执行比较多"},{"key":"B","text":"能发现流程里容易出错的地方"},{"key":"C","text":"能把混乱需求拆成优先级和行动步骤"},{"key":"D","text":"能看出方向是否值得做，并说服别人调整路线"}]},{"id":16,"module":"判断能力","text":"如果 AI 给了一个漂亮方案，你会先看：","options":[{"key":"A","text":"表达是否专业、结构是否完整"},{"key":"B","text":"有没有明显不符合实际的地方"},{"key":"C","text":"目标、对象、资源、风险和数据是否匹配"},{"key":"D","text":"这个方案背后的假设是否成立，以及谁会受影响"}]},{"id":17,"module":"沟通协作","text":"你的工作有多少价值来自沟通协调？","options":[{"key":"A","text":"不多，我主要按要求完成个人任务"},{"key":"B","text":"有一些，需要和上下游对信息"},{"key":"C","text":"不少，经常要把不同人的需求翻译成可执行方案"},{"key":"D","text":"非常多，我的价值很大一部分来自影响人和推动共识"}]},{"id":18,"module":"沟通协作","text":"别人不配合时，你通常会：","options":[{"key":"A","text":"先等，或者把问题上报给领导"},{"key":"B","text":"催几次，补充说明截止时间和要求"},{"key":"C","text":"找对方的顾虑、资源缺口和配合动机"},{"key":"D","text":"重新设计协作关系，让对方看到共同收益或代价"}]},{"id":19,"module":"沟通协作","text":"你能不能把专业内容讲给非专业的人听？","options":[{"key":"A","text":"比较难，我习惯按专业语言说"},{"key":"B","text":"能讲大概，但有时对方还是听不懂"},{"key":"C","text":"能把复杂内容换成对方能理解的例子和步骤"},{"key":"D","text":"能根据对象调整表达，并推动对方做决定"}]},{"id":20,"module":"沟通协作","text":"你在团队里最不可替代的地方是：","options":[{"key":"A","text":"我熟悉很多细节，知道事情该怎么处理"},{"key":"B","text":"我靠谱，交代的事基本不会掉链子"},{"key":"C","text":"我能把信息、流程和人串起来，减少混乱"},{"key":"D","text":"我能推动关键人达成一致，让事情真的往前走"}]},{"id":21,"module":"创造与问题定义","text":"当一个任务没有标准答案时，你会：","options":[{"key":"A","text":"有点慌，怕做出来不符合要求"},{"key":"B","text":"找同类案例，先模仿一个版本"},{"key":"C","text":"先定义评价标准，再做几个可选方案"},{"key":"D","text":"先判断真正的问题是什么，再决定是否需要新方案"}]},{"id":22,"module":"创造与问题定义","text":"你做内容、方案或产品时，最常做的是：","options":[{"key":"A","text":"按模板填内容，保证完整不出错"},{"key":"B","text":"参考别人做法，改成适合自己的版本"},{"key":"C","text":"从用户痛点和场景出发，设计更贴合的表达"},{"key":"D","text":"重新定义问题，让别人发现原来该这样看这件事"}]},{"id":23,"module":"创造与问题定义","text":"如果 AI 能生成 10 个方案，你的价值在于：","options":[{"key":"A","text":"从里面挑一个看起来最完整的"},{"key":"B","text":"把不合适的地方改掉，让它更像公司风格"},{"key":"C","text":"判断哪个方案最适合目标用户和真实限制"},{"key":"D","text":"提出 AI 没想到的约束、洞察或新方向"}]},{"id":24,"module":"创造与问题定义","text":"你面对新问题时，最常问的是：","options":[{"key":"A","text":"有没有现成模板可以套"},{"key":"B","text":"以前类似情况怎么做"},{"key":"C","text":"这个问题的用户、目标、成本和约束是什么"},{"key":"D","text":"我们是不是在解决一个被错误定义的问题"}]},{"id":25,"module":"数据与反馈","text":"你判断自己工作好不好，主要看：","options":[{"key":"A","text":"有没有按时完成、有没有被指出错误"},{"key":"B","text":"领导和同事反馈怎么样"},{"key":"C","text":"结果数据、用户反馈和后续影响有没有变好"},{"key":"D","text":"是否推动关键指标、策略判断或组织效率改变"}]},{"id":26,"module":"数据与反馈","text":"你平时会主动追踪结果吗？","options":[{"key":"A","text":"很少，交付出去基本就结束了"},{"key":"B","text":"有时会看反馈，但不系统"},{"key":"C","text":"会看数据和反馈，用来改下一版工作"},{"key":"D","text":"会建立反馈闭环，让团队知道什么有效、什么该停"}]},{"id":27,"module":"数据与反馈","text":"如果你的岗位被要求用数据证明价值，你会：","options":[{"key":"A","text":"很难，我做的很多事好像不好量化"},{"key":"B","text":"能列出工作量和完成率，但不确定是否足够"},{"key":"C","text":"能找出效率、转化、满意度、错误率等指标"},{"key":"D","text":"能把指标和业务目标连接起来，证明投入是否值得"}]},{"id":28,"module":"数据与反馈","text":"AI 生成内容后，你最关心：","options":[{"key":"A","text":"能不能快速交差"},{"key":"B","text":"有没有错别字、格式和事实错误"},{"key":"C","text":"是否真的提高效率、质量或用户反应"},{"key":"D","text":"它是否改变了整个流程的成本结构和角色分工"}]},{"id":29,"module":"学习转型","text":"过去 3 个月，你在 AI 或职业能力上的学习状态是：","options":[{"key":"A","text":"基本没开始，更多是在看别人讨论"},{"key":"B","text":"零散学了一些工具，但没有稳定用起来"},{"key":"C","text":"有意识地把 AI 放进某些工作场景练习"},{"key":"D","text":"已经在重构自己的能力组合和工作方式"}]},{"id":30,"module":"学习转型","text":"如果你的岗位未来减少 30% 人力，你会先做什么？","options":[{"key":"A","text":"焦虑，但不知道从哪里补能力"},{"key":"B","text":"赶紧学热门工具，希望别被落下"},{"key":"C","text":"分析哪些任务会被替代，哪些能力要升级"},{"key":"D","text":"主动寻找更靠近业务、客户、策略或管理的价值位置"}]},{"id":31,"module":"学习转型","text":"你认为未来 1 年最该补的能力是：","options":[{"key":"A","text":"先把 AI 基础工具学会，不然太被动"},{"key":"B","text":"把自己的岗位技能做得更熟练，别出错"},{"key":"C","text":"AI 工作流、业务理解、数据反馈和表达能力"},{"key":"D","text":"问题定义、资源整合、决策判断和价值创造"}]},{"id":32,"module":"学习转型","text":"做完这个测试，你真正想知道的是：","options":[{"key":"A","text":"我现在到底有多危险，会不会很快被替代"},{"key":"B","text":"我该先学哪些 AI 工具，别再焦虑刷信息"},{"key":"C","text":"我的工作流怎么改，才能让 AI 放大我的能力"},{"key":"D","text":"我该往哪里迁移，才能拥有更长期的职业安全感"}]}],"results":{"A":{"typeName":"高替代风险型","subtitle":"你现在的职业安全感主要卡在：工作内容太像固定流程，容易被工具、流程或更低成本的人替代。","posterSubtext":"危险点不是 AI 太强，而是你的价值太容易被写成 SOP。","maturityScore":52,"coreConclusion":"你的答案显示，你目前有较明显的替代风险。不是说你的岗位马上会消失，而是你每天做的很多事情更偏重复执行、信息整理、基础输出和按要求交付。这类工作一旦被拆成固定步骤，就很容易被 AI 工具、自动化流程或外包协作压低价值。 你真正需要的不是继续焦虑，而是尽快把自己从“任务执行者”升级成“问题处理者”。先学会用 AI 接管低价值环节，再把精力转到判断、沟通、业务理解和结果负责上。","diagnosis":"你的答案显示，你目前有较明显的替代风险。不是说你的岗位马上会消失，而是你每天做的很多事情更偏重复执行、信息整理、基础输出和按要求交付。这类工作一旦被拆成固定步骤，就很容易被 AI 工具、自动化流程或外包协作压低价值。","whatYouReallyWant":"你真正需要的不是继续焦虑，而是尽快把自己从“任务执行者”升级成“问题处理者”。先学会用 AI 接管低价值环节，再把精力转到判断、沟通、业务理解和结果负责上。","mechanism":{"title":"SOP 替代机制","content":"AI 最先重塑的不是所有岗位，而是那些目标清楚、流程稳定、评价标准单一的任务。如果一个人的工作价值只体现在完成步骤上，组织就更容易用工具或流程重新分配这部分工作。"},"professionalBasis":["从任务结构看，你的工作里可标准化、可模板化、可自动化的比例较高，这是替代风险的核心来源。","从 AI 使用看，你还没有把工具变成自己的放大器，容易在效率竞争里被动。","从职业迁移看，你需要补业务理解、反馈指标和沟通协作，而不是只把当前任务做得更熟。"],"coreTensions":["重复任务占比高","AI 使用不足","业务价值表达弱","需要快速升级工作流"],"suitableIf":["先用 AI 接管整理、初稿、总结、改写等低价值环节","建立自己的工作成果指标","主动承担一点需要判断的任务","把岗位流程变成你能优化的对象"],"cautionIf":["只靠勤奋和熟练度保安全","拒绝学习 AI 工具","把完成任务当成创造价值","只会说我做了什么，不会说产生了什么影响"],"indices":[{"label":"替代风险","value":88},{"label":"AI 协作度","value":35},{"label":"业务护城河","value":42},{"label":"升级紧迫度","value":93}],"ifStay":"如果继续原工作方式，你会越来越努力，但议价能力可能越来越弱。组织会更关注成本和效率，而不是你做得多辛苦。","ifChange":"如果你在 30 天内把 AI 工具用进日常流程，并开始承担判断型任务，职业安全感会明显改善。","notRecommended":["只靠勤奋和熟练度保安全","拒绝学习 AI 工具","把完成任务当成创造价值","只会说我做了什么，不会说产生了什么影响"],"plan90":[{"title":"第 1 周：列出可替代任务","content":"把每天工作拆成 20 个动作，标出哪些是整理、复制、初稿、查询、格式化，这些优先交给 AI 辅助。"},{"title":"第 2-3 周：建立 AI 基础工作流","content":"固定练 3 个场景：总结资料、生成初稿、检查错误。目标不是炫技，而是把基础效率翻倍。"},{"title":"第 4-6 周：补业务语言","content":"每次汇报不要只说完成了什么，要补一句：这件事影响了什么效率、体验、风险或成本。"},{"title":"第 7-12 周：争取判断型任务","content":"主动承担一个需要分析、沟通或复盘的小项目，让别人看到你不只是执行。"}],"closing":"你的安全感不是靠躲开 AI，而是靠让 AI 先替你做低价值工作，再把你推到更高价值的位置。"},"B":{"typeName":"工具协作待升级型","subtitle":"你已经意识到 AI 会改变工作，但目前还停在零散使用工具，尚未形成稳定的职业护城河。","posterSubtext":"你不是高危，但如果只会跟风学工具，很容易被下一波工具更新甩开。","maturityScore":68,"coreConclusion":"你的替代风险处于中间状态。你不是完全不会用 AI，也不是只做重复执行，但目前更多是把 AI 当临时助手：写写文案、改改表达、查查资料。真正的风险在于，你学的是工具表面，而不是工作流、业务判断和结果负责。 你想要的是不被落下的安全感。下一步不是收藏更多 AI 教程，而是把 AI 固定放进你的工作流程，形成可复用的提效方法。","diagnosis":"你的替代风险处于中间状态。你不是完全不会用 AI，也不是只做重复执行，但目前更多是把 AI 当临时助手：写写文案、改改表达、查查资料。真正的风险在于，你学的是工具表面，而不是工作流、业务判断和结果负责。","whatYouReallyWant":"你想要的是不被落下的安全感。下一步不是收藏更多 AI 教程，而是把 AI 固定放进你的工作流程，形成可复用的提效方法。","mechanism":{"title":"工具焦虑机制","content":"很多人的 AI 焦虑来自工具更新太快：今天学这个，明天又换那个。但职业安全感不是来自会多少工具，而是来自你能不能用工具稳定提升结果。"},"professionalBasis":["从工具使用看，你已经开始接触 AI，但还缺少固定场景和验证标准。","从工作价值看，你具备一定经验和流程理解，但需要把这些沉淀成 AI 协作方法。","从转型路径看，你适合先成为团队里的 AI 提效者，而不是急着转行。"],"coreTensions":["会一点 AI","缺少稳定工作流","业务理解一般","容易被工具更新带焦虑"],"suitableIf":["把 AI 固定用在 3 个高频场景","做自己的提示词和检查清单","把经验变成流程模板","主动分享提效案例"],"cautionIf":["只学热门工具不改工作方式","把 AI 输出直接当成结果","忽略事实核查和业务上下文","学很多但没有一个场景跑通"],"indices":[{"label":"替代风险","value":66},{"label":"AI 协作度","value":58},{"label":"工作流成熟度","value":52},{"label":"升级潜力","value":84}],"ifStay":"如果继续零散使用 AI，你会缓解一点焦虑，但很难形成真正优势。别人也能学会同样工具。","ifChange":"如果你把 AI 变成稳定工作流，你会从“会用工具的人”变成“能让团队效率变高的人”。","notRecommended":["只学热门工具不改工作方式","把 AI 输出直接当成结果","忽略事实核查和业务上下文","学很多但没有一个场景跑通"],"plan90":[{"title":"第 1 周：选 3 个高频场景","content":"比如资料总结、会议纪要、内容初稿、竞品分析、简历优化，只选你每周都会用的场景。"},{"title":"第 2-3 周：做标准流程","content":"为每个场景写清输入、提示词、核查点、输出格式，别每次从零开始问。"},{"title":"第 4-6 周：量化效果","content":"记录节省时间、减少错误、提高反馈质量的具体变化，让 AI 使用变成可汇报成果。"},{"title":"第 7-12 周：扩大影响","content":"把你的流程分享给同事或团队，争取成为 AI 提效小项目的负责人。"}],"closing":"你不需要追所有工具。把一个真实场景跑深，比收藏 100 个 AI 教程更有安全感。"},"C":{"typeName":"人机协同增值型","subtitle":"你已经能让 AI 承担基础环节，把自己放到判断、整合、表达和优化的位置上。","posterSubtext":"AI 对你不是替代者，更像把你推到更高产出密度的协作者。","maturityScore":84,"coreConclusion":"你的职业安全感相对较高。你不只是会用 AI，而是知道怎样把它放进工作流程：让它做初稿、整理、推演、检查，让自己负责目标、判断、上下文和结果。这说明你正在从单点能力升级成工作流能力。 你想要的是更高效率和更强议价。下一步要做的是把个人工作流变成可展示的成果，让别人看到你不仅快，而且更能解决问题。","diagnosis":"你的职业安全感相对较高。你不只是会用 AI，而是知道怎样把它放进工作流程：让它做初稿、整理、推演、检查，让自己负责目标、判断、上下文和结果。这说明你正在从单点能力升级成工作流能力。","whatYouReallyWant":"你想要的是更高效率和更强议价。下一步要做的是把个人工作流变成可展示的成果，让别人看到你不仅快，而且更能解决问题。","mechanism":{"title":"人机协同机制","content":"AI 会重塑岗位，但它也会放大那些会定义问题、校准输出、整合资源的人。真正安全的不是不用 AI，而是把 AI 变成你的生产力底座。"},"professionalBasis":["从任务结构看，你已经能区分哪些交给 AI，哪些需要人工判断。","从业务价值看，你能把输出和实际目标连接起来，而不是只追求内容好看。","从成长路径看，你适合进一步做流程优化、跨部门协作或 AI 应用落地。"],"coreTensions":["AI 使用稳定","判断能力在增强","需要展示成果","可向流程负责人升级"],"suitableIf":["做 AI 工作流模板","承担流程优化和效率提升项目","把个人经验产品化","用数据证明提效价值"],"cautionIf":["过度依赖 AI 初稿","忽略人际影响和组织阻力","只做幕后提效不展示价值","没有把成果和指标连接"],"indices":[{"label":"替代风险","value":38},{"label":"AI 协作度","value":86},{"label":"业务护城河","value":76},{"label":"职业安全感","value":82}],"ifStay":"如果保持现状，你会比多数人更安全，但优势可能停留在个人效率层面，容易被低估。","ifChange":"如果你把工作流变成团队资产，你的价值会从“一个高效员工”升级为“一个能提升系统效率的人”。","notRecommended":["过度依赖 AI 初稿","忽略人际影响和组织阻力","只做幕后提效不展示价值","没有把成果和指标连接"],"plan90":[{"title":"第 1 周：沉淀个人工作流","content":"选一个你最常做的任务，写出 AI 参与前后的完整流程、输入输出和检查标准。"},{"title":"第 2-3 周：做一个小案例","content":"用真实数据说明节省了多少时间、减少了多少返工、提高了什么质量。"},{"title":"第 4-6 周：争取团队试点","content":"找一个低风险场景让同事也使用你的流程，收集反馈并迭代。"},{"title":"第 7-12 周：往业务结果靠","content":"把提效成果和收入、转化、满意度、交付周期或风险降低连接起来。"}],"closing":"你的方向是对的。下一步不是再多学工具，而是把你的 AI 工作流变成别人离不开的成果。"},"D":{"typeName":"稀缺判断护城河型","subtitle":"你的核心价值不在单个任务，而在问题定义、复杂判断、资源整合和推动结果。","posterSubtext":"AI 能替你做很多动作，但很难替你承担判断、责任和信任。","maturityScore":92,"coreConclusion":"你的职业安全感很强。你不是靠某个固定技能吃饭，而是靠判断、取舍、沟通、业务理解和推动结果创造价值。即使 AI 能完成很多执行动作，也很难直接替代你在复杂场景里的责任承担和资源整合。 你想要的不是保住原岗位，而是站到更长期的价值位置。下一步要做的是把你的判断能力显性化，变成方法论、管理能力或可迁移的专业资产。","diagnosis":"你的职业安全感很强。你不是靠某个固定技能吃饭，而是靠判断、取舍、沟通、业务理解和推动结果创造价值。即使 AI 能完成很多执行动作，也很难直接替代你在复杂场景里的责任承担和资源整合。","whatYouReallyWant":"你想要的不是保住原岗位，而是站到更长期的价值位置。下一步要做的是把你的判断能力显性化，变成方法论、管理能力或可迁移的专业资产。","mechanism":{"title":"责任与信任机制","content":"越靠近结果、责任、信任和复杂协调的工作，越不容易被单一工具替代。AI 可以提供选项，但组织仍需要人来定义目标、承担后果、协调利益和做最终取舍。"},"professionalBasis":["从工作结构看，你的价值已经超出单点执行，更多来自复杂判断和结果负     <script>
(function () {
  const app = document.getElementById("app");
  const configPaths = ["./configs/site-config.json", "./configs/career-change.json"];

  const state = {
    config: null,
    answers: {},
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    const counts = { A: 0, B: 0, C: 0, D: 0 };
    Object.values(answers).forEach((key) => {
      if (counts[key] !== undefined) counts[key] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
</html>
