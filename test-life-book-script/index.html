    <script>window.__QUIZ_CONFIG__ = {"slug":"test-life-book-script","topic":"你的人生剧本是哪本古书？","kicker":"32-Q Life Book Script Test","title":"你的人生剧本是哪本古书？","subtitle":"32 道真实场景题，测出你的人生更像《史记》《资治通鉴》《三国志》《世说新语》《红楼梦》还是《山海经》。报告会拆解性格、爱情、财富、事业、朋友和晚年。","metaDescription":"完成 32 道人生剧本测试，生成你的书籍人格匹配、性格、爱情、财富、事业、朋友、晚年和 90 天行动建议。","startButton":"开始测试","resultKicker":"Life Book Script Report","quizHint":"凭第一反应选择，系统会自动进入下一题。","copyButton":"复制我的结果","restartButton":"重新测试","scoreLabel":"剧本清晰度","stageLabel":"当前章节","indexTitle":"人生六维指数","tensionTitle":"你的剧本冲突","planTitle":"90天改写建议","blurSummary":"做完 32 道题，查看你的古籍人生剧本、六维指数和改写建议。","stageLabels":[{"max":55,"label":"序章"},{"max":72,"label":"转折章"},{"max":86,"label":"成局章"},{"max":100,"label":"定稿章"}],"compareLabels":["如果只照旧剧本走","如果主动改写剧本"],"disclaimer":"本测试借用经典书籍作为趣味人格原型分析，仅供娱乐和自我观察参考，不代表文学评价、命运预测、心理诊断、职业建议或任何重大人生决策依据。","secondaryThreshold":4,"dimensions":["史记","通鉴","三国","世说","红楼","山海"],"intro":["不是每个人的人生都像同一种书。","有的人是人物列传，有的人是成败复盘，有的人是乱世入局，有的人是风流人物，有的人是情感长卷，也有的人根本属于异闻图志。","32 道题会从性格、爱情、财富、事业、朋友和晚年六个维度，生成你的人生剧本报告。"],"loadingMessages":["正在读取你的第一反应...","正在匹配《史记》《资治通鉴》《三国志》《世说新语》《红楼梦》《山海经》倾向...","正在拆解性格、爱情、财富、事业、朋友和晚年...","正在生成你的人生剧本报告...","分析完成。"],"questions":[{"id":1,"module":"开篇气质","text":"如果把你的人生写成一本书，开篇最像：","options":[{"key":"A","text":"一个人带着强烈命运感登场，注定要留下名字"},{"key":"B","text":"局势复杂，先看清成败规律再决定怎么走"},{"key":"C","text":"多方势力登场，机会、联盟和竞争同时出现"},{"key":"D","text":"几个有趣的人物出场，气质和风骨先立住"},{"key":"E","text":"繁华里藏着敏感心事，关系和情绪慢慢铺开"},{"key":"F","text":"世界很奇异，主角天赋特殊，没人能按常理解释"}]},{"id":2,"module":"开篇气质","text":"别人最容易从你身上读到哪种底色？","options":[{"key":"A","text":"真实、有分量，像经历过大起大落的人"},{"key":"B","text":"清醒、谨慎，像很早就懂得现实规律的人"},{"key":"C","text":"有斗志、有策略，像随时准备进入一场局"},{"key":"D","text":"有品味、有个性，不太愿意活得庸俗"},{"key":"E","text":"细腻、敏感，能读懂关系里没说出口的东西"},{"key":"F","text":"独特、跳脱，像不属于普通分类的人"}]},{"id":3,"module":"开篇气质","text":"你最不想被写成哪种人？","options":[{"key":"A","text":"一生平淡，没有任何值得记下来的转折"},{"key":"B","text":"看不懂局势，反复踩同一种坑"},{"key":"C","text":"没有胜负心，也没有进入牌桌的资格"},{"key":"D","text":"没有风格，只会跟着别人过标准人生"},{"key":"E","text":"感情粗糙，不懂人心，也不懂自己的心"},{"key":"F","text":"被迫正常，天赋和怪异都被磨平"}]},{"id":4,"module":"开篇气质","text":"你的故事最需要哪种叙事视角？","options":[{"key":"A","text":"人物传记：看一个人如何被命运推到台前"},{"key":"B","text":"历史镜头：看选择背后的规律和代价"},{"key":"C","text":"群雄叙事：看资源、竞争和机会如何变化"},{"key":"D","text":"人物清谈：看气质、审美和一句话里的锋芒"},{"key":"E","text":"家族长卷：看关系、情感和命运如何牵动彼此"},{"key":"F","text":"异闻图志：看那些无法被常规解释的天赋和欲望"}]},{"id":5,"module":"性格底色","text":"你做选择时最像哪种人？","options":[{"key":"A","text":"会问这件事值不值得我拿人生去赌一次"},{"key":"B","text":"会先看前人怎么输、怎么赢，再下判断"},{"key":"C","text":"会判断谁是盟友、谁是对手、机会在哪里"},{"key":"D","text":"会看这件事是否符合我的风格和尊严"},{"key":"E","text":"会先感受这件事会不会伤害关系和内心秩序"},{"key":"F","text":"会问它能不能打开一个我没见过的新世界"}]},{"id":6,"module":"性格底色","text":"你最明显的性格优势是：","options":[{"key":"A","text":"真实、有骨气，关键时刻能扛命运"},{"key":"B","text":"理性、懂复盘，能从规律里避开大坑"},{"key":"C","text":"敏锐、有胜负感，懂得抓机会和站位置"},{"key":"D","text":"有审美、有风骨，活得不想太俗"},{"key":"E","text":"情感细腻，能看见人心深处的变化"},{"key":"F","text":"想象力强，能长出别人没有的路径"}]},{"id":7,"module":"性格底色","text":"你最容易被哪句话说中？","options":[{"key":"A","text":"你不是不怕输，你是觉得有些事必须亲自经历"},{"key":"B","text":"你不是悲观，你只是太知道现实会怎么运转"},{"key":"C","text":"你不是爱争，你只是受不了一直在局外"},{"key":"D","text":"你不是清高，你只是对生活质感有要求"},{"key":"E","text":"你不是多愁善感，你只是对关系变化太敏锐"},{"key":"F","text":"你不是奇怪，你只是很难被普通剧本装下"}]},{"id":8,"module":"性格底色","text":"你最需要补的一课是：","options":[{"key":"A","text":"别把所有起伏都当成宿命，也要学会经营日常"},{"key":"B","text":"别只看风险和代价，也要允许自己真正投入"},{"key":"C","text":"别把人生都变成竞争，也要学会长期建设"},{"key":"D","text":"别只保留姿态，也要让才华落到现实结果"},{"key":"E","text":"别把所有情绪都内化，也要学会清楚表达"},{"key":"F","text":"别只停在想象，也要把天赋变成可见作品"}]},{"id":9,"module":"爱情剧本","text":"你的爱情最像哪种叙事？","options":[{"key":"A","text":"轰烈、真实，有情义也有命运感"},{"key":"B","text":"谨慎观察，先判断关系是否能长久和稳定"},{"key":"C","text":"像一场博弈，吸引和试探同时存在"},{"key":"D","text":"重在精神相投，对方必须懂你的风格"},{"key":"E","text":"细腻深重，容易被微小变化牵动心绪"},{"key":"F","text":"不按常规发生，灵魂吸引比现实条件更重要"}]},{"id":10,"module":"爱情剧本","text":"你最容易在感情里卡在哪里？","options":[{"key":"A","text":"太看重真心和义气，一旦投入就不想轻易收回"},{"key":"B","text":"太怕重蹈覆辙，容易先把风险算得很清楚"},{"key":"C","text":"太在意主动权，不想在关系里输掉位置"},{"key":"D","text":"太看重感觉和品味，不愿意将就粗糙关系"},{"key":"E","text":"太敏感，对方一点变化就会牵动你很多情绪"},{"key":"F","text":"太需要灵魂共振，普通稳定反而不够吸引你"}]},{"id":11,"module":"爱情剧本","text":"你在亲密关系里真正想要的是：","options":[{"key":"A","text":"被真心选择，彼此有情有义，不辜负这段相遇"},{"key":"B","text":"安全、稳定、可预期，关系不要反复消耗"},{"key":"C","text":"互相欣赏也互相较量，最好能一起变强"},{"key":"D","text":"精神同频、表达自由，不用把自己变俗"},{"key":"E","text":"被细致理解，心里的褶皱也有人看见"},{"key":"F","text":"一种命中注定般的特别感，不像普通人的关系"}]},{"id":12,"module":"爱情剧本","text":"你的爱情最怕变成：","options":[{"key":"A","text":"轰轰烈烈后只剩遗憾，真心没有好结局"},{"key":"B","text":"明知有问题还继续走，最后验证了最坏判断"},{"key":"C","text":"双方互相消耗，谁都不肯放下胜负心"},{"key":"D","text":"为了现实凑合，慢慢失去精神吸引"},{"key":"E","text":"爱得太深太细，最后把自己困在情绪里"},{"key":"F","text":"特别感消失，被普通日子磨成无趣关系"}]},{"id":13,"module":"财富剧本","text":"你对钱的真实态度更接近：","options":[{"key":"A","text":"钱要能撑起人生关键转折，不只是数字"},{"key":"B","text":"钱是安全边界，越稳定越能减少风险"},{"key":"C","text":"钱是筹码和资源，决定你能不能上牌桌"},{"key":"D","text":"钱要服务生活质感，不能把人变得太俗"},{"key":"E","text":"钱要带来安心和体面，也要照顾关系里的感受"},{"key":"F","text":"钱最好来自独特天赋，而不是标准路径"}]},{"id":14,"module":"财富剧本","text":"你最容易在哪种赚钱方式里有优势？","options":[{"key":"A","text":"个人经历、真实表达、强人物感带来的信任"},{"key":"B","text":"复盘规律、方法论、避坑指南、长期规划"},{"key":"C","text":"资源整合、竞争机会、交易判断、增长项目"},{"key":"D","text":"审美、品味、文化表达、风格化内容"},{"key":"E","text":"情绪价值、关系洞察、女性成长、细腻表达"},{"key":"F","text":"新奇创意、非标产品、奇特人设、探索型内容"}]},{"id":15,"module":"财富剧本","text":"你最该避免的财富陷阱是：","options":[{"key":"A","text":"只靠一时命运转折，不做长期积累"},{"key":"B","text":"过度保守，错过真正值得下注的机会"},{"key":"C","text":"太想赢，进入高消耗竞争和短线赌博"},{"key":"D","text":"只追求格调，不愿面对商业转化"},{"key":"E","text":"容易因为关系和情绪影响金钱判断"},{"key":"F","text":"想法太多，落地太少，无法形成稳定收入"}]},{"id":16,"module":"财富剧本","text":"当你真正开始变有钱，最可能因为：","options":[{"key":"A","text":"你把真实人生经历变成了别人愿意相信的价值"},{"key":"B","text":"你总结出一套可复制、可避坑、可长期用的方法"},{"key":"C","text":"你抓住了一个关键机会，并敢于进入竞争场"},{"key":"D","text":"你把风格、审美和表达变成了可购买的产品"},{"key":"E","text":"你把情绪理解和关系洞察变成了内容或服务"},{"key":"F","text":"你把奇特想法做成了别人没见过的新东西"}]},{"id":17,"module":"事业剧本","text":"你的事业更适合哪种主线？","options":[{"key":"A","text":"强个人叙事：用经历、魄力和真实感建立影响力"},{"key":"B","text":"长期方法论：用规律、系统和复盘积累信任"},{"key":"C","text":"竞争型成长：在机会和变化里不断抢位置"},{"key":"D","text":"风格型路线：用审美、表达和人格辨识度出圈"},{"key":"E","text":"关系型洞察：用细腻理解和情绪表达建立连接"},{"key":"F","text":"异质型创造：用奇思、探索和非标路径形成差异"}]},{"id":18,"module":"事业剧本","text":"你最适合被放大的能力是：","options":[{"key":"A","text":"人物感和命运感"},{"key":"B","text":"理性判断和系统复盘"},{"key":"C","text":"机会捕捉和竞争策略"},{"key":"D","text":"审美风格和表达锋芒"},{"key":"E","text":"情绪感知和关系理解"},{"key":"F","text":"想象力和非标准创造"}]},{"id":19,"module":"事业剧本","text":"你在工作里最受不了：","options":[{"key":"A","text":"没有转折、没有成长，只是重复消耗"},{"key":"B","text":"没有规律、没有复盘，总在同一个坑里摔"},{"key":"C","text":"没有机会、没有位置，只能旁观别人赢"},{"key":"D","text":"没有风格、没有表达，一切都很平庸粗糙"},{"key":"E","text":"没有人情味，关系和感受都被粗暴处理"},{"key":"F","text":"没有想象空间，只允许按标准答案活着"}]},{"id":20,"module":"事业剧本","text":"你的事业上限取决于：","options":[{"key":"A","text":"能否把强烈的人生体验转成真正的作品和影响力"},{"key":"B","text":"能否把清醒判断转成可交付的系统和方法"},{"key":"C","text":"能否把胜负心转成长期稳定的竞争优势"},{"key":"D","text":"能否把审美和风骨转成清晰的商业定位"},{"key":"E","text":"能否把敏感和共情转成可持续的表达与服务"},{"key":"F","text":"能否把异想天开转成别人愿意使用的新产品"}]},{"id":21,"module":"朋友剧本","text":"你最适合和哪种人成为朋友？","options":[{"key":"A","text":"真诚、有义气，能一起经历大事的人"},{"key":"B","text":"清醒、靠谱，能互相复盘和提醒的人"},{"key":"C","text":"有野心、有行动力，能一起抢机会的人"},{"key":"D","text":"有趣、有品味，能互相欣赏风格的人"},{"key":"E","text":"细腻、懂分寸，能理解情绪变化的人"},{"key":"F","text":"奇特、开放，能接住你怪想法的人"}]},{"id":22,"module":"朋友剧本","text":"你最怕朋友关系变成：","options":[{"key":"A","text":"只有热闹，没有真正情义"},{"key":"B","text":"没有边界，总是让你替别人兜底"},{"key":"C","text":"暗中较劲，谁都不愿承认谁更强"},{"key":"D","text":"审美和价值观完全不同，聊不到一起"},{"key":"E","text":"表面亲近，实际没人照顾你的情绪"},{"key":"F","text":"所有人都要求你正常，不允许你特别"}]},{"id":23,"module":"朋友剧本","text":"你在朋友里常扮演：","options":[{"key":"A","text":"关键时刻能出头、能扛事的人"},{"key":"B","text":"帮大家看清问题、避免踩坑的人"},{"key":"C","text":"带大家行动、找机会、开新局的人"},{"key":"D","text":"提供审美、观点和趣味的人"},{"key":"E","text":"察觉气氛、照顾情绪和关系细节的人"},{"key":"F","text":"带来新想法、新体验、新世界的人"}]},{"id":24,"module":"朋友剧本","text":"你真正想要的朋友状态是：","options":[{"key":"A","text":"有事真上，不只是嘴上热闹"},{"key":"B","text":"互相清醒，不拉着彼此踩坑"},{"key":"C","text":"互相成就，不害怕彼此变强"},{"key":"D","text":"彼此欣赏，保留风格和自由"},{"key":"E","text":"细腻稳定，不粗暴消耗情绪"},{"key":"F","text":"开放好玩，可以一起探索未知"}]},{"id":25,"module":"晚年剧本","text":"你理想中的晚年更像：","options":[{"key":"A","text":"回头看一生，有起伏、有故事，也有值得写下的名字"},{"key":"B","text":"少走很多弯路，清醒稳妥地留下自己的方法和经验"},{"key":"C","text":"经历过竞争和变化，最终拥有自己的位置和资源"},{"key":"D","text":"活得有品味、有风格，哪怕老了也不俗"},{"key":"E","text":"关系柔软，情感有归处，内心不再反复漂泊"},{"key":"F","text":"依然好奇，依然在探索没人见过的新世界"}]},{"id":26,"module":"晚年剧本","text":"你最怕晚年回头看见：","options":[{"key":"A","text":"一生太平淡，没有真正为自己活过"},{"key":"B","text":"明明看见规律，却还是反复输给同样的问题"},{"key":"C","text":"一直在场外观望，没有真正进入自己的战场"},{"key":"D","text":"为了现实丢掉了审美、风骨和个人气质"},{"key":"E","text":"被太多情绪和关系消耗，没有好好爱自己"},{"key":"F","text":"把天赋压成普通，把想象力藏了一辈子"}]},{"id":27,"module":"晚年剧本","text":"你希望别人最后怎么评价你？","options":[{"key":"A","text":"这个人一生真实，有命运感，也有重量"},{"key":"B","text":"这个人很清醒，留下了有用的经验和判断"},{"key":"C","text":"这个人没有认命，最后真的闯出了位置"},{"key":"D","text":"这个人活得有风格，不随便被时代磨平"},{"key":"E","text":"这个人懂爱、懂人心，也懂得珍惜细节"},{"key":"F","text":"这个人一直特别，像从另一个世界来过"}]},{"id":28,"module":"晚年剧本","text":"你的终局最需要避免：","options":[{"key":"A","text":"只追求大起大落，却忽视稳定幸福"},{"key":"B","text":"只求安全无错，却少了真正体验"},{"key":"C","text":"只顾争位置，忘了自己为什么上场"},{"key":"D","text":"只守住姿态，没有形成现实成果"},{"key":"E","text":"只困在情绪，没有活出自己的主线"},{"key":"F","text":"只保留想象，没有把奇异天赋留给世界"}]},{"id":29,"module":"最终定型","text":"如果只能选一本书写你的人生，你最像：","options":[{"key":"A","text":"《史记》：人物立传，大开大合，真实而有重量"},{"key":"B","text":"《资治通鉴》：清醒复盘，懂规律，也懂代价"},{"key":"C","text":"《三国志》：群雄竞逐，机会、位置和胜负都很重要"},{"key":"D","text":"《世说新语》：人物风流，风格、审美和一句话的锋芒"},{"key":"E","text":"《红楼梦》：情感细密，关系、盛衰和人心最动人"},{"key":"F","text":"《山海经》：奇异非标，天赋怪诞，适合另开世界"}]},{"id":30,"module":"最终定型","text":"你现在最该升级的是：","options":[{"key":"A","text":"把命运感变成稳定作品，而不是只靠经历本身"},{"key":"B","text":"把清醒变成行动，而不是只停留在复盘"},{"key":"C","text":"把胜负心变成长期优势，而不是短期较劲"},{"key":"D","text":"把风格变成商业定位，而不是只停留在姿态"},{"key":"E","text":"把细腻变成表达和边界，而不是反复内耗"},{"key":"F","text":"把想象     <script>
(function () {
  const app = document.getElementById("app");
  const configPaths = ["./configs/site-config.json", "./configs/career-change.json"];

  const state = {
    config: null,
    answers: {},
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    const resultKeys = Object.keys(state.config.results || {});
    const counts = Object.fromEntries(resultKeys.map((key) => [key, 0]));
    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey) return;
      const option = (question.options || []).find((item) => item.key === answerKey);
      const scoreKey = option?.score || option?.result || answerKey;
      if (counts[scoreKey] !== undefined) counts[scoreKey] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
</html>
