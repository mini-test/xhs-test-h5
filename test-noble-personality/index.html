"text":"对方只给情绪安慰，却没有实际入口"},{"key":"B","text":"对方很有资源，但让我觉得自己被轻视"},{"key":"C","text":"对方不讲真话，只说一些好听但没用的话"},{"key":"D","text":"关系变成单向索取，没有互相成就"}]},{"id":15,"module":"求助方式","text":"如果别人没有立刻帮你，你通常会：","options":[{"key":"A","text":"继续寻找更匹配的资源入口"},{"key":"B","text":"有点失落，开始怀疑自己是不是不值得被帮"},{"key":"C","text":"复盘是不是自己准备不够、表达不够清楚"},{"key":"D","text":"保持联系，等以后有更合适的合作点"}]},{"id":16,"module":"求助方式","text":"你最希望贵人看见你的哪一面：","options":[{"key":"A","text":"我有野心，也有执行力，只差一个入口"},{"key":"B","text":"我很真诚，也很珍惜别人给我的善意"},{"key":"C","text":"我不怕被指出问题，我怕没人告诉我真话"},{"key":"D","text":"我不只想被帮，也想成为对方的有用伙伴"}]},{"id":17,"module":"反馈接收","text":"别人指出你的问题时，你最真实的反应是：","options":[{"key":"A","text":"只要能让我离机会更近，我愿意听"},{"key":"B","text":"会有点受伤，但也会记住对方的好意"},{"key":"C","text":"越具体越好，我需要真实标准"},{"key":"D","text":"我会判断这是不是双方共创时必须磨合的部分"}]},{"id":18,"module":"反馈接收","text":"你最容易让高标准的人愿意继续指导你，是因为：","options":[{"key":"A","text":"我会把建议转成行动，让人看到投入产出"},{"key":"B","text":"我会真诚表达感谢，不把别人的时间当理所当然"},{"key":"C","text":"我能扛得住批评，也能一次比一次做得更好"},{"key":"D","text":"我会把反馈变成合作流程，而不是个人情绪"}]},{"id":19,"module":"反馈接收","text":"被厉害的人否定一次后，你最可能：","options":[{"key":"A","text":"先难受，但会去找下一个更适合的机会入口"},{"key":"B","text":"很久都记得那种被否定的感觉"},{"key":"C","text":"把否定拆成可改的部分，重新做一版"},{"key":"D","text":"判断双方是不是价值观或节奏不合"}]},{"id":20,"module":"反馈接收","text":"你最怕贵人对你失望，是因为：","options":[{"key":"A","text":"怕错过对方背后的资源和机会"},{"key":"B","text":"怕辜负对方的信任和善意"},{"key":"C","text":"怕证明自己真的不够好"},{"key":"D","text":"怕原本有机会的合作关系断掉"}]},{"id":21,"module":"关系维护","text":"别人帮过你一次后，你通常会：","options":[{"key":"A","text":"及时反馈结果，让对方知道资源没有浪费"},{"key":"B","text":"认真感谢，也会记在心里很久"},{"key":"C","text":"带着改进后的成果再去汇报"},{"key":"D","text":"想办法在合适的时候回馈对方"}]},{"id":22,"module":"关系维护","text":"你维护关系最常见的方式是：","options":[{"key":"A","text":"带着进展和新成果出现，而不是只寒暄"},{"key":"B","text":"在细节上表达关心，让关系更有人情味"},{"key":"C","text":"持续请教和复盘，让对方看见成长曲线"},{"key":"D","text":"分享有用信息、资源或合作机会"}]},{"id":23,"module":"关系维护","text":"你最容易让关系变淡的原因是：","options":[{"key":"A","text":"忙着往前冲，忘了同步进展和感谢"},{"key":"B","text":"太怕打扰别人，所以很久不主动联系"},{"key":"C","text":"觉得自己还没做出成绩，不好意思出现"},{"key":"D","text":"如果没有共同项目，就不知道怎么自然保持连接"}]},{"id":24,"module":"关系维护","text":"你最欣赏的关系状态是：","options":[{"key":"A","text":"对方愿意给我机会，我也能用结果证明自己"},{"key":"B","text":"彼此真诚，有事可以被托住"},{"key":"C","text":"对方高标准要求我，但我知道那是在帮我变强"},{"key":"D","text":"彼此平等互补，不用讨好也能一起成事"}]},{"id":25,"module":"机会承接","text":"如果有人突然把你推荐给一个重要机会，你最需要补的是：","options":[{"key":"A","text":"更清楚地讲出自己的定位和可交付成果"},{"key":"B","text":"更稳定地相信自己值得被推荐"},{"key":"C","text":"更扎实的作品、案例和专业表达"},{"key":"D","text":"更明确的合作边界、分工和回报方式"}]},{"id":26,"module":"机会承接","text":"你最容易错过贵人的时刻是：","options":[{"key":"A","text":"机会来了，但我没有提前准备好展示材料"},{"key":"B","text":"别人释放善意时，我反而不好意思接住"},{"key":"C","text":"别人愿意教我，但我怕暴露短板"},{"key":"D","text":"明明可以合作，却没有把下一步说具体"}]},{"id":27,"module":"机会承接","text":"你最适合把贵人关系变成什么：","options":[{"key":"A","text":"入口：帮我进入更大的资源场"},{"key":"B","text":"托举：在我低谷时给我信心和支持"},{"key":"C","text":"训练：帮我看到问题并持续变强"},{"key":"D","text":"共创：一起把想法做成真实成果"}]},{"id":28,"module":"机会承接","text":"如果要让别人更放心地帮你，你最该做到：","options":[{"key":"A","text":"让别人一眼看懂你要什么、能做什么"},{"key":"B","text":"表达需要时不自我贬低，也不过度讨好"},{"key":"C","text":"把每次反馈都落实成可见进步"},{"key":"D","text":"提前讲清彼此的边界、节奏和收益"}]},{"id":29,"module":"贵人盲区","text":"你最容易误会贵人的地方是：","options":[{"key":"A","text":"以为贵人一定会主动把机会送到我面前"},{"key":"B","text":"以为被帮就意味着自己不够强"},{"key":"C","text":"以为严格就是不喜欢我"},{"key":"D","text":"以为关系好就不用把合作说清楚"}]},{"id":30,"module":"贵人盲区","text":"你最容易在贵人面前隐藏什么：","options":[{"key":"A","text":"隐藏自己的野心，怕显得目的太强"},{"key":"B","text":"隐藏自己的脆弱，怕给别人添麻烦"},{"key":"C","text":"隐藏自己的不懂，怕被看轻"},{"key":"D","text":"隐藏自己的需求，怕破坏关系平衡"}]},{"id":31,"module":"贵人盲区","text":"未来 30 天，如果想更容易被贵人看见，你最愿意做的是：","options":[{"key":"A","text":"整理一份清楚的自我介绍和作品链接"},{"key":"B","text":"主动感谢和回访曾经帮过我的人"},{"key":"C","text":"找一个厉害的人请 TA 批改我的作品或方案"},{"key":"D","text":"约一个同频的人讨论一个可以共创的小项目"}]},{"id":32,"module":"贵人盲区","text":"做完这套题，你最想知道的是：","options":[{"key":"A","text":"我该怎么让资源型贵人更快看见我"},{"key":"B","text":"我是不是总把善意挡在门外"},{"key":"C","text":"我该怎么把被批评变成升级机会"},{"key":"D","text":"我该怎么把关系变成真正的互相成就"}]}],"results":{"A":{"typeName":"资源牵线型贵人","subtitle":"你更容易吸引能给入口、带资源、推你进入更大场域的人。","posterSubtext":"你不是缺人帮，你是需要让别人一眼看懂你值得被链接到哪里。","maturityScore":84,"coreConclusion":"你身上最容易被贵人看见的，是目标感、行动感和想要进入更大机会场的冲劲。资源牵线型贵人通常不会只因为你“人好”就帮你，而是因为他们看见你有明确方向、能承接机会、不会浪费入口。你适合被推荐、被引荐、被带进更高密度的圈子，但前提是你的定位和作品要足够清楚。","diagnosis":"你的关系吸引力来自“可链接性”。别人愿意帮你，是因为你让对方知道：你要什么、能做什么、适合被介绍给谁。你的问题不是没有贵人，而是有时表达太散，别人想帮也不知道从哪里下手。","whatYouReallyWant":"你真正需要的不是一句鼓励，而是一个入口、一个场域、一个能让你被更多人看见的机会。你要学会把野心说得清楚、把成果摆得具体、把请求变得可执行。","mechanism":{"title":"机会入口机制","content":"资源型贵人更愿意帮助“方向明确且能交付”的人。清晰的定位、可见的作品、具体的请求，会让对方判断帮你这件事成本低、回报高、风险小。"},"professionalBasis":["从人际网络角度看，你需要的是弱连接里的关键节点。它们未必和你很亲密，但能把你带到新的信息流和机会池。","从自我呈现角度看，你的核心任务是降低别人理解你的成本。越清楚，越容易被推荐。","从机会承接角度看，资源只是入口，能否变成结果取决于你的响应速度、交付能力和后续反馈。"],"coreTensions":["想被推荐","怕显得太功利","有行动力但表达不够聚焦","需要更清楚的个人定位"],"suitableIf":["你已经有作品、案例或可展示成果","你知道自己下一步想进入什么场域","你能及时反馈进展","你愿意主动表达具体需求"],"cautionIf":["只想要资源但没有交付准备","把贵人当成捷径","请求太大、太空、太模糊","被推荐后没有后续反馈"],"indices":[{"label":"机会识别指数","value":92},{"label":"自我呈现清晰度","value":76},{"label":"资源承接能力","value":82},{"label":"功利感风险","value":48}],"ifStay":"如果继续等别人主动发现你，你会错过很多弱连接里的入口。真正能帮你的人，往往需要你先递出清楚的信号。","ifChange":"如果你把定位、作品和请求整理清楚，资源型贵人会更容易判断该把你推荐到哪里。","notRecommended":["只说想变好","没有作品就求推荐","请求别人帮你想方向","被帮助后不反馈","隐藏真实目标"],"plan90":[{"title":"第 1-2 周：写清你的机会说明书","content":"整理一段 100 字自我介绍：你是谁、擅长什么、正在找什么机会、别人如何帮你。"},{"title":"第 3-4 周：准备可转发材料","content":"做一个作品/案例/成果链接，让别人愿意推荐你时不用重新解释。"},{"title":"第 2 个月：主动连接 10 个弱关系","content":"向行业前辈、同学、旧同事发出具体请求，不求大帮忙，只求一次建议或一次转介绍可能。"},{"title":"第 3 个月：建立反馈闭环","content":"每一次被帮助后，及时同步结果、感谢和下一步，让对方知道资源没有被浪费。"}],"closing":"你的贵人不是从天而降的。很多时候，是你把自己讲清楚以后，别人终于知道该把你推向哪里。"},"B":{"typeName":"看见托举型贵人","subtitle":"你更容易吸引愿意理解你、鼓励你、在关键时刻托你一把的人。","posterSubtext":"你吸引来的不是冷冰冰的资源，而是愿意认真看见你的人。","maturityScore":80,"coreConclusion":"你身上最容易打动贵人的，是诚恳、柔软、可靠和懂得珍惜善意。看见托举型贵人不一定一上来就给你资源，但他们会在你怀疑自己时给你信心，在你需要被理解时替你说话，在你快要退缩时提醒你别轻易否定自己。你适合被温柔型前辈、保护型领导、愿意长期陪伴你成长的人托举。","diagnosis":"你的关系吸引力来自“可信任感”。别人愿意帮你，不只是因为你有能力，而是因为你让人感觉真诚、知感恩、不把别人的善意当理所当然。你的盲区是太怕麻烦别人，反而容易把贵人的善意挡在外面。","whatYouReallyWant":"你真正需要的不是被安排人生，而是被认真看见一次。你希望有人相信你、鼓励你，也希望自己不用一直假装强大。","mechanism":{"title":"信任托举机制","content":"托举型贵人会被真诚、稳定、懂得回应善意的人吸引。这类关系不靠强索取，而靠长期信任、情感回响和关键时刻的互相支持。"},"professionalBasis":["从关系心理看，你更容易在高信任关系里释放潜力。被理解和被支持会显著提升你的行动稳定性。","从求助方式看，你需要练习不带羞耻感地表达需要。真正健康的求助不是麻烦别人，而是让关系有机会流动。","从长期发展看，托举型贵人能帮你渡过低谷，但你也要把善意转化为行动，而不是只停留在被安慰。"],"coreTensions":["渴望被看见","害怕麻烦别人","懂得感恩但不敢开口","需要把支持变成行动"],"suitableIf":["你身边有愿意听你说真话的人","你能珍惜并回应别人的善意","你愿意承认自己也有需要","你不把被帮助当成欠债"],"cautionIf":["一直等别人主动发现你的委屈","过度懂事导致需求消失","把求助看成软弱","只接受安慰但不行动"],"indices":[{"label":"信任感指数","value":90},{"label":"善意接收能力","value":68},{"label":"情绪支持需求","value":84},{"label":"过度懂事风险","value":76}],"ifStay":"如果你继续什么都自己扛，托举型贵人即使在你身边，也可能不知道你真的需要帮助。","ifChange":"如果你能更自然地表达需要，并把收到的支持转成实际行动，你会更容易进入被信任、被支持、被推荐的良性循环。","notRecommended":["装作不需要帮助","用懂事掩盖需求","把善意都当成人情债","只在崩溃时才开口","低估自己的被喜欢程度"],"plan90":[{"title":"第 1-2 周：列出 5 个可信任的人","content":"不一定是资源最多的人，而是你可以说真话、对方也愿意认真回应的人。"},{"title":"第 3-4 周：练习一次小求助","content":"用具体、轻量的方式开口，比如请对方给一个建议、看一段文字、介绍一个信息源。"},{"title":"第 2 个月：建立感谢反馈","content":"别人帮过你后，不只说谢谢，还要告诉对方这件事给你带来了什么改变。"},{"title":"第 3 个月：把支持转成成果","content":"选一个被鼓励过的方向做出小结果，让托举你的人看见你的行动力。"}],"closing":"你不需要一直证明自己很坚强。能接住善意，也是一种很重要的能力。"},"C":{"typeName":"严格打磨型贵人","subtitle":"你更容易吸引愿意指出问题、提高标准、把你训练得更强的人。","posterSubtext":"你的贵人未必温柔，但很可能真的能让你升级。","maturityScore":88,"coreConclusion":"你最容易吸引的贵人，是那些高标准、重细节、愿意讲真话的人。他们不一定会一直夸你，甚至会让你短期不舒服，但他们能看见你的潜力，也愿意花时间指出你哪里还不够好。对你来说，真正的贵人不是只给安慰的人，而是能让你变扎实、变专业、变能扛事的人。","diagnosis":"你的关系吸引力来自“可塑性”。别人愿意打磨你，是因为你不是只想听好话，而是真的愿意改、愿意复盘、愿意把反馈落实到下一版成果里。你的盲区是容易把严格误读成否定，把被指出问题当成自己不被认可。","whatYouReallyWant":"你想要的是更清楚的标准。你不怕努力，怕的是没人告诉你到底差在哪里，也怕自己一直在低水平重复。","mechanism":{"title":"高标准训练机制","content":"严格型贵人通常会被“能承受反馈、能快速迭代、有成长证据”的人吸引。对他们来说，值得培养的人不是最会讨喜的人，而是最能把建议变成进步的人。"},"professionalBasis":["从能力发展看，高质量反馈是成长加速器。越具体的批评，越能暴露你真正需要升级的地方。","从导师关系看，严格型贵人愿意投入时间，前提是他们看到你的迭代速度和执行诚意。","从心理适应看，你需要把“被指出问题”和“被否定人格”分开。前者是训练，后者才是伤害。"],"coreTensions":["想变强","怕被否定","需要真实标准","容易把批评情绪化"],"suitableIf":["你正在打磨一项硬能力","你能接受具体反馈","你愿意做第二版、第三版","你不只追求被喜欢"],"cautionIf":["把所有批评都当成针对你","只找会夸你的人","被指出问题后立刻逃避","没有把反馈变成作品或行动"],"indices":[{"label":"反馈吸收指数","value":91},{"label":"成长迭代指数","value":88},{"label":"专业打磨潜力","value":86},{"label":"受挫敏感度","value":62}],"ifStay":"如果你只待在舒服关系里，你会少受伤，但也容易少成长。真正能点醒你的人，往往不总是让你舒服。","ifChange":"如果你把批评当成训练材料，严格型贵人会更愿意持续投入，因为他们能看见自己的建议真的被你用上了。","notRecommended":["只听好话","收到反馈就自我否定","把严厉等同于不喜欢","不复盘就继续做","让别人重复提醒同一个问题"],"plan90":[{"title":"第 1-2 周：找一个具体作品请人批改","content":"不要问我怎么样，而是问：哪里最弱、先改哪三处、标准是什么。"},{"title":"第 3-4 周：做反馈记录表","content":"把每次被指出的问题归类，看看自己最常重复出现的短板是什么。"},{"title":"第 2 个月：完成三轮迭代","content":"同一个作品或技能至少做三版，让别人看见你不是听完就算了。"},{"title":"第 3 个月：主动汇报成长证据","content":"把前后对比发给给过你建议的人，让严格型贵人知道你值得继续培养。"}],"closing":"有些贵人不是来哄你的，是来把你磨亮的。你能不能接住，决定了这段关系值不值钱。"},"D":{"typeName":"同频共创型贵人","subtitle":"你更容易吸引能与你互补、协作、一起把想法做成结果的人。","posterSubtext":"你的贵人不一定站在高处，也可能正站在你旁边。","maturityScore":86,"coreConclusion":"你最容易吸引的贵人，是那些和你同频、互补、愿意一起做事的人。TA 不一定比你高很多，也不一定以“导师”身份出现，但会在共同项目、共同兴趣、共同目标里和你形成互相成就。你适合通过合作遇见贵人，而不是只通过单向求助遇见贵人。","diagnosis":"你的关系吸引力来自“共创感”。别人愿意靠近你，是因为和你一起做事有空间、有边界、有反馈，也有互相补位的可能。你的盲区是有时太重视关系舒服，却没有把合作的下一步说具体，导致很多同频关系停在聊天阶段。","whatYouReallyWant":"你想要的不是被单方面拯救，而是找到能一起升级的人。你希望关系里有平等、有互惠、有共同作品，而不是永远站在求助者的位置。","mechanism":{"title":"互惠共创机制","content":"共创型贵人会被“有想法、有边界、能互相补位”的人吸引。共同完成一件小事，往往比单纯聊天更容易让关系沉淀成真实机会。"},"professionalBasis":["从协作关系看，贵人不只来自上位者，也可能来自同级伙伴。共同项目能快速暴露一个人的靠谱程度和互补价值。","从社交资本看，互惠关系更可持续。你不是只拿资源，而是也能提供信息、执行、审美、方法或情绪价值。","从机会生成看，小共创是低成本验证关系的方式。一次小项目，比十次空泛寒暄更能建立信任。"],"coreTensions":["想平等合作","不喜欢单向索取","容易停在聊天阶段","需要把同频变成行动"],"suitableIf":["你有想法也愿意落地","你能尊重边界和分工","你愿意给对方提供价值","你适合在项目里建立关系"],"cautionIf":["只聊天不推进","不好意思谈分工和收益","把关系舒服当成合作成功","没有截止日期和交付标准"],"indices":[{"label":"同频识别指数","value":88},{"label":"互惠意识指数","value":90},{"label":"共创落地能力","value":78},{"label":"边界清晰度","value":72}],"ifStay":"如果你一直把同频关系停在聊天层面，很多潜在贵人会从机会变成普通熟人。","ifChange":"如果你敢把一个小想法变成共同项目，共创型贵人会更容易出现，也更容易留下。","notRecommended":["只找感觉不谈落地","不好意思谈边界","关系舒服但没有行动","把合作全靠默契","只等别人来推进"],"plan90":[{"title":"第 1-2 周：找 3 个同频对象","content":"不是找最厉害的人，而是找目标相近、节奏相近、愿意一起试的人。"},{"title":"第 3-4 周：发起一个最小共创","content":"可以是一篇内容、一次直播、一个清单、一个小产品，不要一开始就做大。"},{"title":"第 2 个月：把分工说清楚","content":"明确谁负责什么、什么时候交付、成果归谁、后续怎么复盘。"},{"title":"第 3 个月：沉淀合作资产","content":"把共创结果变成作品、案例或经验复盘，让这段关系继续产生新机会。"}],"closing":"你要找的贵人，也许不是来拉你一把的人，而是愿意和你一起把事情做出来的人。"}},"secondaryNotes":{"A":{"B":"你的主倾向是「资源牵线型贵人」，副倾向带有「看见托举型贵人」。这说明你既需要入口，也需要信任感。争取机会时，不要只强调结果，也要让别人看见你值得长期托付。","C":"你的主倾向是「资源牵线型贵人」，副倾向带有「严格打磨型贵人」。这说明资源入口和能力打磨要同步推进。别人能带你进门，但真正留下来靠的是硬实力。","D":"你的主倾向是「资源牵线型贵人」，副倾向带有「同频共创型贵人」。这说明你不只适合被推荐，也适合通过合作制造新机会。把请求变成项目，会更容易被看见。"},"B":{"A":"你的主倾向是「看见托举型贵人」，副倾向带有「资源牵线型贵人」。这说明你需要被理解，但也不能只停在被安慰。把信任转化为具体请求，机会才会往前走。","C":"你的主倾向是「看见托举型贵人」，副倾向带有「严格打磨型贵人」。这说明你既需要温柔支持，也需要真实反馈。被看见之后，下一步是被训练。","D":"你的主倾向是「看见托举型贵人」，副倾向带有「同频共创型贵人」。这说明你的贵人关系很适合从信任走向合作。不要只做被照顾的人，也可以主动提供价值。"},"C":{"A":"你的主倾向是「严格打磨型贵人」，副倾向带有「资源牵线型贵人」。这说明你需要先把能力打硬，再去承接更大的资源。越扎实，越容易被推荐。","B":"你的主倾向是「严格打磨型贵人」，副倾向带有「看见托举型贵人」。这说明你需要真实反馈，也需要情绪托底。别把严格都理解成否定，也别让自己一直硬扛。","D":"你的主倾向是「严格打磨型贵人」，副倾向带有「同频共创型贵人」。这说明你适合在项目里被训练。共同做事时，反馈会更具体，也更容易转化为成长。"},"D":{"A":"你的主倾向是「同频共创型贵人」，副倾向带有「资源牵线型贵人」。这说明合作可能就是你的资源入口。先做出小成果，再让别人看见你的链接价值。","B":"你的主倾向是「同频共创型贵人」，副倾向带有「看见托举型贵人」。这说明你需要舒服的关系氛围，也需要把信任变成行动。关系好不等于自动有结果。","C":"你的主倾向是「同频共创型贵人」，副倾向带有「严格打磨型贵人」。这说明你适合和高标准伙伴一起做事。只要边界清楚，压力会变成升级。"}},"shareTemplate":["我测出了：{{typeName}}","{{posterSubtext}}","{{secondaryLine}}","","你的性格更容易吸引哪类贵人？32题诊断"]};</script>
    <script>
(function () {
  const app = document.getElementById("app");
  const configPaths = ["./configs/site-config.json", "./configs/career-change.json"];

  const state = {
    config: null,
    answers: {},
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    const counts = { A: 0, B: 0, C: 0, D: 0 };
    Object.values(answers).forEach((key) => {
      if (counts[key] !== undefined) counts[key] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
</html>
