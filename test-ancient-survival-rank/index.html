    <script>window.__QUIZ_CONFIG__ = {"slug":"test-ancient-survival-rank","topic":"你的城府段位，放在古代能活到第几集？","kicker":"32-Q Ancient Survival Test","title":"你的城府段位，放在古代能活到第几集？","subtitle":"32 道题，测出你是三集下线、十二集自保、二十八集反转，还是大结局执棋型。","metaDescription":"完成 32 道城府段位测试，生成你的古代生存段位、人情洞察、表达策略和风险提醒。","startButton":"开始测试","resultKicker":"Ancient Survival Report","quizHint":"凭第一反应选择，系统会自动进入下一题。","copyButton":"复制我的结果","restartButton":"重新测试","scoreLabel":"城府清晰度","stageLabel":"当前生存段位","stageLabels":[{"max":55,"label":"三集试炼期"},{"max":72,"label":"自保觉醒期"},{"max":86,"label":"反转蓄力期"},{"max":100,"label":"终局执棋期"}],"compareLabels":["如果只把城府当算计","如果看见背后的自保能力"],"disclaimer":"本测试借用古代剧生存设定做趣味人格分析，仅供娱乐和自我观察参考，不鼓励操纵、欺骗、伤害他人，也不构成心理诊断、职业建议、关系建议或人生决策依据。","secondaryThreshold":4,"dimensions":["直球度","自保力","洞察力","掌局力"],"intro":["很多人一听城府，就觉得是算计。","但真正高级的城府，不是害人，而是看懂局面、保护自己、不被情绪牵着走。","32 道题会从第一反应、情绪藏法、人情识别、冲突处理、利益边界、表达策略、职场局面和终局判断 8 个模块，测出你放在古代剧里大概能活到第几集。"],"loadingMessages":["正在读取你的第一反应...","正在拆分直球度、自保力、洞察力和掌局力...","正在匹配你的古代生存段位...","正在生成 32 题城府段位报告...","分析完成。"],"questions":[{"id":1,"module":"第一反应","text":"有人突然当众点你一句，你第一反应更像：","options":[{"key":"A","text":"马上解释清楚，不想让别人误会你"},{"key":"B","text":"先闭嘴观察，看对方到底是无心还是试探"},{"key":"C","text":"记住这句话和当时在场的人，事后再判断怎么回应"},{"key":"D","text":"不急着接招，先把话题转回规则、事实或更大的目标"}]},{"id":2,"module":"第一反应","text":"你刚进一个新环境，最先注意到的是：","options":[{"key":"A","text":"谁看起来好相处，能不能自然地做自己"},{"key":"B","text":"谁不好惹，哪些话最好暂时别说"},{"key":"C","text":"谁和谁关系近，谁说话别人会听"},{"key":"D","text":"这个环境真正的利益链、晋升规则和隐性禁区"}]},{"id":3,"module":"第一反应","text":"听到别人背后评价你，你更可能：","options":[{"key":"A","text":"很在意，忍不住想立刻问清楚为什么"},{"key":"B","text":"表面没事，心里先把这个人拉进观察名单"},{"key":"C","text":"看这句话从哪里传出来，判断是谁想影响你"},{"key":"D","text":"不急着追源头，先让自己的位置和结果更稳"}]},{"id":4,"module":"第一反应","text":"如果把你放进古代后宫或朝堂，你最容易犯的第一个错是：","options":[{"key":"A","text":"太快相信别人，把真实想法说得太满"},{"key":"B","text":"太怕出错，导致机会来了也不敢伸手"},{"key":"C","text":"看懂了局，却偶尔忍不住想验证自己判断"},{"key":"D","text":"太清醒，容易让别人觉得你不好靠近"}]},{"id":5,"module":"情绪藏法","text":"你生气时，最像哪一种状态：","options":[{"key":"A","text":"脸上和语气都藏不住，别人一看就知道你不爽"},{"key":"B","text":"会忍住，但情绪会在心里反复翻"},{"key":"C","text":"先把怒气压下去，等找到合适时机再处理"},{"key":"D","text":"把情绪拆成信息，判断这件事暴露了什么问题"}]},{"id":6,"module":"情绪藏法","text":"别人一句话刺到你，你最需要练的是：","options":[{"key":"A","text":"不要马上把心里话全倒出来"},{"key":"B","text":"不要憋到自己内耗一整晚"},{"key":"C","text":"不要急着反击，先判断这句话的目的"},{"key":"D","text":"不要只看话本身，要看它改变了什么局面"}]},{"id":7,"module":"情绪藏法","text":"你最容易被哪种情绪带跑：","options":[{"key":"A","text":"委屈，觉得自己明明没有坏心"},{"key":"B","text":"不安，担心自己是不是又说错了"},{"key":"C","text":"不服，想证明自己其实都看得懂"},{"key":"D","text":"警惕，容易提前预判别人的下一步"}]},{"id":8,"module":"情绪藏法","text":"如果必须隐藏一个真实想法，你通常会：","options":[{"key":"A","text":"很不自然，越想藏越容易露出来"},{"key":"B","text":"少说话，尽量不让别人抓到细节"},{"key":"C","text":"换一种表达，只说对自己有利的部分"},{"key":"D","text":"给出一个对方能接受、但不暴露底牌的说法"}]},{"id":9,"module":"人情识别","text":"饭局上有人一直夸你，你会觉得：","options":[{"key":"A","text":"有点开心，也会认真接住这份善意"},{"key":"B","text":"先别太当真，可能只是场面话"},{"key":"C","text":"要看他夸你的点，是想拉近关系还是套信息"},{"key":"D","text":"夸奖本身不重要，重要的是他希望你接下来做什么"}]},{"id":10,"module":"人情识别","text":"同事突然对你特别热情，你会：","options":[{"key":"A","text":"觉得可能是关系变好了，也会更主动回应"},{"key":"B","text":"先保持礼貌距离，不立刻交心"},{"key":"C","text":"观察 TA 最近是不是有事需要你配合"},{"key":"D","text":"判断这份热情背后的资源、风险和交换关系"}]},{"id":11,"module":"人情识别","text":"你最容易看漏哪种人：","options":[{"key":"A","text":"表面温和，其实很会利用别人心软的人"},{"key":"B","text":"看起来普通，但其实消息很灵的人"},{"key":"C","text":"嘴上帮你，实际在给自己留退路的人"},{"key":"D","text":"一直不表态，却能影响最后结果的人"}]},{"id":12,"module":"人情识别","text":"你判断一个人值不值得深交，最看重：","options":[{"key":"A","text":"相处起来真不真诚、舒不舒服"},{"key":"B","text":"他是否稳定，不会随便出卖别人"},{"key":"C","text":"他在利益面前会不会守边界"},{"key":"D","text":"他是否能长期合作，并且懂得互相成全"}]},{"id":13,"module":"冲突处理","text":"有人把锅甩到你身上，你更可能：","options":[{"key":"A","text":"马上澄清，不想背不属于自己的责任"},{"key":"B","text":"先保存证据，避免当场吵起来"},{"key":"C","text":"分清谁在甩锅、谁在旁观、谁能作证"},{"key":"D","text":"不只洗清自己，还顺手把责任机制重新摆到台面上"}]},{"id":14,"module":"冲突处理","text":"发生争执时，你最怕自己：","options":[{"key":"A","text":"话说太直，把关系彻底弄僵"},{"key":"B","text":"太能忍，让对方以为你好欺负"},{"key":"C","text":"反击太早，暴露自己的真实牌"},{"key":"D","text":"看得太透，反而显得冷淡和不好相处"}]},{"id":15,"module":"冲突处理","text":"面对一个喜欢暗戳戳针对你的人，你会：","options":[{"key":"A","text":"忍不住想直接问 TA 到底什么意思"},{"key":"B","text":"减少来往，尽量不给对方机会"},{"key":"C","text":"不急着撕破脸，先让对方的模式自己暴露"},{"key":"D","text":"把个人矛盾转成公开规则，让对方没法只针对你"}]},{"id":16,"module":"冲突处理","text":"如果必须赢下一次争执，你更愿意靠：","options":[{"key":"A","text":"把自己的委屈和事实说清楚"},{"key":"B","text":"不出错、不失态、不留下把柄"},{"key":"C","text":"抓住对方逻辑漏洞和关键证据"},{"key":"D","text":"重新定义问题，让大家接受你的框架"}]},{"id":17,"module":"利益边界","text":"别人找你帮忙，但你直觉不太舒服，你会：","options":[{"key":"A","text":"不好拒绝，可能还是会先帮一下"},{"key":"B","text":"找理由缓一缓，给自己一点判断时间"},{"key":"C","text":"问清楚具体责任、边界和后果再决定"},{"key":"D","text":"只给可控范围内的帮助，不让自己变成兜底的人"}]},{"id":18,"module":"利益边界","text":"有人拿感情绑架你，你最容易：","options":[{"key":"A","text":"心软，怕自己显得太冷漠"},{"key":"B","text":"愧疚，但会慢慢疏远"},{"key":"C","text":"提醒自己别把情分和责任混在一起"},{"key":"D","text":"承认情分，但把规则和代价说清楚"}]},{"id":19,"module":"利益边界","text":"你眼里的体面，更接近：","options":[{"key":"A","text":"大家都别难堪，关系不要太僵"},{"key":"B","text":"不被人抓住话柄，也不轻易得罪人"},{"key":"C","text":"既不委屈自己，也不把路彻底堵死"},{"key":"D","text":"让人知道你的边界，同时保留未来合作空间"}]},{"id":20,"module":"利益边界","text":"你最需要补上的一课是：","options":[{"key":"A","text":"不要把真诚当成唯一通行证"},{"key":"B","text":"不要把沉默当成绝对安全"},{"key":"C","text":"不要把看懂当成已经赢了"},{"key":"D","text":"不要把掌控感当成安全感本身"}]},{"id":21,"module":"表达策略","text":"你更习惯怎样说一个不同意见：","options":[{"key":"A","text":"直接说我不认同，因为这里不对"},{"key":"B","text":"先说一部分认同，再小心提出保留"},{"key":"C","text":"先问几个问题，让对方自己发现漏洞"},{"key":"D","text":"把分歧放进更大的目标里，让对方更容易接受"}]},{"id":22,"module":"表达策略","text":"如果有人试探你的底线，你会：","options":[{"key":"A","text":"直接告诉 TA 这样不行"},{"key":"B","text":"笑一笑带过去，但心里记住"},{"key":"C","text":"给一个模糊回应，不让对方判断你的真实态度"},{"key":"D","text":"轻轻反问，把试探压力还给对方"}]},{"id":23,"module":"表达策略","text":"你最想拥有哪种说话能力：","options":[{"key":"A","text":"说真话也不伤人"},{"key":"B","text":"不想说时也能体面退开"},{"key":"C","text":"话里有余地，不轻易暴露全部想法"},{"key":"D","text":"一句话改变局面，让别人按你的框架讨论"}]},{"id":24,"module":"表达策略","text":"你说话最容易出现的问题是：","options":[{"key":"A","text":"太直，情绪一上来就收不住"},{"key":"B","text":"太绕，别人听不出你真正想要什么"},{"key":"C","text":"太试探，有时显得不够坦诚"},{"key":"D","text":"太稳，让人不知道你其实也有情绪"}]},{"id":25,"module":"职场局面","text":"领导只给你一个模糊任务，你会：","options":[{"key":"A","text":"先按自己的理解做，做错再解释"},{"key":"B","text":"先确认范围和交付标准，避免背锅"},{"key":"C","text":"判断这个任务背后的真实意图和关键人"},{"key":"D","text":"把模糊任务拆成可确认节点，让责任和资源都落清楚"}]},{"id":26,"module":"职场局面","text":"团队里有人抢功，你更可能：","options":[{"key":"A","text":"很生气，想当场说这明明不是 TA 做的"},{"key":"B","text":"先别急，保存过程证据"},{"key":"C","text":"找合适时机让关键人看见你的贡献"},{"key":"D","text":"建立公开复盘机制，让抢功变得没那么容易"}]},{"id":27,"module":"职场局面","text":"你最容易被哪种局面消耗：","options":[{"key":"A","text":"明明自己没错，却要反复解释"},{"key":"B","text":"规则不清，谁都可能临时甩锅"},{"key":"C","text":"有人故意装傻，把你拖进低效沟通"},{"key":"D","text":"局面复杂但没人愿意站出来定规则"}]},{"id":28,"module":"职场局面","text":"如果要在复杂组织里活得久，你觉得最重要的是：","options":[{"key":"A","text":"保持真诚，不要变成自己讨厌的人"},{"key":"B","text":"少说多看，先保证自己不踩坑"},{"key":"C","text":"懂人、懂事、懂时机，别急着证明自己"},{"key":"D","text":"既有结果，也有边界，还能让别人离不开你"}]},{"id":29,"module":"终局判断","text":"你觉得真正的城府是什么：","options":[{"key":"A","text":"我其实不太喜欢这个词，感觉像不真诚"},{"key":"B","text":"知道什么该说、什么不该说"},{"key":"C","text":"看懂人心和利益，但不轻易出手"},{"key":"D","text":"能保护自己，也能让局面朝更好的方向走"}]},{"id":30,"module":"终局判断","text":"你最想知道自己的哪一点：","options":[{"key":"A","text":"我是不是太容易相信别人"},{"key":"B","text":"我是不是终于有点自保能力了"},{"key":"C","text":"我到底能不能看懂复杂关系"},{"key":"D","text":"我能不能在不伤害别人的前提下掌控局面"}]},{"id":31,"module":"终局判断","text":"放在古代剧里，你最可能靠什么活下来：","options":[{"key":"A","text":"真诚和运气，最好遇到几个好人"},{"key":"B","text":"谨慎和边界，不主动惹事"},{"key":"C","text":"洞察和时机，关键时候能反转"},{"key":"D","text":"格局和布局，不靠单场输赢决定命运"}]},{"id":32,"module":"终局判断","text":"做完 32 题，你最希望得到的结果是：","options":[{"key":"A","text":"提醒我别再太直、太容易交底"},{"key":"B","text":"告诉我怎么更稳一点，不被人牵着走"},{"key":"C","text":"看清我真正的洞察力和反击方式"},{"key":"D","text":"确认我适合怎样掌局，而不是陷入内耗"}]}],"results":{"A":{"typeName":"三集下线直球型","subtitle":"你的底色是真诚、反应快、不太会藏锋，容易把真心和底牌一起交出去。","posterSubtext":"你不是没脑子，只是太容易相信讲清楚就能换来公平。","maturityScore":63,"coreConclusion":"你的答案显示，你在关系和冲突里很容易第一时间解释、澄清、表达真实感受。你讨厌误会，也不喜欢绕弯子，所以常常把自己的想法、委屈和底线说得太快太满。放在古代剧里，你未必坏事做得多，但很可能因为太早交底、太快相信人，成为前几集最让观众心疼的人。 你真正想要的是干净、直接、互相信任的关系。但现实里，不是所有人都会因为你真诚就真诚回应你。你的课题不是变坏，而是学会慢一点说、晚一点信、先保护自己。","diagnosis":"你的答案显示，你在关系和冲突里很容易第一时间解释、澄清、表达真实感受。你讨厌误会，也不喜欢绕弯子，所以常常把自己的想法、委屈和底线说得太快太满。放在古代剧里，你未必坏事做得多，但很可能因为太早交底、太快相信人，成为前几集最让观众心疼的人。","whatYouReallyWant":"你真正想要的是干净、直接、互相信任的关系。但现实里，不是所有人都会因为你真诚就真诚回应你。你的课题不是变坏，而是学会慢一点说、晚一点信、先保护自己。","mechanism":{"title":"直球交底机制","content":"直球型的人通常低防御、高表达、高信任。优势是真诚、有感染力、容易让人放松；风险是看不见试探、话说太满、把情绪当成证据。你需要训练的是信息边界，而不是把自己逼成一个很会算计的人。"},"professionalBasis":["从第一反应看，你倾向立刻解释清楚，不喜欢让误会过夜。","从情绪藏法看，你的感受容易写在脸上，别人较容易判断你的真实态度。","从利益边界看，你容易因为不好意思拒绝而接下不属于自己的责任。"],"coreTensions":["真诚直给","容易交底","边界偏软","情绪外显","讨厌误会"],"suitableIf":["真诚表达","陪伴型内容","服务体验","需要信任感的关系","轻松社交场景"],"cautionIf":["刚认识就掏心掏肺","当众解释太多","用情绪证明自己","替别人兜底后再委屈"],"indices":[{"label":"真诚表达","value":94},{"label":"信息防御","value":52},{"label":"边界稳定","value":58},{"label":"局势识别","value":61}],"ifStay":"如果你一直相信只要讲清楚就够了，你会反复在同一种关系里受伤，然后怀疑是不是自己太笨。","ifChange":"如果你学会把真心分层交付，你会保留自己的温度，也不再轻易被别人拿捏。","notRecommended":["刚认识就掏心掏肺","当众解释太多","用情绪证明自己","替别人兜底后再委屈"],"plan90":[{"title":"第1周：练习少解释","content":"遇到误会先只说事实，不急着证明人品，也不把全部委屈倒出来。"},{"title":"第2-3周：延迟信任","content":"新关系至少观察三次行动，再决定要不要交付真实想法。"},{"title":"第4-6周：设置信息边界","content":"区分哪些话可以公开说，哪些话只适合给真正可靠的人。"},{"title":"第7-12周：把直球变成力量","content":"保留真诚，但训练表达顺序：事实、边界、需求，而不是情绪先行。"}],"closing":"你要修的不是城府，而是保护真诚的能力。真心可以有，但别一上来就全盘托出。"},"B":{"typeName":"十二集自保型","subtitle":"你已经有基本防御感，懂得少说多看，不轻易把自己放到危险位置。","posterSubtext":"你不是冷漠，只是终于知道不是每句话都要接，不是每个人都能信。","maturityScore":76,"coreConclusion":"你的答案显示，你对风险、话柄、边界和人情试探有一定敏感度。你不会轻易当场爆发，也不太会刚认识就交心。放在古代剧里，你大概率能避开前期很多坑，但也可能因为太谨慎，错过一些真正能改变局面的机会。 你真正想要的是安全感和可控感。你不想主动害人，也不想莫名其妙被卷进去。你的优势是稳，课题是不要只停留在自保：看见机会时，也要敢于在可控范围内伸手。","diagnosis":"你的答案显示，你对风险、话柄、边界和人情试探有一定敏感度。你不会轻易当场爆发，也不太会刚认识就交心。放在古代剧里，你大概率能避开前期很多坑，但也可能因为太谨慎，错过一些真正能改变局面的机会。","whatYouReallyWant":"你真正想要的是安全感和可控感。你不想主动害人，也不想莫名其妙被卷进去。你的优势是稳，课题是不要只停留在自保：看见机会时，也要敢于在可控范围内伸手。","mechanism":{"titl     <script>
(function () {
  const app = document.getElementById("app");
  const configPaths = ["./configs/site-config.json", "./configs/career-change.json"];

  const state = {
    config: null,
    answers: {},
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    const counts = { A: 0, B: 0, C: 0, D: 0 };
    Object.values(answers).forEach((key) => {
      if (counts[key] !== undefined) counts[key] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
</html>
