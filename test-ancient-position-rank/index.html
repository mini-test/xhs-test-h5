    <script>window.__QUIZ_CONFIG__ = {"slug":"test-ancient-position-rank","topic":"你若穿越回古代，最后能坐到什么位置？","kicker":"32-Q Ancient Position Test","title":"你若穿越回古代，最后能坐到什么位置？","subtitle":"32 道真实情境题，测出你在古代更可能靠战功、谋略、治理，还是资源经营坐稳位置。","metaDescription":"完成 32 道古代位置测试，生成你的上位路径、终局位置、优势风险和 90 天能力建议。","startButton":"开始测试","resultKicker":"Ancient Position Report","quizHint":"按真实第一反应选，不按爽文主角人设选。","copyButton":"复制我的结果","restartButton":"重新测试","scoreLabel":"上位清醒度","stageLabel":"当前位置","stageLabels":[{"max":55,"label":"求生摸索期"},{"max":72,"label":"入局试探期"},{"max":86,"label":"位置成型期"},{"max":100,"label":"终局坐稳期"}],"compareLabels":["如果继续按旧反应生存","如果开始训练上位能力"],"disclaimer":"本测试借用古代穿越和位置设定做趣味人格分析，仅供娱乐和自我观察参考，不构成职业建议、心理诊断、投资建议或人生决策依据。","secondaryThreshold":4,"dimensions":["战功力","谋略力","治理力","根基力"],"intro":["穿越回古代，真正难的不是开局拿什么身份。","难的是你在没有现代外挂、没有稳定规则、没有熟人背景的局里，最后靠什么坐稳位置。","这 32 道题会从初入局面、生存底线、权力嗅觉、人情经营、冲突取舍、资源经营、长期上升和终局位置 8 个维度，测出你更像边关统帅、王府谋士、中枢宰辅，还是世家掌舵人。"],"loadingMessages":["正在读取你的古代开局反应...","正在分析你的战功力、谋略力、治理力和根基力...","正在匹配你的古代终局位置...","正在生成 32 题位置报告...","分析完成。"],"questions":[{"id":1,"module":"初入局面","text":"你一睁眼发现自己穿越到古代，身无背景，第一反应更像：","options":[{"key":"A","text":"先找活路，能做事、能立功、能被人看见最重要"},{"key":"B","text":"先闭嘴观察，弄清楚谁有权、谁有势、谁能决定你的命"},{"key":"C","text":"先摸清规则，知道身份、法度、资源和上升通道"},{"key":"D","text":"先保住安全，找稳定落脚点，不急着暴露自己"}]},{"id":2,"module":"初入局面","text":"你最不能接受自己在古代变成哪种人？","options":[{"key":"A","text":"明明有能力，却一直被安排做杂事，没机会出头"},{"key":"B","text":"看懂了局，却因为说错一句话被人记恨"},{"key":"C","text":"被卷进一堆烂账，替别人背责任还没话语权"},{"key":"D","text":"为了往上爬，把自己的退路和底牌全交出去"}]},{"id":3,"module":"初入局面","text":"刚进一个府衙或王府，你最先观察的是：","options":[{"key":"A","text":"哪些事没人敢扛，谁能靠解决难题出头"},{"key":"B","text":"谁说话最有分量，谁只是表面风光"},{"key":"C","text":"权力怎么流动，真正的流程和规矩是谁定的"},{"key":"D","text":"哪些人不能得罪，哪些关系可以慢慢经营"}]},{"id":4,"module":"初入局面","text":"如果必须先选一个靠山，你会更看重：","options":[{"key":"A","text":"对方给不给实战机会，能不能让你立功"},{"key":"B","text":"对方有没有识人能力，能不能听懂你的判断"},{"key":"C","text":"对方手里有没有制度位置和正式资源"},{"key":"D","text":"对方是否稳定、守信、不会随便牺牲身边人"}]},{"id":5,"module":"生存底线","text":"古代最危险的一点，在你看来是：","options":[{"key":"A","text":"没有实力和功劳，任何时候都可能被替代"},{"key":"B","text":"不知道哪句话会触碰到别人的忌讳"},{"key":"C","text":"规则不清，责任和权力完全不对等"},{"key":"D","text":"退路太少，一次站错队就可能回不了头"}]},{"id":6,"module":"生存底线","text":"别人试探你时，你更自然的反应是：","options":[{"key":"A","text":"用结果证明自己，不和对方绕太久"},{"key":"B","text":"顺着话题反问，看对方到底想套什么"},{"key":"C","text":"把边界讲清楚，避免被临时加责"},{"key":"D","text":"先给一个温和回应，关系没稳前不亮底牌"}]},{"id":7,"module":"生存底线","text":"你最想练成的古代生存能力是：","options":[{"key":"A","text":"关键时候敢站出来，把事情办成"},{"key":"B","text":"一句话看出人心，一眼看懂局势"},{"key":"C","text":"能定规则、分责任、让局面稳定运转"},{"key":"D","text":"能保住自己和身边人，慢慢积累根基"}]},{"id":8,"module":"生存底线","text":"如果有人故意压你一头，你最可能：","options":[{"key":"A","text":"找机会做出一个他绕不开的成绩"},{"key":"B","text":"先不翻脸，记下他怎么压人、靠谁压人"},{"key":"C","text":"把问题拉回职责和流程，不在情绪里纠缠"},{"key":"D","text":"减少暴露，暂时避开锋芒，先留住退路"}]},{"id":9,"module":"权力嗅觉","text":"你判断一个人有没有前途，最看重：","options":[{"key":"A","text":"他有没有胆识，关键时刻敢不敢担事"},{"key":"B","text":"他身边有没有真正会出主意的人"},{"key":"C","text":"他能不能把散乱的人和事统起来"},{"key":"D","text":"他是否懂得蓄势，不会因为一时风光赌光全部"}]},{"id":10,"module":"权力嗅觉","text":"你最容易注意到哪类机会？","options":[{"key":"A","text":"别人都嫌麻烦但办成就能立刻被看见的事"},{"key":"B","text":"众人争吵时，被忽略的那条真正关键线索"},{"key":"C","text":"一个混乱系统里可以重整规则的位置"},{"key":"D","text":"一个不起眼但能长期积累人脉和资源的入口"}]},{"id":11,"module":"权力嗅觉","text":"如果你在朝堂旁听一次争论，你会更关注：","options":[{"key":"A","text":"谁敢拍板，谁只会推责任"},{"key":"B","text":"谁的话听起来温和，但真正改变了方向"},{"key":"C","text":"这个争论背后的制度漏洞在哪里"},{"key":"D","text":"谁在保全自己，谁在悄悄积累筹码"}]},{"id":12,"module":"权力嗅觉","text":"你认为真正的上位，靠的是：","options":[{"key":"A","text":"关键事件里拿到不可替代的功劳"},{"key":"B","text":"成为掌权者离不开的判断系统"},{"key":"C","text":"掌握规则和资源分配方式"},{"key":"D","text":"让自己拥有稳定根基，不被单一权力控制"}]},{"id":13,"module":"人情经营","text":"你在古代最可能用哪种方式建立关系？","options":[{"key":"A","text":"一起做事，靠可靠和结果赢信任"},{"key":"B","text":"少说废话，关键时刻给对方一个有用判断"},{"key":"C","text":"把合作边界和利益分配讲清楚"},{"key":"D","text":"平时慢慢维护，礼数、人情和往来都不断"}]},{"id":14,"module":"人情经营","text":"饭局上有人一直夸你，你会：","options":[{"key":"A","text":"接住好意，但更想知道有没有实际机会"},{"key":"B","text":"听他夸的是哪一点，判断他想把你放进什么位置"},{"key":"C","text":"不被情绪带走，观察这桌人的真实利益关系"},{"key":"D","text":"保持礼貌，不轻易把关系推进太快"}]},{"id":15,"module":"人情经营","text":"你最怕自己在人情局里犯什么错？","options":[{"key":"A","text":"太直，得罪人还不知道哪里得罪的"},{"key":"B","text":"看懂太多，显得不够真诚"},{"key":"C","text":"只讲规则，忽略了人情的缓冲作用"},{"key":"D","text":"太顾及关系，错过该争取的位置"}]},{"id":16,"module":"人情经营","text":"你会怎么对待一个暂时没用但人品不错的人？","options":[{"key":"A","text":"只要一起做事靠谱，就愿意继续合作"},{"key":"B","text":"留着观察，也许未来能成为关键信息点"},{"key":"C","text":"保持清楚边界，能合作就按规则合作"},{"key":"D","text":"认真维护，很多关系都是后来才显出价值"}]},{"id":17,"module":"冲突取舍","text":"有人把难题推到你面前，你更可能：","options":[{"key":"A","text":"接，但要做成漂亮结果，让所有人看见"},{"key":"B","text":"先判断这是不是别人设的局，再决定接不接"},{"key":"C","text":"明确权责和资源，没有条件就不盲目背锅"},{"key":"D","text":"看这件事会不会毁掉长期退路，不值得就避开"}]},{"id":18,"module":"冲突取舍","text":"被人当众质疑时，你更像：","options":[{"key":"A","text":"当场拿结果和事实回击"},{"key":"B","text":"不急着正面硬碰，先让对方暴露逻辑漏洞"},{"key":"C","text":"把争执从个人攻击拉回制度和职责"},{"key":"D","text":"先稳住场面，事后再通过关系和证据处理"}]},{"id":19,"module":"冲突取舍","text":"你最看不起哪种古代上位方式？","options":[{"key":"A","text":"什么事都不做，只靠背景占位置"},{"key":"B","text":"没有真判断，只会说掌权者爱听的话"},{"key":"C","text":"只会争宠，不解决真正的问题"},{"key":"D","text":"为了短期利益，连退路和信用都不要"}]},{"id":20,"module":"冲突取舍","text":"如果必须得罪一部分人，你会选择：","options":[{"key":"A","text":"为了把事做成，得罪拖后腿的人也没办法"},{"key":"B","text":"尽量让对方不是败在你手上，而是败在局势里"},{"key":"C","text":"按规则处理，让得罪变成可解释的结果"},{"key":"D","text":"能少树敌就少树敌，除非这一步关系到根基"}]},{"id":21,"module":"资源经营","text":"你手里突然有一笔银子，你最想先用来：","options":[{"key":"A","text":"换装备、学本事、让自己更能办硬事"},{"key":"B","text":"结识关键人物，换信息和入场机会"},{"key":"C","text":"搭一个能稳定运转的小团队或小生意"},{"key":"D","text":"置办田产、铺子或可靠退路"}]},{"id":22,"module":"资源经营","text":"你对资源的理解更接近：","options":[{"key":"A","text":"资源是拿来解决问题、换取战功的"},{"key":"B","text":"资源是信息和筹码，关键时刻能改变判断"},{"key":"C","text":"资源是系统配置，谁掌握分配谁就有话语权"},{"key":"D","text":"资源是安全垫，能让人不被局势轻易拿捏"}]},{"id":23,"module":"资源经营","text":"如果你有机会培养下属，你会优先挑：","options":[{"key":"A","text":"能吃苦、执行强、关键时刻不掉链子的人"},{"key":"B","text":"脑子清楚、嘴严、看得懂暗线的人"},{"key":"C","text":"讲规则、能统筹、能把事推进到结果的人"},{"key":"D","text":"忠厚稳定、适合长期放在身边的人"}]},{"id":24,"module":"资源经营","text":"你最想拥有哪种古代资产？","options":[{"key":"A","text":"一支能打硬仗、听你调度的人马"},{"key":"B","text":"一张信息灵通、能提前预警的关系网"},{"key":"C","text":"一个能调配人财物的正式职位"},{"key":"D","text":"一份不靠别人脸色也能活下去的家业"}]},{"id":25,"module":"长期上升","text":"如果给你 10 年时间，你更想把自己养成：","options":[{"key":"A","text":"有战功、有威望，关键时候能镇场的人"},{"key":"B","text":"谁遇到大事都想来问一句的人"},{"key":"C","text":"能让一个地方或部门稳定运转的人"},{"key":"D","text":"家底、人脉、名声都慢慢变厚的人"}]},{"id":26,"module":"长期上升","text":"你觉得自己最容易在哪一步卡住？","options":[{"key":"A","text":"太想快点证明自己，容易硬扛太多"},{"key":"B","text":"想太多、看太透，有时行动慢半拍"},{"key":"C","text":"责任心太强，容易替烂系统兜底"},{"key":"D","text":"太求稳，机会来的时候不敢下注"}]},{"id":27,"module":"长期上升","text":"你最希望别人怎么评价你？","options":[{"key":"A","text":"这个人能扛事，真到关键时候靠得住"},{"key":"B","text":"这个人看局很准，不说废话但句句有用"},{"key":"C","text":"这个人能把乱局理顺，让所有人各归其位"},{"key":"D","text":"这个人稳，跟他合作不用担心突然翻船"}]},{"id":28,"module":"长期上升","text":"你认为高位最难的不是上去，而是：","options":[{"key":"A","text":"上去后还能继续打胜仗，不被名声拖累"},{"key":"B","text":"知道什么时候该说，什么时候该闭嘴"},{"key":"C","text":"权力越大，越能把责任和规则管清楚"},{"key":"D","text":"风浪再大，也能保住根基和身边人"}]},{"id":29,"module":"终局位置","text":"穿越古代后，你最想坐到的位置是：","options":[{"key":"A","text":"边关统帅，靠战功和威望站稳"},{"key":"B","text":"王府首席谋士，靠判断影响大局"},{"key":"C","text":"中枢宰辅，靠治理和规则掌住局面"},{"key":"D","text":"世家掌舵人，靠资源和根基稳坐一方"}]},{"id":30,"module":"终局位置","text":"如果大结局给你一个镜头，你希望是：","options":[{"key":"A","text":"城门大开，你带人解决最难的一战"},{"key":"B","text":"灯下推演，你一句话改变整盘棋的走向"},{"key":"C","text":"朝堂之上，你把混乱的局面重新定规矩"},{"key":"D","text":"风波过后，你的家业、人脉和退路都还在"}]},{"id":31,"module":"终局位置","text":"你觉得真正的坐稳位置，靠的是：","options":[{"key":"A","text":"别人知道你能解决硬问题"},{"key":"B","text":"别人知道你有不可替代的判断力"},{"key":"C","text":"别人知道你能把权力变成秩序"},{"key":"D","text":"别人知道你有根基，不会轻易被拿捏"}]},{"id":32,"module":"终局位置","text":"做完 32 题，你最想知道的是：","options":[{"key":"A","text":"我是不是适合靠能力和战功杀出来"},{"key":"B","text":"我是不是适合做真正影响决策的人"},{"key":"C","text":"我是不是有坐到中枢位置的治理能力"},{"key":"D","text":"我是不是更适合稳扎稳打，经营自己的根基"}]}],"results":{"A":{"typeName":"边关统帅位","subtitle":"你靠执行、胆识和硬结果上位，越是没人敢接的局，越容易让你被看见。","posterSubtext":"你不是最会绕的人，但你最容易在关键时刻靠一场硬仗翻身。","maturityScore":84,"coreConclusion":"你的古代上位路径偏向「战功立身」。你更相信事情要做成，问题要解决，关键时刻不能只靠嘴。放在古代，你不是一开始就坐在朝堂中心的人，而是会先在边地、府衙、军务或危机现场被看见。你的优势是行动快、扛事强、抗压高，别人犹豫的时候你能站出来。短板是容易太早把自己推到前线，替别人扛了风险，却没有同步拿到相应的位置和筹码。 你真正想要的不是辛苦被夸，而是能力被承认、结果能换位置。你需要学会在立功之前先谈清权责，在冲锋之后及时固化成果，否则你会一直成为最好用的人，却未必成为最后坐上去的人。","diagnosis":"你的古代上位路径偏向「战功立身」。你更相信事情要做成，问题要解决，关键时刻不能只靠嘴。放在古代，你不是一开始就坐在朝堂中心的人，而是会先在边地、府衙、军务或危机现场被看见。你的优势是行动快、扛事强、抗压高，别人犹豫的时候你能站出来。短板是容易太早把自己推到前线，替别人扛了风险，却没有同步拿到相应的位置和筹码。","whatYouReallyWant":"你真正想要的不是辛苦被夸，而是能力被承认、结果能换位置。你需要学会在立功之前先谈清权责，在冲锋之后及时固化成果，否则你会一直成为最好用的人，却未必成为最后坐上去的人。","mechanism":{"title":"战功上升机制","content":"边关统帅型的人靠硬结果建立信用。你适合在混乱、危机、开荒、竞争强的环境里出头，因为你能把别人不敢碰的事变成结果。但你要记住，古代真正的统帅不只会打仗，还要会要粮、要人、要名分。只会解决问题的人，会被反复派去解决问题；会把问题变成位置的人，才会坐稳。"},"professionalBasis":["你在陌生局面里更关注机会和功劳，而不是先慢慢经营安全感。","你对无能占位、推卸责任和空谈最敏感，说明你有强烈的结果导向。","你遇到冲突时倾向于用事实和成绩回应，这能建立威望，也容易暴露锋芒。"],"coreTensions":["行动快","扛事强","结果导向","容易硬扛","需要筹码意识"],"suitableIf":["开荒项目","危机处理","强执行岗位","带团队冲结果","需要快速破局的环境"],"cautionIf":["替别人背风险","只立功不谈名分","太早硬碰硬","被当成好用的工具人"],"indices":[{"label":"破局执行力","value":94},{"label":"临场胆识","value":90},{"label":"权责谈判","value":68},{"label":"长期坐稳度","value":74}],"ifStay":"如果你继续只靠硬扛，你会不断赢下具体战役，却可能错过真正能让你升阶的位置。","ifChange":"如果你学会把功劳、资源和名分一起拿回来，你的上升速度会明显变快。","notRecommended":["替别人背风险","只立功不谈名分","太早硬碰硬","被当成好用的工具人"],"plan90":[{"title":"第 1 周：先定权责","content":"任何难题开始前，先确认目标、资源、边界和最终署名。"},{"title":"第 2-3 周：留出战果证据","content":"把你的贡献变成可被看见的记录，而不是只靠别人良心记得。"},{"title":"第 4-6 周：减少无效硬扛","content":"不是所有难事都值得接，先判断这件事能不能换来位置或筹码。"},{"title":"第 7-12 周：练习向上汇报","content":"把结果讲成价值，把执行讲成能力，让别人知道你不只是能干活。"}],"closing":"你若穿越回古代，最后最可能坐到边关统帅位。不是因为你爱冒险，而是你身上有一种能把烂局打穿的硬劲。"},"B":{"typeName":"王府首席谋士位","subtitle":"你靠观察、人心和判断力靠近权力中心，真正厉害的是一句话改变局势。","posterSubtext":"你未必站在最前面，但很多关键决定会绕不开你的判断。","maturityScore":88,"coreConclusion":"你的古代上位路径偏向「谋略入局」。你不是最急着表现的人，反而会先看人、看关系、看暗线。放在古代，你很适合成为王府、幕府、权贵身边的核心谋士。你的优势是会观察、能听出话外音、懂得时机和分寸，关键时候能给出一句真正有用     <script>
(function () {
  const app = document.getElementById("app");
  const configPaths = ["./configs/site-config.json", "./configs/career-change.json"];

  const state = {
    config: null,
    answers: {},
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    const counts = { A: 0, B: 0, C: 0, D: 0 };
    Object.values(answers).forEach((key) => {
      if (counts[key] !== undefined) counts[key] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
</html>
