    <title>文学灵魂原型测试</title>
    <style>
:root {
  --bg: #fbfaf7;
  --paper: #fffefd;
  --ink: #20242a;
  --muted: #65707d;
  --line: #d9d4ca;
  --line-strong: #b9afa0;
  --accent: #9b4339;
  --accent-soft: #f1dfd7;
  --gold: #c0964d;
  --sage: #66795f;
  --blue: #526a86;
  --shadow: 0 16px 36px rgba(60, 47, 38, 0.1);
  --radius: 8px;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background:
    linear-gradient(rgba(32, 36, 42, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(32, 36, 42, 0.035) 1px, transparent 1px),
    var(--bg);
  background-size: 24px 24px;
}

body {
  min-height: 100vh;
  margin: 0;
  color: var(--ink);
  font-family:
    "PingFang SC",
    "Microsoft YaHei",
    "Noto Sans SC",
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    sans-serif;
  letter-spacing: 0;
}

button {
  font: inherit;
}

.shell {
  width: min(100%, 480px);
  min-height: 100vh;
  margin: 0 auto;
  background: rgba(251, 250, 247, 0.88);
}

.top-rule {
  height: 4px;
  background: var(--accent);
}

.screen {
  min-height: calc(100vh - 4px);
  padding: 28px 22px 32px;
}

.home {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.kicker {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--muted);
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.dot {
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
}

.hero-title {
  margin: 26px 0 14px;
  color: var(--ink);
  font-size: 30px;
  line-height: 1.2;
  text-align: center;
  font-weight: 800;
}

.hero-subtitle {
  margin: 0 auto 28px;
  max-width: 340px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.75;
  text-align: center;
}

.hairline {
  width: 64px;
  height: 1px;
  margin: 0 auto 30px;
  background: var(--line-strong);
}

.intro {
  margin: 0 auto;
  max-width: 380px;
}

.intro p {
  margin: 0 0 15px;
  color: rgba(32, 36, 42, 0.82);
  font-size: 15px;
  line-height: 1.8;
}

.intro .strong {
  color: var(--accent);
  font-weight: 700;
}

.pill-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin: 28px 0;
}

.pill {
  min-height: 42px;
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  color: var(--muted);
  background: rgba(255, 255, 255, 0.44);
  font-size: 13px;
}

.primary-btn,
.ghost-btn,
.copy-btn {
  width: 100%;
  min-height: 48px;
  border: 1px solid var(--ink);
  border-radius: 0;
  cursor: pointer;
  transition: transform 150ms ease, background 150ms ease, color 150ms ease, border-color 150ms ease;
}

.primary-btn {
  background: var(--ink);
  color: #fff;
  font-weight: 700;
}

.ghost-btn,
.copy-btn {
  background: transparent;
  color: var(--ink);
}

.primary-btn:active,
.ghost-btn:active,
.copy-btn:active,
.option:active {
  transform: translateY(1px);
}

.disclaimer {
  margin: 18px auto 0;
  max-width: 340px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.65;
  text-align: center;
}

.quiz-screen {
  padding-top: 0;
}

.sticky-head {
  position: sticky;
  top: 0;
  z-index: 5;
  margin: 0 -22px 26px;
  padding: 14px 22px 12px;
  background: rgba(251, 250, 247, 0.95);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(12px);
}

.quiz-meta {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  color: var(--muted);
  font-size: 12px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

.progress-track {
  height: 4px;
  margin-top: 10px;
  background: rgba(32, 36, 42, 0.09);
}

.progress-bar {
  height: 100%;
  background: var(--accent);
  transition: width 260ms ease;
}

.question-no {
  color: rgba(155, 67, 57, 0.18);
  font-size: 48px;
  line-height: 1;
  font-weight: 800;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

.question-title {
  margin: 18px 0 24px;
  font-size: 22px;
  line-height: 1.5;
  font-weight: 750;
}

.options {
  display: grid;
  gap: 12px;
}

.option {
  min-height: 66px;
  display: grid;
  grid-template-columns: 30px 1fr;
  gap: 12px;
  align-items: start;
  width: 100%;
  padding: 15px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.68);
  color: var(--ink);
  text-align: left;
  cursor: pointer;
  transition: background 160ms ease, border-color 160ms ease, color 160ms ease, opacity 160ms ease;
}

.option-key {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border: 1px solid var(--line-strong);
  font-size: 13px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

.option-text {
  padding-top: 2px;
  font-size: 15px;
  line-height: 1.55;
}

.option.selected {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}

.option.selected .option-key {
  border-color: rgba(255, 255, 255, 0.8);
}

.option.dimmed {
  opacity: 0.42;
}

.hint {
  margin: 18px 0 0;
  color: var(--muted);
  font-size: 12px;
  text-align: center;
}

.loading-screen {
  display: grid;
  place-items: center;
}

.loading-card {
  width: 100%;
  max-width: 360px;
  text-align: center;
}

.spinner {
  width: 54px;
  height: 54px;
  margin: 0 auto 24px;
  border: 2px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 850ms linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.loading-text {
  min-height: 54px;
  color: var(--accent);
  font-size: 17px;
  line-height: 1.6;
  font-weight: 700;
}

.step-bars {
  display: grid;
  gap: 8px;
  margin-top: 28px;
}

.step {
  height: 4px;
  overflow: hidden;
  background: rgba(32, 36, 42, 0.09);
}

.step span {
  display: block;
  height: 100%;
  width: 0;
  background: var(--accent);
  transition: width 300ms ease;
}

.step.done span {
  width: 100%;
}

.result-screen {
  padding: 22px 18px 30px;
}

.report {
  padding: 22px 16px 18px;
  border: 1px solid var(--line);
  background: var(--paper);
  box-shadow: var(--shadow);
}

.result-type {
  margin: 8px 0 8px;
  color: var(--accent);
  font-size: 30px;
  line-height: 1.15;
  font-weight: 850;
  text-align: center;
}

.result-subtitle {
  margin: 0 auto 20px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.7;
  text-align: center;
}

.stamp-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin: 18px 0 20px;
}

.stamp {
  padding: 12px 10px;
  border: 1px solid var(--line);
  background: #fbfaf7;
}

.stamp strong {
  display: block;
  margin-bottom: 4px;
  color: var(--ink);
  font-size: 20px;
}

.stamp span {
  color: var(--muted);
  font-size: 12px;
}

.section {
  padding: 20px 0;
  border-top: 1px solid var(--line);
}

.section h2 {
  margin: 0 0 12px;
  font-size: 18px;
  color: var(--ink);
}

.section p {
  margin: 0 0 12px;
  color: rgba(32, 36, 42, 0.82);
  font-size: 15px;
  line-height: 1.85;
}

.quote {
  padding: 15px;
  border-left: 3px solid var(--accent);
  background: var(--accent-soft);
  color: #5b2d27;
  line-height: 1.8;
  font-weight: 700;
}

.meters {
  display: grid;
  gap: 14px;
}

.meter-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 7px;
  color: var(--muted);
  font-size: 13px;
}

.meter-track {
  height: 8px;
  background: rgba(32, 36, 42, 0.08);
}

.meter-fill {
  height: 100%;
  background: var(--accent);
}

.compare {
  display: grid;
  gap: 10px;
}

.compare-card {
  padding: 14px;
  border: 1px solid var(--line);
  background: #fbfaf7;
}

.compare-card h3,
.plan-card h3 {
  margin: 0 0 8px;
  font-size: 15px;
}

.compare-card p,
.plan-card p {
  font-size: 14px;
}

.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag {
  padding: 7px 9px;
  border: 1px solid var(--line);
  background: #fbfaf7;
  color: var(--muted);
  font-size: 13px;
}

.plan {
  display: grid;
  gap: 10px;
}

.plan-card {
  padding: 14px;
  border: 1px solid var(--line);
  background: #fbfaf7;
}

.secondary-note {
  padding: 14px;
  border: 1px dashed var(--line-strong);
  background: rgba(192, 150, 77, 0.12);
  line-height: 1.75;
  font-size: 14px;
}

.actions {
  display: grid;
  gap: 10px;
  margin-top: 18px;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 22px;
  z-index: 20;
  transform: translateX(-50%);
  padding: 10px 14px;
  background: var(--ink);
  color: #fff;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 180ms ease;
}

.toast.show {
  opacity: 1;
}

.error {
  display: grid;
  place-items: center;
  min-height: 100vh;
  padding: 24px;
  text-align: center;
}

.error p {
  color: var(--muted);
  line-height: 1.7;
}

@media (min-width: 700px) {
  body {
    padding: 28px 0;
  }

  .shell {
    min-height: calc(100vh - 56px);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
  }

  .screen {
    min-height: calc(100vh - 60px);
  }
}

    <script>window.__QUIZ_CONFIG__ = {"slug":"test-literary-soul","topic":"你是哪一种文学灵魂","kicker":"12-Q LITERARY SOUL TEST","title":"文学灵魂原型测试","subtitle":"12 个文学感人生情境，测出你更像哪一种经典人物灵魂，以及你的性格底色、关系模式和成长方向。","metaDescription":"完成 12 道文学灵魂原型测试，生成你的主文学原型、影子原型、五维灵魂指数和成长提醒。","startButton":"开始测试","resultKicker":"Literary Soul Report","quizHint":"不要选更正确的答案，选最像真实的你。","copyButton":"复制我的结果","restartButton":"重新测试","scoreLabel":"文学共鸣度","stageLabel":"灵魂显影","indexTitle":"灵魂五维指数","tensionTitle":"你的灵魂矛盾点","planTitle":"未来 90 天成长提醒","blurSummary":"做完 12 道题，查看你的文学人物原型、影子原型、性格底色和成长方向。","stageLabels":[{"max":65,"label":"故事初醒"},{"max":78,"label":"灵魂显影"},{"max":88,"label":"原型成形"},{"max":100,"label":"命运成章"}],"compareLabels":["顺着原型生活","升级后的脚本"],"disclaimer":"本测试为文学人物原型投射与趣味自测，不构成心理诊断，也不代表对原著人物的唯一解释。","secondaryThreshold":1,"dimensions":["情感感知","尊严边界","意义执着","现实策略","理想远行"],"intro":["在某一本书里，或许早就有人替你活过一次。","他也曾敏感、怀疑、倔强、远行；也曾在爱与自由之间，做出和你相似的选择。","接下来有 12 个人生章节。不要选更正确的答案，选最像真实的你。"],"loadingMessages":["正在翻开你的第一章...","正在读取你的灵魂选择...","正在匹配文学人物原型...","正在生成你的文学灵魂报告...","分析完成。"],"questions":[{"id":1,"module":"第一章 没有回信的信","text":"你写出一封非常真诚的信，却迟迟没有收到回复。你更可能：","options":[{"key":"A","text":"反复回想自己的措辞，怀疑是不是暴露得太多","score":"LY"},{"key":"B","text":"难过，但不会追问；真心不该靠乞求获得回应","score":"JA"},{"key":"C","text":"开始推演对方沉默背后的所有可能","score":"HM"},{"key":"D","text":"暂时放下，用轻松的方式观察对方之后的态度","score":"EB"}]},{"id":2,"module":"第二章 陌生城镇","text":"你独自来到一座无人认识你的城市，最想先做什么？","options":[{"key":"A","text":"漫无目的地走，让陌生感慢慢洗掉旧生活的噪音","score":"SD"},{"key":"B","text":"迅速熟悉地图、规则和能利用的资源","score":"OD"},{"key":"C","text":"去寻找只存在于传说中的地方，即使别人说它不存在","score":"DQ"},{"key":"D","text":"找一家安静小店，认真听老板讲他珍惜的人和故事","score":"LP"}]},{"id":3,"module":"第三章 不公平的评价","text":"有人凭片面印象否定你，你会：","options":[{"key":"A","text":"平静指出事实，并明确告诉对方什么不能越界","score":"JA"},{"key":"B","text":"先保留判断，从对方的逻辑中寻找真正动机","score":"HM"},{"key":"C","text":"用机智但不失礼的方式拆掉对方的偏见","score":"EB"},{"key":"D","text":"不急着证明，先远离那个错误定义你的环境","score":"SD"}]},{"id":4,"module":"第四章 暴风雨前夜","text":"所有人都说计划已经失败，但你仍有一次改变结局的机会。你会：","options":[{"key":"A","text":"重算风险，换一条没人注意到的路线继续前进","score":"OD"},{"key":"B","text":"即使胜算渺茫，也要为相信的东西再试一次","score":"DQ"},{"key":"C","text":"先守住最重要的人，其他得失可以重新开始","score":"LP"},{"key":"D","text":"独自消化混乱，等内心真正安静后再决定","score":"LY"}]},{"id":5,"module":"第五章 关系裂缝","text":"你察觉一段重要关系正在疏远，第一反应更接近：","options":[{"key":"A","text":"反复捕捉语气和细节，想知道感情从哪里开始变了","score":"HM"},{"key":"B","text":"直接谈清彼此的感受和边界，不让猜测消耗尊严","score":"EB"},{"key":"C","text":"先问自己：我爱的是对方，还是自己想象中的对方？","score":"SD"},{"key":"D","text":"做点实际的事修复关系，不让问题继续扩大","score":"OD"}]},{"id":6,"module":"第六章 一间房间","text":"如果得到一间完全属于你的房间，你会把它变成：","options":[{"key":"A","text":"一个摆满理想、旧地图和未完成计划的秘密基地","score":"DQ"},{"key":"B","text":"一个有柔和灯光、纪念物和少数珍贵来信的地方","score":"LP"},{"key":"C","text":"一个有花、有书，也能随时邀请朋友喝茶聊天的空间","score":"LY"},{"key":"D","text":"一个安静而精致的庇护所，任何人进来都要尊重规则","score":"JA"}]},{"id":7,"module":"第七章 必须舍弃","text":"为了开始新生活，你必须暂时舍弃一样东西。你最难放下的是：","options":[{"key":"A","text":"别人眼中那个被认可、被需要的自己","score":"EB"},{"key":"B","text":"对未来仍可能改变的想象","score":"SD"},{"key":"C","text":"已经投入很久、眼看就要抵达的目标","score":"OD"},{"key":"D","text":"那个曾经支撑你活下去的宏大理想","score":"DQ"}]},{"id":8,"module":"第八章 宴会角落","text":"在一场热闹但略显虚伪的宴会上，你通常会：","options":[{"key":"A","text":"留意那个一直沉默的人，也许他比全场更有故事","score":"LP"},{"key":"B","text":"找到一个能真正理解你的人，聊到忘记周围的喧闹","score":"LY"},{"key":"C","text":"用旁观者视角观察每个人话语背后的欲望","score":"JA"},{"key":"D","text":"一边配合社交，一边用幽默保护自己的独立判断","score":"HM"}]},{"id":9,"module":"第九章 命运捷径","text":"如果命运给你一条捷径，但代价是变成自己不喜欢的人，你会：","options":[{"key":"A","text":"放弃捷径；没有任何成功值得用自我交换","score":"SD"},{"key":"B","text":"先判断代价能否控制，再寻找两全的策略","score":"OD"},{"key":"C","text":"拒绝，并继续相信存在一条更高尚的路","score":"DQ"},{"key":"D","text":"问清自己真正想抵达哪里，也许终点本就不重要","score":"LP"}]},{"id":10,"module":"第十章 深夜问题","text":"哪一种问题最容易让你在深夜无法入睡？","options":[{"key":"A","text":"为什么我明明真心待人，却仍可能被误解？","score":"LY"},{"key":"B","text":"为什么人必须服从一套并不公平的规则？","score":"JA"},{"key":"C","text":"如果所有选择都有代价，怎么确定自己没有选错？","score":"HM"},{"key":"D","text":"为什么聪明的人也会被第一印象蒙蔽？","score":"EB"}]},{"id":11,"module":"第十一章 远方召唤","text":"一个陌生声音邀请你离开熟悉生活，去完成一件不确定的事。你会：","options":[{"key":"A","text":"先准备退路和资源，但最终会踏上旅程","score":"OD"},{"key":"B","text":"几乎立刻出发；值得追寻的事不会先给你保证","score":"DQ"},{"key":"C","text":"如果这段旅程能让我看见事物的本质，我愿意去","score":"SD"},{"key":"D","text":"先问旅途中有没有一个值得我守护的人","score":"LP"}]},{"id":12,"module":"第十二章 故事结尾","text":"如果你能为自己的人生选择一个结尾，你希望是：","options":[{"key":"A","text":"我终于能平等而自由地爱，也完整地成为自己","score":"JA"},{"key":"B","text":"我看清了所有矛盾，最终不再被怀疑困住","score":"HM"},{"key":"C","text":"我保留清醒与幽默，没有向偏见交出判断权","score":"EB"},{"key":"D","text":"我离开了不适合自己的世界，也找到了内心的宁静","score":"SD"}]}],"results":{"LY":{"typeName":"林黛玉型灵魂","subtitle":"高精度情感观察者","posterSubtext":"你不是脆弱，你只是对世界的情绪颗粒看得太清楚。","maturityScore":87,"coreConclusion":"你对语气、距离和情感变化有非常精细的感知。别人尚未意识到关系发生变化时，你可能已经从一句话、一个停顿里察觉到了不同。 你真正需要的不是很多人喜欢，而是少数人能够认真理解。你很难接受敷衍式亲密，也不喜欢把真心拆成社交技巧。","diagnosis":"你对语气、距离和情感变化有非常精细的感知。别人尚未意识到关系发生变化时，你可能已经从一句话、一个停顿里察觉到了不同。","whatYouReallyWant":"你真正需要的不是很多人喜欢，而是少数人能够认真理解。你很难接受敷衍式亲密，也不喜欢把真心拆成社交技巧。","mechanism":{"title":"你的灵魂机制：高感知与真情洁癖","content":"你会在被放弃之前先想象放弃，在遭到轻视之前先收回热情。你看似在闹情绪，实际是在保护那个不愿被随便对待的自己。"},"professionalBasis":["你的敏感不是无端多想，而是一套长期高速运转的情绪雷达。","当你学会把感受说清，而不是只在心里反复推演，你会更容易被真正重要的人接住。"],"coreTensions":["高敏感体质","真情洁癖","审美直觉","自尊防御"],"suitableIf":["适合写作、艺术、审美表达、深度关系和安静真诚的环境。"],"cautionIf":["不要把“对方没有察觉”自动翻译成“对方不在乎”。"],"indices":[{"label":"情感感知","value":96},{"label":"尊严边界","value":82},{"label":"意义执着","value":86},{"label":"现实策略","value":60},{"label":"理想远行","value":74}],"ifStay":"如果一直顺着本能，你会越来越能发现细微伤口，但也可能越来越难相信关系里仍然有善意。","ifChange":"升级方式是把敏感从“证明受伤”转向“表达需要”，让真正关心你的人有地图可循。","notRecommended":["反复试探","用冷淡保护热情","把细节都解释成答案","在心里完成整场告别"],"plan90":[{"title":"把感受说成事实","content":"用“我听到这句话会有点难过”代替沉默和猜测。"},{"title":"少做预演式告别","content":"在关系真的结束之前，不要先把自己撤回一百次。"},{"title":"保留审美出口","content":"把过量感知放进写作、图片、音乐或整理生活里。"}],"closing":"愿你的敏感不再只用来发现伤口，也用来发现世界仍然值得珍惜的细节。"},"JA":{"typeName":"简·爱型灵魂","subtitle":"尊严边界守护者","posterSubtext":"你可以爱得很深，但绝不会为了被爱而放低自己。","maturityScore":89,"coreConclusion":"你有一种不依赖外部条件的自我价值感。即使资源有限、处境不利，你仍相信自己有权被公平对待。 你渴望深刻关系，但前提是彼此平等。你不害怕付出，却不能接受施舍式的爱、居高临下的保护或以爱为名的控制。","diagnosis":"你有一种不依赖外部条件的自我价值感。即使资源有限、处境不利，你仍相信自己有权被公平对待。","whatYouReallyWant":"你渴望深刻关系，但前提是彼此平等。你不害怕付出，却不能接受施舍式的爱、居高临下的保护或以爱为名的控制。","mechanism":{"title":"你的灵魂机制：尊严先行，边界清晰","content":"一旦察觉尊严受到威胁，你可能迅速抽离，甚至不给对方解释机会。你宁可承受失去，也不愿留下一个卑微的自己。"},"professionalBasis":["你的强大不是锋芒，而是安静坚韧。","真正的平等也允许你偶尔需要别人、表达害怕，并在关系里接受照顾。"],"coreTensions":["尊严先行","边界清晰","平等关系","安静坚韧"],"suitableIf":["适合独立事业、教育、专业服务、长期主义和尊重个体的关系。"],"cautionIf":["边界不是永不示弱，示弱也不是失去尊严。"],"indices":[{"label":"情感感知","value":78},{"label":"尊严边界","value":96},{"label":"意义执着","value":82},{"label":"现实策略","value":76},{"label":"理想远行","value":70}],"ifStay":"如果一直顺着本能，你会很难被真正驯服，但也可能在受伤时过快关门。","ifChange":"升级方式是让边界既清楚，也留下一点沟通空间。","notRecommended":["用离开代替说明","把求助看成低头","过早判定不平等","在关系里只允许自己坚强"],"plan90":[{"title":"把边界说完整","content":"不只说“不可以”，也说“我为什么在意这件事”。"},{"title":"练习接收照顾","content":"允许一个值得信任的人看见你偶尔脆弱的一面。"},{"title":"分清控制和关心","content":"不要让过去的压迫感覆盖所有善意。"}],"closing":"愿你既不为爱低头，也不必总靠独自承受来证明坚强。"},"HM":{"typeName":"哈姆雷特型灵魂","subtitle":"意义审判者","posterSubtext":"你不是迟迟不行动，你只是不愿在没想明白前交出自己。","maturityScore":83,"coreConclusion":"你天生会看到事情的多重解释。一个看似简单的决定，在你脑中可能同时牵动责任、后果、动机与价值。 你需要精神上的诚实。你不怕听见坏消息，却难以忍受伪装、操纵和含糊不清。","diagnosis":"你天生会看到事情的多重解释。一个看似简单的决定，在你脑中可能同时牵动责任、后果、动机与价值。","whatYouReallyWant":"你需要精神上的诚实。你不怕听见坏消息，却难以忍受伪装、操纵和含糊不清。","mechanism":{"title":"你的灵魂机制：深度反思与意义执着","content":"你会用分析推迟痛苦，也会用怀疑避免承担选错的责任。有时你以为自己还缺一个答案，其实缺的是允许自己在不确定中行动。"},"professionalBasis":["你适合复杂问题、深度创作和需要反思能力的领域。","但世界不会等到所有证据完整才开始，行动本身也可以成为新的信息来源。"],"coreTensions":["深度反思","怀疑精神","道德敏感","意义执着"],"suitableIf":["适合研究、哲学、策略、心理洞察、复杂问题和深度创作。"],"cautionIf":["不要等思想彻底结束才开始生活。"],"indices":[{"label":"情感感知","value":82},{"label":"尊严边界","value":80},{"label":"意义执着","value":97},{"label":"现实策略","value":62},{"label":"理想远行","value":72}],"ifStay":"如果一直顺着本能，你会越来越清醒，但也可能被清醒困住。","ifChange":"升级方式是给思考设置期限，让行动成为验证，而不是等答案来赦免你。","notRecommended":["无限推演","用怀疑代替选择","把复杂当成不能行动的理由","在精神世界审判所有人"],"plan90":[{"title":"给思考设截止日","content":"重要选择最多给自己三天，三天后用小行动验证。"},{"title":"写下最小行动","content":"不要问终极答案，先问下一步能做什么。"},{"title":"允许不完美选择","content":"选择不必证明你永远正确，只要让人生继续展开。"}],"closing":"愿你的思考最终成为桥，而不是一座困住自己的城堡。"},"EB":{"typeName":"伊丽莎白·班纳特型灵魂","subtitle":"清醒机智的独立判断者","posterSubtext":"你不靠迎合获得喜欢，更愿意靠清醒赢得尊重。","maturityScore":86,"coreConclusion":"你有很强的观察力和判断欲，不轻易接受别人替你安排的结论。面对权威、传统或群体意见，你会保留自己的视角。 你喜欢能够平等交锋的人。过度殷勤会让你警惕，思想空洞会让你迅速失去兴趣。","diagnosis":"你有很强的观察力和判断欲，不轻易接受别人替你安排的结论。面对权威、传统或群体意见，你会保留自己的视角。","whatYouReallyWant":"你喜欢能够平等交锋的人。过度殷勤会让你警惕，思想空洞会让你迅速失去兴趣。","mechanism":{"title":"你的灵魂机制：独立判断与温暖清醒","content":"幽默是你的武器，也是你调节尴尬的方式。你对虚伪很敏感，但也可能过早相信自己的第一判断。"},"professionalBasis":["你的锋利来自清醒，不是刻薄。","真正成熟的判断力，既能看穿偏见，也愿意修正自己的偏见。"],"coreTensions":["独立判断","机智通透","反感虚伪","温暖清醒"],"suitableIf":["适合沟通表达、内容策划、法律、咨询、公关和有趣平等的关系。"],"cautionIf":["保留判断，也保留修正判断的空间。"],"indices":[{"label":"情感感知","value":74},{"label":"尊严边界","value":90},{"label":"意义执着","value":78},{"label":"现实策略","value":84},{"label":"理想远行","value":66}],"ifStay":"如果一直顺着本能，你会越来越会识人，但也可能越来越不耐烦等待别人完整显露。","ifChange":"升级方式是让清醒带着温度，也允许世界偶尔给你惊喜。","notRecommended":["过早下定论","用幽默掩盖受伤","只相信第一印象","把热情误判成虚伪"],"plan90":[{"title":"延迟判断","content":"面对一个人，至少给自己两次观察机会。"},{"title":"让幽默服务沟通","content":"需要认真表达时，不要只用玩笑绕开。"},{"title":"练习承认看错","content":"承认修正判断，不会削弱你的聪明。"}],"closing":"愿你的锐利始终带着温度，你的清醒也允许世界给你惊喜。"},"SD":{"typeName":"悉达多型灵魂","subtitle":"内在秩序寻找者","posterSubtext":"你不是逃离世界，你是在筛掉那些遮住本质的喧哗。","maturityScore":84,"coreConclusion":"你很难仅凭外部标准获得满足。名次、评价和热闹能短暂吸引你，却不能长久解释生活。 你珍惜深度连接，但也需要大量独处。真正适合你的人，不会把你的安静理解为冷淡。","diagnosis":"你很难仅凭外部标准获得满足。名次、评价和热闹能短暂吸引你，却不能长久解释生活。","whatYouReallyWant":"你珍惜深度连接，但也需要大量独处。真正适合你的人，不会把你的安静理解为冷淡。","mechanism":{"title":"你的灵魂机制：意义探索与低欲清醒","content":"当现实过于混乱，你可能退回精神世界，把“看深”变成避免参与。你能理解一切，却未必愿意承认自己也会需要、嫉妒和受伤。"},"professionalBasis":["你需要亲自经验、亲自怀疑，再形成自己的答案。","有些答案只能在投入之后出现，不能永远站在人生之外观察。"],"coreTensions":["精神独立","意义探索","低欲清醒","内在秩序"],"suitableIf":["适合研究、心理、哲学、自然、独立创作和低噪音生活。"],"cautionIf":["超脱不是没有欲望，而是看见欲望后仍能选择。"],"indices":[{"label":"情感感知","value":78},{"label":"尊严边界","value":76},{"lab     selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .filter(([, value]) => value > 0)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    if (state.config.scoring?.mode === "paired-attributes") {
      return scorePairedAttributes(answers, state.config.scoring);
    }

    const resultKeys = Object.keys(state.config.results || {});
    const counts = Object.fromEntries(resultKeys.map((key) => [key, 0]));
    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey) return;
      const option = (question.options || []).find((item) => item.key === answerKey);
      const scoreKey = option?.score || option?.result || answerKey;
      if (counts[scoreKey] !== undefined) counts[scoreKey] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function scorePairedAttributes(answers, scoring) {
    const attributes = Object.fromEntries((scoring.attributes || []).map((key) => [key, 0]));
    const questionsById = Object.fromEntries((state.config.questions || []).map((question) => [question.id, question]));

    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey) return;
      const option = (question.options || []).find((item) => item.key === answerKey);
      (option?.attributes || []).forEach((attribute) => {
        if (attributes[attribute] !== undefined) attributes[attribute] += 1;
      });
    });

    const chosen = (scoring.pairs || []).map(([left, right], index) => {
      if (attributes[left] > attributes[right]) return left;
      if (attributes[right] > attributes[left]) return right;

      const tieQuestionId = scoring.tieBreakers?.[String(index)];
      const tieQuestion = questionsById[tieQuestionId];
      const tieAnswer = tieQuestion && answers[tieQuestionId];
      const tieOption = tieQuestion?.options?.find((item) => item.key === tieAnswer);
      return tieOption?.attributes?.includes(left) ? left : right;
    });

    const primary = chosen.join("");
    const counts = Object.fromEntries(Object.keys(state.config.results || {}).map((key) => [key, key === primary ? (state.config.questions || []).length : 0]));
    const alternate = chosen.slice();
    if (scoring.pairs?.length) {
      const firstPair = scoring.pairs[0];
      alternate[0] = alternate[0] === firstPair[0] ? firstPair[1] : firstPair[0];
    }
    const secondary = alternate.join("") !== primary && state.config.secondaryNotes?.[primary]?.[alternate.join("")] ? alternate.join("") : null;
    return { counts, primary, secondary, attributes };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
</html>
