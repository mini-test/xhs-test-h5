破格之人，喜欢把人按死在原位的人"},{"key":"E","text":"规矩模糊，赏罚全凭心情的人"},{"key":"F","text":"只要短期战果，不愿意做长期建设的人"}]},{"id":4,"module":"入局方式","text":"如果只能用一句话描述你的入局姿态，更像：","options":[{"key":"A","text":"先做人心局，人在，局就能活"},{"key":"B","text":"先抢窗口期，乱世不给慢人机会"},{"key":"C","text":"先立专业度，能解决问题才有位置"},{"key":"D","text":"先忍住被轻视，后面一击翻身"},{"key":"E","text":"先活下来，别让错误比功劳更显眼"},{"key":"F","text":"先做长线判断，别被一时风浪带走"}]},{"id":5,"module":"能力底色","text":"你最容易被君主重用的能力是：","options":[{"key":"A","text":"识人、联络、安抚、把人带到同一张桌上"},{"key":"B","text":"判断战机、快速执行、把危险变成机会"},{"key":"C","text":"谋划制度、提出方案、帮团队补结构"},{"key":"D","text":"在不公平环境里硬生生杀出证明"},{"key":"E","text":"落实铁令、清理混乱、把纪律立起来"},{"key":"F","text":"长期学习、治理细节、耐心做大盘"}]},{"id":6,"module":"能力底色","text":"别人最容易低估你的地方是：","options":[{"key":"A","text":"以为你好说话，其实你很会看人心"},{"key":"B","text":"以为你冲动，其实你很清楚机会窗口"},{"key":"C","text":"以为你温和，其实你的判断很硬"},{"key":"D","text":"以为你不够资格，其实你最擅长破格"},{"key":"E","text":"以为你只是执行，其实你最懂风险边界"},{"key":"F","text":"以为你慢，其实你在看十年后的局"}]},{"id":7,"module":"能力底色","text":"你最受不了团队里哪种人？","options":[{"key":"A","text":"只会拆台，不会把人聚起来的人"},{"key":"B","text":"机会来了还怕这怕那的人"},{"key":"C","text":"没有专业判断，只会站队表忠心的人"},{"key":"D","text":"用身份压人，不允许别人翻身的人"},{"key":"E","text":"不守规矩，还让别人替他兜底的人"},{"key":"F","text":"只顾眼前功劳，不顾后面治理的人"}]},{"id":8,"module":"能力底色","text":"你的优势如果用错，最容易变成：","options":[{"key":"A","text":"太讲情面，关键时刻下不了狠判断"},{"key":"B","text":"太敢赌，容易把自己也推到危险处"},{"key":"C","text":"太讲道理，忽略权力场里的情绪和猜忌"},{"key":"D","text":"太想证明，容易把所有轻视都当战场"},{"key":"E","text":"太谨慎，活得安全但不够显眼"},{"key":"F","text":"太长线，短期存在感不够强"}]},{"id":9,"module":"权力适应","text":"面对强势君主，你的本能反应是：","options":[{"key":"A","text":"先建立信任，再慢慢争取话语权"},{"key":"B","text":"用战果说话，别讲太多虚的"},{"key":"C","text":"用专业和事实让他不得不听"},{"key":"D","text":"不急着讨好，先证明我不可替代"},{"key":"E","text":"绝不越界，先守住安全距离"},{"key":"F","text":"看他是否有长期格局，再决定投入多少"}]},{"id":10,"module":"权力适应","text":"你最适合在君主身边扮演什么角色？","options":[{"key":"A","text":"能联络各方的开局合伙人"},{"key":"B","text":"乱世里能打能谋的急先锋"},{"key":"C","text":"敢谏敢谋的核心参谋"},{"key":"D","text":"从边缘被提拔起来的破格重臣"},{"key":"E","text":"铁面执行、守规矩的安全型臣子"},{"key":"F","text":"长期陪跑、稳住大盘的治理型臣子"}]},{"id":11,"module":"权力适应","text":"如果你要提反对意见，会怎么提？","options":[{"key":"A","text":"先顾全情面，再把利害说透"},{"key":"B","text":"直接讲结果：这仗这么打会输"},{"key":"C","text":"列证据、列方案、列替代路径"},{"key":"D","text":"等关键时刻拿出让人无法忽视的判断"},{"key":"E","text":"只在职责范围内提醒，不把自己推到台前"},{"key":"F","text":"从长期治理和后续成本慢慢说服"}]},{"id":12,"module":"权力适应","text":"你最怕遇到的职场/朝堂信号是：","options":[{"key":"A","text":"人心散了，表面一团和气，背后各算各的"},{"key":"B","text":"机会正在消失，但所有人还在开会犹豫"},{"key":"C","text":"专业意见被情绪和站队压过"},{"key":"D","text":"功劳被拿走，偏见还留在你身上"},{"key":"E","text":"规则突然变了，责任却让你背"},{"key":"F","text":"短期热闹很多，长期根基很虚"}]},{"id":13,"module":"风险边界","text":"你对“伴君如伴虎”的理解更接近：","options":[{"key":"A","text":"关键不是怕虎，而是先让虎把你当自己人"},{"key":"B","text":"越危险越要拿战果换安全感"},{"key":"C","text":"用价值和理性降低猜忌，但别太天真"},{"key":"D","text":"危险本来就在，不能因为怕就不争位置"},{"key":"E","text":"第一原则是别犯忌讳，别让刀口对准自己"},{"key":"F","text":"长期共事要看节奏，不能一开始押满"}]},{"id":14,"module":"风险边界","text":"你最容易在哪个地方踩雷？","options":[{"key":"A","text":"替别人兜太多情面，最后自己被牵连"},{"key":"B","text":"出手太猛，功劳大，风险也大"},{"key":"C","text":"话太真，低估了权力的自尊心"},{"key":"D","text":"太想翻身，容易让别人感到威胁"},{"key":"E","text":"太怕错，关键机会不敢主动争"},{"key":"F","text":"太慢热，前期没抢到足够信任"}]},{"id":15,"module":"风险边界","text":"如果君主开始猜忌你，你会先做什么？","options":[{"key":"A","text":"找中间人缓和，让关系重新有台阶"},{"key":"B","text":"交出一部分锋芒，用结果继续证明价值"},{"key":"C","text":"把账目、逻辑、证据都摆清楚"},{"key":"D","text":"减少表演欲，先把关键位置稳住"},{"key":"E","text":"立刻收边界，不多说、不越权、不碰敏感事"},{"key":"F","text":"降低短期存在感，转向长期可靠表现"}]},{"id":16,"module":"风险边界","text":"你认为最安全的上升方式是：","options":[{"key":"A","text":"靠信任和人情慢慢进入核心圈"},{"key":"B","text":"靠硬仗和关键胜利让别人不能不用你"},{"key":"C","text":"靠专业贡献成为制度里不可缺的人"},{"key":"D","text":"靠破格表现撕掉原来的标签"},{"key":"E","text":"靠稳定执行和谨慎边界慢慢被放心"},{"key":"F","text":"靠长期治理成果积累越来越深的信用"}]},{"id":17,"module":"关系忠诚","text":"你心里的忠诚更像：","options":[{"key":"A","text":"主公懂我，我就愿意一起扛事"},{"key":"B","text":"他给我舞台，我给他战果"},{"key":"C","text":"共同把事情做好，而不是无条件服从"},{"key":"D","text":"他敢破格用我，我就敢证明给所有人看"},{"key":"E","text":"守本分、守规矩、守底线"},{"key":"F","text":"长期相互成就，不靠一时热血"}]},{"id":18,"module":"关系忠诚","text":"你最希望君主怎么对待你？","options":[{"key":"A","text":"不只看出身，愿意把你当自己人"},{"key":"B","text":"给机会、给兵权、给你打仗的空间"},{"key":"C","text":"能听真话，也能容纳专业分歧"},{"key":"D","text":"敢打破偏见，把你放到真正的位置上"},{"key":"E","text":"赏罚分明，不让你卷进无意义斗争"},{"key":"F","text":"给时间、给资源，让你做长期建设"}]},{"id":19,"module":"关系忠诚","text":"你最不想成为哪种臣子？","options":[{"key":"A","text":"到处讨好，最后谁也不真正信任"},{"key":"B","text":"明明有能力，却一辈子没上过战场"},{"key":"C","text":"只会说漂亮话，不解决真实问题"},{"key":"D","text":"永远被身份和偏见卡在门外"},{"key":"E","text":"替上面背锅，却没有任何保护"},{"key":"F","text":"被短期任务耗尽，没机会留下长期成果"}]},{"id":20,"module":"关系忠诚","text":"你最愿意追随哪种承诺？","options":[{"key":"A","text":"一起从低处杀出来，富贵不相忘"},{"key":"B","text":"乱世给你战场，功劳按结果说话"},{"key":"C","text":"允许你讲真话，也承认你的专业价值"},{"key":"D","text":"不问旧标签，只看你能不能做到"},{"key":"E","text":"边界清楚，做对就赏，犯错就罚"},{"key":"F","text":"一起做一盘长期大棋，慢慢看成果"}]},{"id":21,"module":"成事风格","text":"你最擅长把事情做成的方式是：","options":[{"key":"A","text":"先让人愿意跟你，再一起解决问题"},{"key":"B","text":"先抓最关键窗口，速度比完美重要"},{"key":"C","text":"先拆结构，再给出可执行方案"},{"key":"D","text":"先拿出惊艳结果，让偏见失效"},{"key":"E","text":"先定规则和责任，再推进执行"},{"key":"F","text":"先搭长期系统，让事情越做越稳"}]},{"id":22,"module":"成事风格","text":"你的工作节奏更像：","options":[{"key":"A","text":"边走边聚人，局越做越大"},{"key":"B","text":"快判断、快试错、快拿结果"},{"key":"C","text":"先想透逻辑，再稳定推进"},{"key":"D","text":"前期忍，关键节点突然出手"},{"key":"E","text":"稳、准、守纪律，少犯错就是优势"},{"key":"F","text":"慢热但耐久，后劲比爆发更强"}]},{"id":23,"module":"成事风格","text":"你在团队里最能贡献什么？","options":[{"key":"A","text":"让不同的人愿意坐下来合作"},{"key":"B","text":"在危机里找到突破口"},{"key":"C","text":"把混乱变成方案和制度"},{"key":"D","text":"打破对你的低估，带来意外战力"},{"key":"E","text":"让流程、规矩和责任不再混乱"},{"key":"F","text":"把短期成果变成长期治理能力"}]},{"id":24,"module":"成事风格","text":"你最适合跟随的主公风格是：","options":[{"key":"A","text":"会用人，也知道人情的价值"},{"key":"B","text":"敢冒险，也敢给能人空间"},{"key":"C","text":"有格局，能听逆耳真话"},{"key":"D","text":"敢破格，愿意提拔被低估的人"},{"key":"E","text":"规矩严，但赏罚清楚"},{"key":"F","text":"有耐心，重视长期治理"}]},{"id":25,"module":"逆风反应","text":"你长期不被重用时，会更像：","options":[{"key":"A","text":"继续经营关系，等一个人愿意拉你进局"},{"key":"B","text":"找更乱的地方，那里反而有机会"},{"key":"C","text":"继续打磨专业，等能说话的时机"},{"key":"D","text":"把委屈变成证明自己的燃料"},{"key":"E","text":"先稳住位置，不让自己被踢出局"},{"key":"F","text":"保持学习和耐心，等长期机会成熟"}]},{"id":26,"module":"逆风反应","text":"被误解时，你最可能：","options":[{"key":"A","text":"先修复信任，不急着硬碰硬"},{"key":"B","text":"拿一次漂亮结果让人闭嘴"},{"key":"C","text":"讲清事实、逻辑和证据"},{"key":"D","text":"记住这次轻视，以后用位置回应"},{"key":"E","text":"少说话，先别让误解变成罪名"},{"key":"F","text":"不急着翻案，用长期表现慢慢洗清"}]},{"id":27,"module":"逆风反应","text":"如果上面突然换人，你第一反应是：","options":[{"key":"A","text":"重新判断人心和圈层，别站错情面"},{"key":"B","text":"看新局有没有新战场和新机会"},{"key":"C","text":"看制度和权力结构会怎么变"},{"key":"D","text":"看新主是否愿意破格用人"},{"key":"E","text":"先收敛动作，避免旧账被翻"},{"key":"F","text":"观察长期方向，不急着押注"}]},{"id":28,"module":"逆风反应","text":"你最强的抗压方式是：","options":[{"key":"A","text":"靠关系和信任重新找支点"},{"key":"B","text":"靠行动和胜利把局面打回来"},{"key":"C","text":"靠理性复盘找到出路"},{"key":"D","text":"靠不服输的劲撑过低谷"},{"key":"E","text":"靠谨慎和边界避开致命错误"},{"key":"F","text":"靠耐心和学习等待周期反转"}]},{"id":29,"module":"终局位置","text":"如果历史给你写一笔，你最想留下哪种位置？","options":[{"key":"A","text":"从低处一起起事，最后成了核心开国班底"},{"key":"B","text":"乱世里立下硬功，成为主公最敢用的刀"},{"key":"C","text":"靠真本事进入中枢，成为能影响决策的人"},{"key":"D","text":"从被低估到被破格重用，改写自己的命"},{"key":"E","text":"在高压体系里全身而退，还留下实际功劳"},{"key":"F","text":"陪一个长期王朝变稳，成为治理型功臣"}]},{"id":30,"module":"终局位置","text":"你最希望自己的上限来自：","options":[{"key":"A","text":"识人和聚人的能力"},{"key":"B","text":"敢打关键仗的魄力"},{"key":"C","text":"专业、判断和进谏能力"},{"key":"D","text":"被低估后反杀的证明欲"},{"key":"E","text":"纪律、边界和极强生存感"},{"key":"F","text":"长期学习和治理耐心"}]},{"id":31,"module":"终局位置","text":"做这个测试，你最想知道：","options":[{"key":"A","text":"我适不适合跟着一个能用人的草根老板翻身"},{"key":"B","text":"我适不适合投靠乱世型强主，靠战果上位"},{"key":"C","text":"我适不适合在明君身边靠专业被重用"},{"key":"D","text":"我适不适合被破格提拔，打破原本位置"},{"key":"E","text":"我能不能在高压权力场里活下来并被信任"},{"key":"F","text":"我适不适合陪长期型君主慢慢做大局"}]},{"id":32,"module":"终局位置","text":"凭第一反应，你更愿意把命押在哪种君主身边？","options":[{"key":"A","text":"刘邦型：会用人，重情义，适合一起从低处起势"},{"key":"B","text":"曹操型：乱世强主，给战场，敢用能人也敢试险招"},{"ke     <script>
(function () {
  const app = document.getElementById("app");
  const configPaths = ["./configs/site-config.json", "./configs/career-change.json"];

  const state = {
    config: null,
    answers: {},
    currentIndex: 0,
    selected: null,
    locked: false,
    loadingStep: 0,
    route: "home",
    resultData: null,
  };

  const defaultLoadingMessages = [
    "正在读取你的选择倾向...",
    "正在识别隐藏动机...",
    "正在计算结果分布...",
    "正在生成专属报告...",
    "分析完成。",
  ];

  init();

  async function init() {
    try {
      state.config = await fetchConfig();
      applyDocumentMeta(state.config);

      const saved = sessionStorage.getItem(getStorageKey());
      if (saved) {
        state.answers = JSON.parse(saved);
      }

      routeFromHash();
      window.addEventListener("hashchange", routeFromHash);
    } catch (error) {
      app.innerHTML = `
        <div class="error">
          <div>
            <h1>测试加载失败</h1>
            <p>请确认你是通过网页链接打开页面，而不是直接双击 HTML 文件。</p>
          </div>
        </div>
      `;
      console.error(error);
    }
  }

  async function fetchConfig() {
    if (window.__QUIZ_CONFIG__) return window.__QUIZ_CONFIG__;
    let lastError;
    for (const path of configPaths) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} ${response.status}`);
        return response.json();
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError;
  }

  function applyDocumentMeta(cfg) {
    const title = cfg.title || "趣味测试";
    const description = cfg.metaDescription || cfg.subtitle || "完成测试，生成你的专属报告。";
    document.title = title;
    setMeta("name", "description", description);
    setMeta("property", "og:title", title);
    setMeta("property", "og:description", description);
  }

  function setMeta(attr, key, content) {
    let node = document.querySelector(`meta[${attr}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attr, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  function routeFromHash() {
    const route = (location.hash || "#/").replace("#/", "") || "home";
    renderRoute(route);
  }

  function navigate(route) {
    const nextHash = `#/${route}`;
    if (location.hash === nextHash) {
      renderRoute(route);
      return;
    }
    location.hash = nextHash;
  }

  function renderRoute(route) {
    state.route = route;
    if (route === "quiz") renderQuiz();
    else if (route === "loading") startLoading();
    else if (route === "result") renderResult();
    else renderHome();
  }

  function renderShell(content, extraClass = "") {
    app.innerHTML = `
      <div class="shell">
        <div class="top-rule"></div>
        <section class="screen ${extraClass}">${content}</section>
      </div>
      <div id="toast" class="toast">已复制</div>
    `;
  }

  function renderHome() {
    const cfg = state.config;
    renderShell(
      `
      <div class="home">
        <div class="kicker"><span class="dot"></span><span>${text(cfg.kicker)}</span><span class="dot"></span></div>
        <h1 class="hero-title">${text(cfg.title)}</h1>
        <p class="hero-subtitle">${text(cfg.subtitle)}</p>
        <div class="hairline"></div>
        <div class="intro">
          ${(cfg.intro || []).map((p, index) => `<p class="${index === cfg.intro.length - 1 ? "strong" : ""}">${text(p)}</p>`).join("")}
        </div>
        <div class="pill-grid">
          ${(cfg.dimensions || []).map((item) => `<div class="pill">${text(item)}</div>`).join("")}
        </div>
        <button class="primary-btn" data-action="start">${text(cfg.startButton || "开始测试")}</button>
        <p class="disclaimer">${text(cfg.disclaimer || "本测试为趣味内容，仅供娱乐参考。")}</p>
      </div>
      `,
      "home"
    );
    const startButton = app.querySelector("[data-action='start']");
    let started = false;
    const startQuiz = () => {
      if (started) return;
      started = true;
      state.answers = {};
      state.currentIndex = 0;
      sessionStorage.removeItem(getStorageKey());
      navigate("quiz");
    };
    startButton.addEventListener("click", startQuiz);
    startButton.addEventListener(
      "touchend",
      (event) => {
        event.preventDefault();
        startQuiz();
      },
      { passive: false }
    );
  }

  function renderQuiz() {
    const questions = state.config.questions || [];
    const question = questions[state.currentIndex];
    if (!question) {
      renderHome();
      return;
    }

    const progress = ((state.currentIndex + 1) / questions.length) * 100;

    renderShell(
      `
      <div class="sticky-head">
        <div class="quiz-meta">
          <span>${String(state.currentIndex + 1).padStart(2, "0")} / ${questions.length}</span>
          <span>${text(question.module)}</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
      </div>
      <div class="question-no">${String(state.currentIndex + 1).padStart(2, "0")}</div>
      <h1 class="question-title">${text(question.text)}</h1>
      <div class="options">
        ${(question.options || [])
          .map(
            (option) => `
            <button class="option" data-option="${text(option.key)}">
              <span class="option-key">${text(option.key)}</span>
              <span class="option-text">${text(option.text)}</span>
            </button>
          `
          )
          .join("")}
      </div>
      <p class="hint">${text(state.config.quizHint || "选择后自动进入下一题")}</p>
      `,
      "quiz-screen"
    );

    app.querySelectorAll("[data-option]").forEach((button) => {
      button.addEventListener("click", () => selectOption(button.dataset.option));
    });
  }

  function selectOption(key) {
    if (state.locked) return;
    state.locked = true;
    state.selected = key;
    const question = state.config.questions[state.currentIndex];
    state.answers[question.id] = key;

    app.querySelectorAll(".option").forEach((button) => {
      const selected = button.dataset.option === key;
      button.classList.toggle("selected", selected);
      button.classList.toggle("dimmed", !selected);
    });

    window.setTimeout(() => {
      if (state.currentIndex < state.config.questions.length - 1) {
        state.currentIndex += 1;
        state.locked = false;
        state.selected = null;
        renderQuiz();
      } else {
        sessionStorage.setItem(getStorageKey(), JSON.stringify(state.answers));
        state.locked = false;
        navigate("loading");
      }
    }, 420);
  }

  function startLoading() {
    state.loadingStep = 0;
    renderLoading("");
    tickLoading();
  }

  function renderLoading(value) {
    const loadingMessages = getLoadingMessages();
    renderShell(
      `
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text">${text(value)}<span class="cursor">|</span></div>
        <div class="step-bars">
          ${loadingMessages.map((_, index) => `<div class="step ${index < state.loadingStep ? "done" : ""}"><span></span></div>`).join("")}
        </div>
      </div>
      `,
      "loading-screen"
    );
  }

  function tickLoading() {
    if (state.route !== "loading") return;
    const loadingMessages = getLoadingMessages();
    if (state.loadingStep >= loadingMessages.length) {
      window.setTimeout(() => navigate("result"), 700);
      return;
    }
    const message = loadingMessages[state.loadingStep];
    let chars = 0;
    const interval = window.setInterval(() => {
      chars += 1;
      renderLoading(message.slice(0, chars));
      if (chars >= message.length) {
        window.clearInterval(interval);
        window.setTimeout(() => {
          state.loadingStep += 1;
          tickLoading();
        }, 520);
      }
    }, 35);
  }

  function renderResult() {
    const saved = sessionStorage.getItem(getStorageKey());
    if (saved) state.answers = JSON.parse(saved);
    if (Object.keys(state.answers).length < state.config.questions.length) {
      renderHome();
      return;
    }

    const scored = scoreAnswers(state.answers);
    const primary = state.config.results[scored.primary];
    const secondary = scored.secondary ? state.config.secondaryNotes?.[scored.primary]?.[scored.secondary] : null;
    const stage = getStage(primary.maturityScore);
    const shareText = buildShareText(primary, secondary);
    const compareLabels = state.config.compareLabels || ["如果继续原路", "如果换一种做法"];
    state.resultData = { scored, primary, secondary, stage, shareText };

    renderShell(
      `
      <article class="report">
        <div class="kicker"><span class="dot"></span><span>${text(state.config.resultKicker || "Result Report")}</span><span class="dot"></span></div>
        <h1 class="result-type">${text(primary.typeName)}</h1>
        <p class="result-subtitle">${text(primary.subtitle)}</p>
        <div class="stamp-row">
          <div class="stamp"><strong>${text(primary.maturityScore)}</strong><span>${text(state.config.scoreLabel || "决策成熟度")}</span></div>
          <div class="stamp"><strong>${text(stage)}</strong><span>${text(state.config.stageLabel || "当前行动阶段")}</span></div>
        </div>

        <section class="section">
          <h2>你的答案分布</h2>
          <div class="meters">
            ${Object.entries(scored.counts)
              .map(([key, value]) => {
                const typeData = state.config.results[key];
                const width = (value / state.config.questions.length) * 100;
                return `
                  <div>
                    <div class="meter-head"><span>${text(key)} · ${text(typeData.typeName)}</span><span>${value} 题</span></div>
                    <div class="meter-track"><div class="meter-fill" style="width:${width}%"></div></div>
                  </div>
                `;
              })
              .join("")}
          </div>
        </section>

        ${secondary ? `<section class="section"><h2>副倾向提示</h2><div class="secondary-note">${text(secondary)}</div></section>` : ""}

        <section class="section">
          <h2>诊断结论</h2>
          <div class="quote">${text(primary.coreConclusion)}</div>
        </section>

        <section class="section">
          <h2>为什么你会这样</h2>
          <p>${text(primary.diagnosis)}</p>
          <p>${text(primary.whatYouReallyWant)}</p>
        </section>

        <section class="section">
          <h2>${text(primary.mechanism.title)}</h2>
          <p>${text(primary.mechanism.content)}</p>
        </section>

        ${renderParagraphSection("专业解读框架", primary.professionalBasis)}
        ${renderTagSection("你的关键矛盾", primary.coreTensions)}
        ${renderCompareListSection("适合推进的条件", "需要谨慎的信号", primary.suitableIf, primary.cautionIf)}

        <section class="section">
          <h2>关键指数</h2>
          <div class="meters">
            ${(primary.indices || [])
              .map(
                (item) => `
                <div>
                  <div class="meter-head"><span>${text(item.label)}</span><span>${text(item.value)}</span></div>
                  <div class="meter-track"><div class="meter-fill" style="width:${number(item.value)}%"></div></div>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>两条路径对比</h2>
          <div class="compare">
            <div class="compare-card"><h3>${text(compareLabels[0])}</h3><p>${text(primary.ifStay)}</p></div>
            <div class="compare-card"><h3>${text(compareLabels[1])}</h3><p>${text(primary.ifChange)}</p></div>
          </div>
        </section>

        <section class="section">
          <h2>现在最不建议你做</h2>
          <div class="tag-list">${(primary.notRecommended || []).map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
        </section>

        <section class="section">
          <h2>未来 90 天验证方案</h2>
          <div class="plan">
            ${(primary.plan90 || [])
              .map(
                (item, index) => `
                <div class="plan-card">
                  <h3>${index + 1}. ${text(item.title)}</h3>
                  <p>${text(item.content)}</p>
                </div>
              `
              )
              .join("")}
          </div>
        </section>

        <section class="section">
          <h2>最后一句话</h2>
          <p>${text(primary.closing)}</p>
        </section>

        <div class="actions">
          <button class="primary-btn" data-action="copy">${text(state.config.copyButton || "复制我的结果")}</button>
          <button class="ghost-btn" data-action="restart">${text(state.config.restartButton || "重新测试")}</button>
        </div>
      </article>
      `,
      "result-screen"
    );

    app.querySelector("[data-action='copy']").addEventListener("click", () => copyShareText(shareText));
    app.querySelector("[data-action='restart']").addEventListener("click", () => {
      sessionStorage.removeItem(getStorageKey());
      state.answers = {};
      state.currentIndex = 0;
      navigate("home");
    });
  }

  function renderParagraphSection(title, paragraphs) {
    if (!Array.isArray(paragraphs) || !paragraphs.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        ${paragraphs.map((item) => `<p>${text(item)}</p>`).join("")}
      </section>
    `;
  }

  function renderTagSection(title, items) {
    if (!Array.isArray(items) || !items.length) return "";
    return `
      <section class="section">
        <h2>${text(title)}</h2>
        <div class="tag-list">${items.map((item) => `<span class="tag">${text(item)}</span>`).join("")}</div>
      </section>
    `;
  }

  function renderCompareListSection(leftTitle, rightTitle, leftItems, rightItems) {
    const hasLeft = Array.isArray(leftItems) && leftItems.length;
    const hasRight = Array.isArray(rightItems) && rightItems.length;
    if (!hasLeft && !hasRight) return "";
    return `
      <section class="section">
        <h2>适用边界</h2>
        <div class="compare">
          <div class="compare-card">
            <h3>${text(leftTitle)}</h3>
            ${(leftItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
          <div class="compare-card">
            <h3>${text(rightTitle)}</h3>
            ${(rightItems || []).map((item) => `<p>${text(item)}</p>`).join("")}
          </div>
        </div>
      </section>
    `;
  }

  function scoreAnswers(answers) {
    const resultKeys = Object.keys(state.config.results || {});
    const counts = Object.fromEntries(resultKeys.map((key) => [key, 0]));
    (state.config.questions || []).forEach((question) => {
      const answerKey = answers[question.id];
      if (!answerKey) return;
      const option = (question.options || []).find((item) => item.key === answerKey);
      const scoreKey = option?.score || option?.result || answerKey;
      if (counts[scoreKey] !== undefined) counts[scoreKey] += 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const threshold = state.config.secondaryThreshold ?? 2;
    const primary = sorted[0][0];
    const secondary = sorted[1][1] > 0 && sorted[0][1] - sorted[1][1] <= threshold ? sorted[1][0] : null;
    return { counts, primary, secondary };
  }

  function getStage(score) {
    const labels = state.config.stageLabels || [
      { max: 45, label: "观察期" },
      { max: 65, label: "验证期" },
      { max: 82, label: "规划期" },
      { max: 100, label: "行动期" },
    ];
    const hit = labels.find((item) => score <= item.max);
    return hit ? hit.label : labels[labels.length - 1].label;
  }

  function buildShareText(primary, secondary) {
    const template = state.config.shareTemplate || [
      "我测出了：{{typeName}}",
      "{{posterSubtext}}",
      "{{secondaryLine}}",
      "",
      "{{title}}",
    ];
    const values = {
      title: state.config.title,
      typeName: primary.typeName,
      posterSubtext: primary.posterSubtext,
      secondary: secondary || "",
      secondaryLine: secondary ? `副倾向：${secondary}` : "",
    };
    return template
      .map((line) => fillTemplate(line, values))
      .filter((line, index, arr) => line || arr[index - 1])
      .join("\n")
      .trim();
  }

  async function copyShareText(value) {
    try {
      await navigator.clipboard.writeText(value);
      showToast("结果文案已复制");
    } catch (error) {
      showToast("复制失败，可长按手动复制");
    }
  }

  function showToast(value) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = value;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function getLoadingMessages() {
    return state.config.loadingMessages || defaultLoadingMessages;
  }

  function getStorageKey() {
    return `xhsTestAnswers:${state.config.slug || "default"}`;
  }

  function fillTemplate(template, values) {
    return String(template).replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] || "");
  }

  function number(value) {
    const parsed = Number(value);
    if (Number.isNaN(parsed)) return 0;
    return Math.max(0, Math.min(100, parsed));
  }

  function text(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
})();

    </script>
  </body>
</html>
